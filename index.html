const WMC_ARTICLES = [
  {id:'thomas-hartley',title:'Brief van Thomas Hartley, Yorkshire',sub:'Het verhaal dat alles begon',cat:'WMC Verhaal',catColor:'#FF6600',loc:null,role:null,readMin:7,thumb:'letter',featured:true,
    body:`In november 1949 schreef een Britse mijnwerker een brief aan de burgemeester van Kerkrade. Thomas Hartley, 34 jaar oud, had 17 jaar ondergronds gewerkt. Zijn longen zaten vol kolenstof. Maar op 22 oktober had hij voor het eerst in zijn leven zijn helm afgezet en een koperen trompet opgepakt — in het stadhuis van Kerkrade.

"Uw vrijwilligers hebben ons niet behandeld als buitenlanders. Ze hebben ons behandeld als muzikanten. Dat verschil — dat kleine, enorme verschil — zal ik nooit vergeten."

Hartley schreef drie weken na zijn terugkeer. Hij wachtte omdat hij de woorden nog niet had. Wat hij beschreef, was niet alleen een muzikaal evenement. Het was heling via aanwezigheid. Een groep vrijwilligers die geen bijzondere dingen deden — die gewoon zagen wie er voor hen stond.

In 1951 werd het Wereld Muziek Concours officieel geboren. In 2026 is het 75 jaar later.

De muzikanten die dit jaar in Kerkrade aankomen hebben ook hun reis gemaakt. Van Japan, van Amerika, van Griekenland, van Indonesië. Sommigen hebben maanden getraind voor dit moment. Sommigen zijn gespannen. Sommigen zijn uitgeput van de reis.

Jij bent de opvolger van die vrijwilligers van 1949. Niet vanwege een functieomschrijving. Vanwege de manier waarop je iemand aankijkt — of juist niet. De manier waarop je een flesje water neerzet. De manier waarop je aanwezig bent.

Dat is de vonk. Dat is waarom dit telt.`},

  {id:'yuki-matsumoto',title:'Tourdagboek van Yuki Matsumoto',sub:'Hoe een stoel alles betekende',cat:'WMC Verhaal',catColor:'#FF6600',loc:null,role:null,readMin:9,thumb:'letter',
    body:`Yuki Matsumoto was fluitiste bij het Osaka Municipal Wind Orchestra. Ze deed mee aan het WMC van 2013. Dit zijn fragmenten uit haar persoonlijke reisverslag, later vertaald met toestemming van de familie.

**Dag 4 — Kerkrade**

We landen om 06:15. Ik heb 22 uur niet geslapen. Een vrouw staat bij de ingang van de Rodahal. Ze zegt niets. Ze wijst. Ze geeft me een flesje water. Ze glimlacht en loopt weg.

Ik heb haar naam nooit geweten. Maar ik denk nog steeds aan haar.

**Dag 5 — De dag voor het optreden**

Ik kan niet eten. Mijn handen trillen. Een vrijwilliger vraagt me hoe het gaat. Ik zeg: "Fine, thank you." Ik loop door. Hij roept me na: "Er staat een stoel in de gang als u even wilt zitten."

Ik ben gaan zitten. Vijftien minuten. Niemand heeft me aangesproken. Dat was het meest gastvrije wat iemand ooit voor mij heeft gedaan.

**Dag 6 — Na het optreden**

Iemand legde een flesje water naast me zonder te kijken. Zonder te vragen. Zonder te wachten op een bedankje. Later hoorde ik: een vrijwilliger. Twintig jaar oud. Zijn eerste dag.

Als hij dit ooit leest: u heeft het goed gedaan.

---

*Matsumoto trad in 2017 opnieuw aan bij het WMC, ditmaal als jurylid. Ze werd één van de meest gerespecteerde juryleden in de concertdiscipline. Ze schreef later dat haar liefde voor het WMC begon bij een anonieme vrijwilliger met een stoel.*`},

  {id:'stilte-product',title:'Stilte als product',sub:'Wat de Rodahal van jou vraagt',cat:'Tempel-gids',catColor:'#FF6600',loc:'RODAHAL',role:null,readMin:5,thumb:'rodahal',
    body:`In de buitenwereld is een pennetje dat op de vloer valt een niet-gebeurtenis. In de Rodahal is het een incident.

Dat is geen overdrijving. De akoestiek van de Rodahal is zodanig ontworpen dat elk geluid zichtbaar wordt in de ruimte. De dirigent op het podium hoort het. De jury hoort het. De muzikant in de eerste rij hoort het.

**Wat dit voor jou betekent:**

Jij bent hier niet om service te verlenen. Jij bent hier om stilte te bewaken. De stilte is het product. Elk geluid dat jij maakt — elke voetstap, elke deur, elke verschuivende stoel — is een inbreuk op het product dat 252 ensembles zijn hele jaar voor hebben getraind.

Dit klinkt zwaar. Het is ook een privilege. Je bent bewaker van iets unieks.

**Praktisch:**

Beweeg langs de buitenwanden. Nooit door het middenvlak tijdens een optreden. Zachte zolen zijn verplicht. Geen sieraden die rinkelen. Geen telefoon op trilstand — zelfs trillen is hoorbaar in de Rodahal.

Deuren: elke deur die opengaat maakt geluid. Bereken altijd of het de moeite waard is. Tijdens een optreden: de deur gaat dicht en blijft dicht.

Service: dranken vóór aanvang. Daarna: nul handelingen tot de pauze of het einde.

De stagemanager van WMC 2009 schreef het zo: "In de Tempel is jouw onzichtbaarheid het product. Niemand mag jou zien werken."

Dat is jouw norm vandaag.`},

  {id:'non-verbaal',title:'Het non-verbale alfabet',sub:'Communiceren zonder geluid',cat:'Tempel-gids',catColor:'#FF6600',loc:'RODAHAL',role:null,readMin:3,thumb:'eye',
    body:`In de Rodahal praat je niet tijdens een optreden. Maar je communiceert wel. Hier is het basisalfabet dat iedereen op de vloer moet kennen.

**De vijf basisgebaren:**

→ **Naar jezelf wijzen** = ik regel dit. Gebruik dit als een collega hulp zoekt en jij het afhandelt.

→ **Één vinger omhoog** = één moment, ik kom direct. Gebruik als je bezig bent en iemand op je wacht.

→ **Open hand omlaag, langzame beweging** = rustig aan, geen haast. Gebruik bij een gast die wil bewegen of iets wil doen.

→ **Wijs naar de uitgang of richting** = begeleiding. Gebruik zonder woorden te spreken.

→ **Hoofd schudden + hand omhoog** = niet nu. Gebruik als iets echt niet kan tijdens het optreden.

**Waarom dit werkt:**

Je hoeft niet te fluisteren. Fluisteren heeft volume. Gebaren hebben geen volume. Een goed gebaar is sneller, duidelijker en stiller dan de meest gedempte stem.

Oefen dit voor je eerste dienst. Als je het hoofd van de stagemanager ziet draaien, wil je zeker weten wat je doet.`},

  {id:'10-yard-regel',title:'De 10-yard regel',sub:'Absolute grens op het veld',cat:'Arena-gids',catColor:'#E5007D',loc:'STADION',role:null,readMin:4,thumb:'stadion',
    body:`Dit staat in de officiële WFIMC-regels en is niet onderhandelbaar: geen enkel personeelslid mag binnen tien yard van de marching zone staan tijdens een optreden.

Tien yard. Negen meter. Dat is de grens.

**Waarom zo strikt:**

Een ensemble dat maandenlang heeft getraind voor een precies uitgestippelde route op het veld, mag die route niet verstoord zien worden door een personeelslid dat "even iets regelt". De visuele schone lijn van het veld is onderdeel van de score. WFIMC-juryleden noteren veldintrusies. De organisatie kan diskwalificeren.

Dit klinkt zwaar. Het is ook simpel: buiten de lijn, altijd.

**Wat je wél doet:**

Je staat op de hoeken. Je bent zichtbaar voor publiek en ensembles als signaalpost, als gids, als veiligheid. Maar je bent niet op het veld.

**Uitzondering — noodsituatie:**

Als iemand op het veld valt of er een medisch incident is: dan gaat de stagemanager. Jij communiceert naar de stagemanager. Je handelt nooit solo bij een veldintrusie, hoe goed de bedoeling ook is.

De vuistregel: als je twijfelt of je het veld op kunt — je kunt het niet.`},

  {id:'arena-visibiliteit',title:'Zichtbaar zijn als product',sub:'Jouw aanwezigheid is de service',cat:'Arena-gids',catColor:'#E5007D',loc:'STADION',role:null,readMin:4,thumb:'eye',
    body:`Alles wat de Rodahal van jou niet vraagt, vraagt het Stadion juist wél.

In de Tempel is jouw onzichtbaarheid het product. In de Arena is jouw zichtbaarheid het product.

**Wat zichtbaar zijn betekent:**

Je staat op de hoeken van je zone. Je maakt oogcontact met het publiek. Je draagt je WMC-accreditatie zichtbaar. Je beweegt doelgericht — niet doelloos, maar je beweegt. Een standstill in de Arena leest als afwezigheid.

**Het verschil:**

In de Rodahal communiceert een vrijwilliger die je niet ziet: veiligheid en controle. In het Stadion communiceert een vrijwilliger die je niet kunt vinden: chaos.

350.000 bezoekers. Vijf locaties. 20.000 muzikanten. Het publiek wil weten: is er iemand? Ja. Dat ben jij. En ze moeten jou kunnen vinden.

**Praktisch:**

Leer de noodroutes uit je hoofd. Weet waar de dichtstbijzijnde stagemanager staat. Weet hoe je een groep kunt begeleiden zonder paniek.

Jij bent het gezicht van de Arena. Draag het bewust.`},

  {id:'mpa-kracht',title:'MPA: angst als prestatiekracht',sub:'Waarom trillen geen zwakte is',cat:'Muzikanten begrijpen',catColor:'#E5007D',loc:null,role:null,readMin:8,thumb:'globe',
    body:`Music Performance Anxiety — MPA — is de wetenschappelijke term voor wat vrijwel elke muzikant ervaart voor een groot optreden. Verhoogde hartslag. Tremor in de handen. Droge mond. Tunnelvisie.

De traditionele benadering was: MPA is een probleem dat opgelost moet worden. Ontspan je. Adem. Denk aan iets anders.

Recente neurowetenschappen keren dit om.

**De herframing:**

Die fysiologische reactie — de hartslag, de spanning, de alertheid — is evolutionair gezien geen angst. Het is voorbereiding. Je lichaam mobiliseert maximale middelen voor een topprestatie. Een muzikant die niet gespannen is voor het WMC-podium is óf al vaak op dit niveau opgetreden óf is niet volledig aanwezig.

**Wat dit voor jou betekent:**

Een muzikant die trilt, paceert, of stil naar de grond kijkt is niet instabiel. Die muzikant calibreert zijn fysiologie voor een prestatie van uitzonderlijk hoog niveau.

Jouw taak: die calibratie niet verstoren.

Aanspreken is een verstoring. Een goed bedoeld "gaat het?" is een verstoring. Zelfs oogcontact kan een verstoring zijn als de muzikant zich intern richt.

De enige handeling die altijd juist is: water beschikbaar maken. Ruimte geven. Stil aanwezig zijn.

Dat is geen passiviteit. Dat is expertise.`},

  {id:'aziatische-groepen',title:'Aziatische groepen: de kunst van de stilte',sub:'Japan · Korea · China · Thailand',cat:'Muzikanten begrijpen',catColor:'#E5007D',loc:null,role:null,readMin:6,thumb:'globe',
    body:`252 ensembles uit 31 landen. Een groot deel komt uit Azië — Japan, Korea, Thailand, China, Vietnam. De culturele verwachtingen zijn fundamenteel anders dan wat je in Nederland gewend bent.

**Het twee-handen protocol:**

Overhandig altijd documenten, tickets, programmaboekjes en water met twee handen. Dit is geen formaliteit. In Oost-Aziatische etiquette communiceert het overhandigen met twee handen: ik respecteer wat ik je geef, en ik respecteer wie jij bent. Eén hand lezen veel bezoekers als nonchalant.

Oefen dit. Het wordt een reflex.

**Oogcontact:**

Kort oogcontact is vriendelijk en normaal. Lang, direct oogcontact wordt in veel Oost-Aziatische culturen als confronterend gelezen — het tegenovergestelde van wat jij bedoelt.

De vuistregel: oogcontact bij aanspreken, daarna richting het object of de richting die je aanwijst.

**Stilte respecteren:**

Als je een vraag stelt en er komt geen direct antwoord, wacht dan. Niet vijf seconden. Misschien vijftien. In veel Aziatische communicatieculturen is een antwoord geven zonder nadenken onbeleefd. De stilte is niet ongemakkelijk — de stilte is het antwoord dat wordt geformuleerd.

Vul de stilte niet op.

**Stiptheid:**

Als iets om 14:00 begint, betekent dat 13:50 aanwezig zijn. Wees op de afgesproken plek vóór het afgesproken tijdstip. Dit communiceert respect voor hun planning.`},

  {id:'water-stoel',title:'Water. Stoel. Niets.',sub:'De drie-staps-formule',cat:'Muzikanten begrijpen',catColor:'#E5007D',loc:null,role:null,readMin:2,thumb:'water',
    body:`Dit is de eenvoudigste en krachtigste gids in deze hele bibliotheek. Drie woorden.

**Water.**
Een muzikant backstage heeft water nodig. Altijd. Zonder te vragen. Je zet het neer. Je loopt weg. Klaar.

**Stoel.**
Een muzikant na een optreden wil zitten. Niet praten. Niet gefeliciteerd worden. Zitten. Als er een stoel beschikbaar is en je ziet dat iemand zoekt — wijs ernaar. Zeg niets. Wijs en loop weg.

**Niets.**
Een muzikant in mentale voorbereiding — stilstaand, naar de grond kijkend, ogen dicht — heeft niets nodig van jou. Jouw aanwezigheid zonder inmenging is de service.

Dit is het. Drie woorden. Onthoud ze. Pas ze toe.

Yuki Matsumoto werd één van de meest gerespecteerde WMC-juryleden ter wereld. Ze begon haar liefde voor het WMC met een anonieme vrijwilliger die haar een stoel wees en wegliep.

Water. Stoel. Niets.`},

  {id:'jury-protocol',title:'Juryisolatie: de onbreekbare regel',sub:'Integriteit van een wereldkampioenschap',cat:'Protocol',catColor:'#4aaa68',loc:null,role:null,readMin:6,thumb:'shield',
    body:`In 2009 werd een jurylid bij een internationale wedstrijd in een hotellobby aangesproken door een sponsor. "Even gedag zeggen." De wedstrijd werd stilgelegd. De uitslag werd twee maanden later vernietigd.

Één gesprek. In een hotellobby. Vijf minuten.

Dit is de context waarin jij werkt als je jurybegeleiding hebt.

**De absolute regels:**

Geen gesprek met juryleden over deelnemende ensembles — ook niet als zij het initiatief nemen. Geen reactie, geen mening, geen bevestiging.

Geen geschenken aannemen namens de jury — ook niet van welwillende sponsors. Accepteer het met waardigheid, zeg dat je het doorstuurt naar het coördinatieteam, en doe dat ook.

Geen lobbying faciliteren — als een bandvertegenwoordiger jou vraagt "iets door te geven aan de jury", stop het gesprek en rapporteer bij de coördinator.

Geen moment alleen in een publieke ruimte — een jurylid is altijd begeleid, maar nooit zichtbaar bewaakt. Jij bent de onzichtbare aanwezigheid.

**De vuistregel:**

Als je twijfelt of iets mag: het mag niet. Bel de coördinator. Altijd.

Je bewaakt de integriteit van een wedstrijd die muzikanten jaren hebben voorbereid. Dat is de verantwoordelijkheid die jij draagt als je in jurybegeleiding staat.`},

  {id:'vip-diplomacy',title:'VIP-diplomatie: onzichtbare excellentie',sub:'Klankstadclub en hoofdsponsors',cat:'Protocol',catColor:'#4aaa68',loc:null,role:null,readMin:5,thumb:'vip',
    body:`De Klankstadclub omvat de hoogste donateurs en partners van het WMC. Ze financieren mede de concoursen, de prijzen, de infrastructuur. Ze verwachten onberispelijke service — en de zekerheid dat hun investering zichtbaar is.

**Het principe:**

Je bent er altijd. Je anticipeert. Maar je wordt pas zichtbaar als zij dat wensen. Onzichtbare excellentie.

**In de praktijk:**

Initieer nooit. Reageer altijd. Een VIP die met jou spreekt, heeft het gesprek gestart — jij reageert. Gebruik formeel taalgebruik tenzij de gast expliciet overschakelt naar informeel.

Ken de namen van de hoofdsponsors. Dat staat in je briefing. Als een naam er niet in staat, vraag het vooraf aan je coördinator.

Ken de route van de prijsuitreiking. VIPs worden vijf minuten vóór aanvang naar hun positie begeleid. Niet vier minuten — vijf. De timing is absoluut.

**Het schenkprotocol:**

Een VIP-sponsor biedt je iets aan "voor de jury". Accepteer met oprechte warmte. Bedank voor de generositeit. Breng het na het gesprek naar je supervisor, niet naar de jury. Weigeren zonder diplomatie beschadigt een donateursrelatie die jaren is opgebouwd. Omleiden beschermt de integriteit. Beide doen tegelijkertijd is de kunst.`},

  {id:'splus-h',title:'S+H≥T in de praktijk',sub:'De continuïteitsformule uitgelegd',cat:'Sergeant-academie',catColor:'#4aaa68',loc:null,role:'sergeant',readMin:10,thumb:'zaagtand',
    body:`Staat + Herstel ≥ Aankomende Taak. Dit is de formule die bepaalt of jouw team het volgende weekend aankan.

**Wat de variabelen betekenen:**

S (Staat) — hoe is jouw medewerker er nú bij? Niet hoe hij eruitziet. Hoe hij is. Je weet het door te kijken, niet door te vragen. Tempo. Verbale output. Foutpatronen. Oogcontact.

H (Herstel) — heeft hij tussen de shifts daadwerkelijk kunnen herstellen? Slaap. Eten. Ruimte voor zichzelf. Zeven uur slaap na een dubbele dienst telt niet als volledig herstel.

T (Taak) — wat staat er vandaag op het programma? Een rustige locatiedienst is T=2. Jury-escort tijdens het slotweekend is T=5.

**Als de formule negatief wordt:**

Drie interventies, in volgorde van minst ingrijpend:

1. Taak aanpassen — minder intensieve post, kortere shift. Dit is altijd de eerste stap.
2. Herstel verlengen — later laten beginnen of eerder laten stoppen. Pas als aanpassing niet voldoende is.
3. Persoon opvangen — buddy-protocol activeren, eventueel naar huis sturen. Pas als de eerste twee niet werken.

**De fout die sergeanten maken:**

Direct naar interventie 3 springen. "Je gaat naar huis" is dramatisch, stigmatiserend en onnodig als de taak aangepast had kunnen worden.

De kunst is vroeg genoeg signaleren dat je nog bij 1 kunt blijven.`},

  {id:'spiegelsessie',title:'SpiegelSessie faciliteren',sub:'Drie vragen, geen beoordeling',cat:'Sergeant-academie',catColor:'#4aaa68',loc:null,role:'sergeant',readMin:7,thumb:'mirror',
    body:`De SpiegelSessie is geen evaluatiegesprek. Het is geen coachingsessie. Het is geen HR-tool. Het is een gesprek tussen twee mensen waarbij één iets deelt en de ander luistert.

**De drie vragen — niet meer, niet minder:**

1. Wat heb jij gegeven dit weekend?
2. Wat heeft het jou gekost?
3. Wat heb jij nodig vóór het volgende weekend?

Dat is het. Geen vierde vraag. Geen eigen analyse. Geen "maar heb je ook gedacht aan..."

**Jouw rol als facilitator:**

Je luistert. Je herhaalt wat je hoort. Je stelt geen nieuwe vragen. Als er een stille valt: laat hem vallen.

De enige actieve handeling die van jou wordt gevraagd: blijven zitten. Niet op je telefoon. Niet wegkijken. Aanwezig zijn.

**Wanneer je een SpiegelSessie plant:**

Na elk piekweekend, in het herstelvenster. Na een incident op de vloer. Als een medewerker zelf aangeeft dat hij ergens mee zit. Als jij signalen ziet die twee opeenvolgende diensten aanwezig zijn.

**Wat je niet doet:**

Je rapporteert de inhoud van een SpiegelSessie niet aan management. Je analyseert niet wat de medewerker had moeten doen. Je geeft geen advies tenzij expliciet gevraagd.

De drie vragen zijn niet therapeutisch. Ze zijn menselijk. Dat is genoeg.`},

  {id:'buddy-systeem',title:'Het Buddy-systeem',sub:'Zien wat de ander niet meer ziet',cat:'Sergeant-academie',catColor:'#4aaa68',loc:null,role:'sergeant',readMin:5,thumb:'handshake',
    body:`Het Buddy-systeem is een operationeel veiligheidssysteem. Niet een HR-mechanisme. Niet een vriendschapsprogramma. Een manier om te zien wat de ander niet meer ziet.

**De vijf vroege signalen:**

1. Tempo daalt onmerkbaar — net iets trager dan normaal. Niet zichtbaar voor gasten, maar jij ziet het.
2. Verbaal minder — korte antwoorden, geen grappigheid meer, minder initiatief in gesprek.
3. Fysieke signalen — vaker zitten, zichzelf vaker corrigeren, oogcontact vermijden.
4. Foutpatroon — kleine vergissingen die hij normaal niet maakt.
5. Standaard loslaten — "goed genoeg" in plaats van "goed".

**Het interventieprotocol:**

Stap 1: observeer twee signalen. Eén kan toeval zijn.

Stap 2: start non-verbaal. Zet water neer. Leg een hand op de schouder. Maak contact zonder woorden.

Stap 3: als er ruimte is, stel de openingsvraag: "Heb je even?" Niet: "Gaat het goed?" (Antwoord is altijd ja.)

Stap 4: luister. Geef ruimte.

Stap 5: meld bij de Sergeant — niet als klacht of probleem, maar als informatieverstrekking. "Ik zie iets bij Thomas. Jij beslist."

**Wat je niet doet:**

Je diagnosticeert niet. Je besluit niet namens de ander. Je pusht de interventie-ladder niet verder dan nodig.

Zien. Benoemen. Doorgeven. Dat is het.`},

  {id:'rolduc-abdij',title:'Abdij Rolduc: thuis van de muzikanten',sub:'Gastvrijheid als woonervaring',cat:'Tempel-gids',catColor:'#FF6600',loc:'TEMPEL',role:null,readMin:4,thumb:'door',
    body:`Abdij Rolduc is tijdens het WMC het verblijf van honderden deelnemende muzikanten. Dit is geen hotelervaring. Dit is hun thuis voor de duur van het concours.

**Het fundamentele verschil:**

In een hotel is een gast een betalende klant met verwachtingen. In Rolduc is een muzikant een gast die zijn levenswerk meebrengt. De bijbehorende logistieke stress — instrumentopslag, rehearsal-slots, maaltijden, vervoer naar de concourszalen — valt op jouw bordje.

**Wat je moet weten:**

Ken het rehearsal-schema van de dag. Weet welke ensembles wanneer repeteren en waar. Als een muzikant vraagt wanneer zijn ensemble de zaal heeft — jij hebt het antwoord, of je weet waar het snel te vinden is.

Instrumentopslag: ALTIJD expliciete toestemming vragen voor je iets aanraakt. Een instrument kan een persoonlijk eigendom zijn dat meer waard is dan een auto. Een Steinway-strijkstok. Een handgemaakte euphonium. Vraag.

Maaltijden: ken de tijden. Muzikanten die vlak voor een optreden niet hebben gegeten, presteren slechter. Als iemand de maaltijd heeft gemist, weet je waar de noodoplossing is.

**Het ritme van de abdij:**

Vroege repetities — soms vanaf 07:00. Late rustmomenten — soms pas na 23:00. Het gebouw heeft zijn eigen ritme. Respecteer het. Geen harde geluiden in de gangen voor een rehearsal. Geen mobieltjes in de kapel.

Dit is hun huis. Behandel het zo.`},

  {id:'markt-blow',title:'Markt & BLOW! — de Huiskamer',sub:'Hoog tempo, warme energie',cat:'Arena-gids',catColor:'#E5007D',loc:'ARENA',role:null,readMin:4,thumb:'stadion',

const WMC_ARTICLES_EXTRA = [
  {id:'ooda-wmc',title:'De 30-seconden loop',sub:'Lees de situatie voordat je handelt',cat:'Methode',catColor:'#FF6600',loc:null,role:null,readMin:8,thumb:'eye',
    body:`In 1960 bedacht kolonel John Boyd een besluitvormingsmodel voor straaljagerpiloten. Observe, Orient, Decide, Act. De OODA-loop. Het klinkt ver weg van een festivalvloer in Kerkrade. Het is de kern van wat jij elke dienst doet.

**Observeren — de eerste tien seconden**

Een muzikant loopt backstage. Wat zie je? Niet wie je denkt te zien — wat zie je letterlijk. Rugzak over beide schouders of aan één kant? Kijkt hij naar de wegwijzers of naar de grond? Maakt hij oogcontact of bewust niet?

Dit zijn datapunten, geen conclusies. De fout die je maakt is te snel interpreteren. "Man met baard en grote koffer" is een observatie. "Hij zoekt waarschijnlijk de kluizenruimte" is al een conclusie — en conclusies kunnen fout zijn.

Je hebt tien seconden. Gebruik ze puur om te zien.

**Oriënteren — de verbinding maken**

Nu verbind je wat je zag met wat je weet. Bezoeker die naar zijn telefoon kijkt terwijl hij rond de kaart staat — hij is verdwaald maar wil niet om hulp vragen. Muzikant die met gesloten ogen op een bankje zit — hij calibreert. Groep van zes die lachend maar snel loopt — zij zijn te laat voor hun repetitieruimte.

De oriëntatie is het menselijke element. De machine-learning van sociale signalen die jij in jaren hebt opgebouwd. Hier zit jouw waarde als medewerker — niet in het kennen van routebeschrijvingen, maar in het begrijpen van de context achter de vraag.

**Beslissen — kies de vorm, niet alleen de inhoud**

De beslissing is niet wat je gaat doen. De beslissing is hóe. Of jij de interactie vormgeeft als:

→ Veiligheid en ruimte: je zegt niets, je plaatst jezelf zichtbaar en beschikbaar.
→ Proactief en beknopt: je wijst zonder te spreken, of je loopt mee zonder uitleg.
→ Verbindend: je benoemt wat je ziet en stelt één gerichte vraag.

**Handelen — met zelfvertrouwen**

Omdat je hebt geobserveerd en georiënteerd, handel je niet reactief. Dat is het verschil dat mensen voelen maar niet kunnen benoemen. Wat in vijfsterren-reviews verschijnt als "het personeel wist precies wat ik nodig had, nog voordat ik het zelf wist."

En als je inschatting fout was? Geen mislukte loop. Nieuwe data. De loop begint opnieuw — en de tweede ronde duurt vijf seconden.

**Slotnoot**

Boyd ontwikkelde dit voor piloten in een cockpit. De inzet is bij ons gelukkig lager. Maar het principe blijft: wie sneller en accurater door zijn loop gaat dan de situatie zich ontwikkelt, heeft de regie.

De volgende keer dat je de vloer opstapt: stop twee tellen. Observeer. Oriënteer. Beslis. Dan loop je.`},

  {id:'structured-authenticity',title:'Strakke systemen, vrije mensen',sub:'Waarom structuur spontaniteit maakt',cat:'Methode',catColor:'#FF6600',loc:null,role:null,readMin:7,thumb:'shield',
    body:`Er is een paradox in hoe mensen over regels denken. Meer regels = minder vrijheid. Het klopt niet. En de beste organisaties ter wereld weten waarom.

**Het chocolaatje in het pinguinbakje**

In een restaurant in Limburg heeft een medewerker ooit een kinderijsje geserveerd in een plastic pinguinbakje. Het kind was er weg van. Toen het gezin vertrok, pakte de medewerker het bekertje mee, maakte het schoon, stopte er een chocolaatje in, en gaf het terug aan het meisje met de tekst: "pas thuis openmaken."

Dat staat nergens in een protocol. Dat kun je niet vastleggen in een handboek.

Maar hier is de sleutel: dit gebaar was alleen mogelijk omdat de medewerker niet gestresst was. Het systeem eromheen — duidelijke taakverdeling, heldere communicatie, goed georganiseerde logistiek — gaf hem mentale bandbreedte. En in die ruimte paste het chocolaatje.

**Het principe toegepast op WMC**

Het Digital Sanctuary is hetzelfde principe in code. De modules, de badge-structuur, de dagelijkse check-in, de ZAKVE-doctrine — dit is het strakke systeem. Niet om jou in een keurslijf te duwen, maar om de brandjes te voorkomen zodat jij die ene muzikant ziet die net zijn instrument heeft laten vallen en een hand nodig heeft.

Gestructureerde authenticiteit: definieer het wat. Geef vrijheid in het hoe.

Het wat bij WMC: jij staat op jouw post, jij kent jouw locatie, jij weet de route, jij kent het protocol.

Het hoe bij WMC: de manier waarop jij iemand aankijkt. De grap die je maakt met een kind dat zijn ballonnetje kwijt is. Het moment dat jij een uitgeputte muzikant stilletjes naar de enige stoel in de gang wijst — zonder een woord te zeggen.

**Wat dit voor jou betekent**

Als jij na een shift het gevoel hebt dat je alleen maar afvinklijstjes hebt afgewerkt, is er iets mis. Een goed systeem zou je moeten bevrijden, niet beknotten.

De vraag na elke shift: had ik vandaag mentale ruimte voor een chocolaatje-moment? Zo ja — het systeem werkt. Zo nee — wat nam die ruimte in beslag?

**De onkopieerbare handtekening**

De concurrent kan jouw uniform kopiëren. Ze kunnen jouw locatie kopiëren. Ze kunnen de tekst van elk protocol kopiëren.

Ze kunnen niet kopiëren wat er spontaan en oprecht is. Ze kunnen het chocolaatje niet kopiëren als het systeem er niet voor zorgt dat de medewerker de ruimte heeft om het te zien.

Jouw aanwezigheid, op dit festival, op dit moment — dat is de onkopieerbare handtekening. Gebruik hem.`},

  {id:'dirigent-vloer',title:'Dirigent op de vloer',sub:'Van operator naar orchestrator',cat:'Sergeant-academie',catColor:'#4aaa68',loc:null,role:'sergeant',readMin:9,thumb:'star',
    body:`Er is een moment in de carrière van elke goede medewerker dat zijn succes zijn grootste obstakel wordt. Hij is de beste op de vloer. Hij lost problemen op voordat ze problemen zijn. En dan wordt hij Sergeant. En dan maakt hij de klassieke fout: hij probeert alsnog de beste medewerker te zijn. Terwijl zijn team hem nodig heeft als dirigent.

**De stap van operator naar orchestrator**

Een muzikant in een orkest is een operator. Hij speelt zijn partij perfect. Een dirigent is een orchestrator. Hij luistert niet naar zijn eigen partij — hij luistert naar alle partijen tegelijk, en corrigeert wat afwijkt van het geheel.

Jouw succes als Sergeant wordt niet gemeten aan hoe snel jij zelf loopt, maar aan hoe geolied het team onder jouw leiding draait.

Je instinct schreeuwt het tegengestelde. Je ziet borden die wegmoeten. Je pakt ze op. In dat moment heb je je helikopterview ingeruild voor een dienblad.

**De macro-loop**

Een medewerker runt een micro-loop: zijn eigen wijk, zijn eigen gasten, zijn eigen verantwoordelijkheid. Als Sergeant run jij de macro-loop. Je observeert niet individuen maar systemen.

En je denkt niet aan nu. Je denkt aan over twintig minuten. Second-order thinking.

Concreet voor WMC: jij ziet een groep van veertig mensen die al anderhalf uur in dezelfde sectie zitten. De mars-wedstrijd eindigt over vijftien minuten. Wat gebeurt er dan? Ze willen allemaal tegelijk naar de uitgang. Nu is het moment om te handelen — niet over vijftien minuten als de chaos er al is.

**De handenvrij-regel**

Praktisch principe: je doet maximaal 70% van de tijd fysiek werk. De andere 30% is voor scannen. Dat is niet luiheid. Dat is jouw operationele opdracht.

Positioneer jezelf op een strategisch punt van waaruit je de vloer kunt overzien. En stel de juiste vraag aan je team: niet "lukt het?" — gesloten vraag, voorspelbaar antwoord. Maar: "wat heb je nodig?" Dat is een uitnodiging tot echte communicatie.

**Jouw kalmte is de thermostaat**

Als de leider rent, gaat het team vliegen. Jouw emotionele toestand is besmettelijk — in beide richtingen.

Als jij kalm bent wanneer het hectisch wordt, communiceert dat naar je team: dit is beheersbaar. Als jij in paniek raakt bij het eerste incident, communiceert dat: dit is groter dan ons systeem aankan.

**De veiligheidsladder**

Een team kan pas groeien als het zich veilig voelt. Veilig om fouten te maken. Veilig om hulp te vragen. Veilig om spontaan een goed idee te implementeren.

Jij bouwt die ladder. Trede voor trede. Door te zijn wie jij bent op de vloer: kalm, overzichtelijk, beschikbaar — maar nooit degene met het volle dienblad.

Einde van elke shift. Één vraag: op welke trede staat mijn team vandaag? En welke trede zetten ze morgen, met mijn hulp?`},

  {id:'gastenreis-muzikant',title:'De gastenreis van een muzikant',sub:'Negen contactmomenten die tellen',cat:'Muzikanten begrijpen',catColor:'#E5007D',loc:null,role:null,readMin:10,thumb:'trumpet',
    body:`Een muzikant die aan het WMC deelneemt, doorloopt een reis van meerdere dagen. Die reis heeft negen kritieke contactmomenten. Bij elk moment heb jij de kans om de toon te zetten — of te missen.

**1. Aankomst — de eerste dertig seconden**

Ze komen na een vlucht van acht uur, of een busrit van veertien. Ze zijn gedesoriënteerd. Ze zoeken: een plek om te zitten, water, weten waar ze naartoe moeten.

Fout: onmiddellijk een welkomstpresentatie starten. Goed: aanwezig zijn zonder op te dringen. Wijs. Geef water. Wacht.

**2. Inchecken bij Rolduc — het ankerpunt**

Dit is het moment waarop de logistieke stress overgaat in anticipatie. Eén open vraag: "Is er iets wat u nu het meest wilt weten?" Dat geeft jou de data, en hen het gevoel dat ze controle hebben.

**3. Eerste repetitie — het kalibratiemoment**

De ruimte is nieuw. De akoestiek is anders. De dirigent is gespannen.

Je taak: stil aanwezig. Deur op het juiste moment dicht. Water beschikbaar zonder dat er om gevraagd wordt. Geen overbodige beweging.

**4. De avond voor het optreden — de stille nacht**

Ze eten vroeg of laat. Ze slapen vroeg of niet. Ze zijn stil of luidruchtig van de nervositeit. Beide zijn normaal.

Je taak: ruimte geven. Geen inhoudelijke gesprekken over het concours. Praktisch: zorg dat de wegen naar bucht, koffie, buitenlucht vrij zijn van obstakels.

**5. De ochtend van het optreden — het kookpunt**

Ze zijn gefocust. Ze zijn in hun eigen wereld.

Dit is het moment dat het meest misloopt: medewerkers denken onterecht dat de muzikant nu aangespreekbaar is. Hij is het niet.

Je taak: verkeersregelaar, niet gastheer. Eén uitzondering: als iemand een logistiek probleem heeft — instrument kwijt, bushalte klopt niet — dan schakel je onmiddellijk en resoluut.

**6. De tien minuten vóór het optreden — heilige stilte**

Er is een zone van tien minuten die heilig is. Geen vragen. Geen aankondigingen. Geen beweging tenzij operationeel noodzakelijk.

Dit zijn de tien minuten waarop een muzikant de kloof overbrugt tussen mens en vertolker. Jij bent in deze tien minuten het meest waardevol door niets te doen.

**7. Het optreden zelf — jij bent het systeem**

Terwijl zij spelen, bewaar jij de orde. De deuren. De stilte. De routes voor het publiek. Je bent niet toeschouwer. Je bent de infrastructuur die het optreden mogelijk maakt.

**8. Direct na het optreden — de ontlading**

Iedereen wil reageren. Feliciteren. Vragen hoe het ging. Doe het niet.

Een muzikant na een optreden is fysiologisch in een ontladingsfase. Hartslag daalt. Spieren ontspannen. Het brein verwerkt. Dit duurt vijftien tot veertig minuten.

Water. Stoel. Ruimte. In die volgorde. Zonder woorden als dat kan.

Pas als zij de interactie initiëren, is er ruimte. Niet eerder.

**9. Het afscheid — de handtekening onder de ervaring**

Ze gaan terug naar Osaka, naar Bogotá, naar Warschau. De allerlaatste indruk die ze van Kerkrade meenemen, is mede bepaald door dit moment.

Het hoeft niet groots. Een glimlach op het goede moment. Iemand die helpt met een koffer zonder dat ernaar gevraagd wordt. "Veilige reis" in de taal van het ensemble — ook als je die maar drie woorden van spreekt.

Reviews worden geschreven op basis van hoe mensen zich voelden bij het weggaan. Niet bij het aankomen. Niet tijdens het optreden. Bij het weggaan. Dat moment ben jij.`},

/* ── Foto upload hook ── */
function useLibPhoto(articleId, userId) {
  const key = `wmc-lib-photo-${userId}-${articleId}`;
  const [photo, setPhoto] = useState(()=>ls.get(key));
  const upload = useCallback((file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const b64 = e.target.result;
      ls.set(key, b64);
      setPhoto(b64);
    };
    reader.readAsDataURL(file);
  }, [key]);
  const remove = useCallback(() => { ls.remove(key); setPhoto(null); }, [key]);
  return { photo, upload, remove };
}

          <div style={{position:'absolute',bottom:0,left:0,right:0,
            background:'linear-gradient(transparent,var(--surface))',height:60}}/>
        </div>
        {/* Content */}
        <div style={{padding:'4px 20px 100px'}}>
          <div style={{fontFamily:'var(--font-m)',fontSize:'.65rem',color:article.catColor,
            letterSpacing:'.08em',marginBottom:8,textTransform:'uppercase'}}>{article.cat}</div>

            marginBottom:4,color:'var(--text)'}}>{article.title}</h2>

            {article.readMin} min lezen · {article.sub}
          </div>
          {/* Render markdown-ish body */}
          {article.body.split('\n\n').map((para,i)=>{
            if(para.startsWith('**')&&para.endsWith('**')&&para.split('**').length===3){
              const txt=para.slice(2,-2);

                letterSpacing:'.06em',marginTop:18,marginBottom:6,textTransform:'uppercase'}}>{txt}</div>;
            }
            if(para.startsWith('---')){
              return <div key={i} style={{borderTop:'1px solid var(--border)',margin:'16px 0'}}/>;
            }
            // Bold inline
            const parts=para.split(/\*\*(.*?)\*\*/g);
            return <p key={i} style={{fontSize:'.9rem',color:'var(--muted)',lineHeight:1.8,marginBottom:12}}>
              {parts.map((p,j)=>j%2===1?<strong key={j} style={{color:'var(--text)',fontWeight:600}}>{p}</strong>:<span key={j}>{p}</span>)}
            </p>;
          })}
          {/* Mark read */}
          <button onClick={read?onClose:markRead}
            style={{width:'100%',marginTop:16,padding:'13px',
              background:read?'var(--sage-b)':'var(--surface-2)',
              border:`1px solid ${read?'var(--border-act)':'var(--border)'}`,
              borderRadius:10,color:read?'var(--sage)':'var(--muted)',
              fontWeight:600,cursor:'pointer',fontSize:'.9rem',transition:'all .2s'}}>
            {read?'← Terug naar bibliotheek':'✓ Markeer als gelezen'}
          </button>
        </div>
      </div>
    </div>
  );
}

  const onClose = () => { setOpenArticle(null); setTick(t=>t+1); };

  // Filtered & searched articles
  const visible = ALL_WMC_ARTICLES.filter(a => {
    if (a.role && a.role !== role && role !== 'manager') return false;
    if (search) {
      const q = search.toLowerCase();
      return a.title.toLowerCase().includes(q)||a.sub.toLowerCase().includes(q)||a.cat.toLowerCase().includes(q);
    }
    return true;
  });

  const section = (cat, filter, wide=false) => {
    const items = visible.filter(filter);
    if (!items.length) return null;
    return (
      <div style={{marginBottom:22}} key={cat}>
        <div style={{fontFamily:'var(--font-m)',fontSize:'.62rem',letterSpacing:'.1em',
          textTransform:'uppercase',color:'#FF6600',marginBottom:10}}>{cat}</div>
        {wide
          ? items.map(a=><WmcLibCard key={a.id+tick} article={a} userId={uid} onOpen={onOpen} wide/>)
          : <div style={{display:'flex',gap:10,overflowX:'auto',scrollSnapType:'x mandatory',
              padding:'0 0 6px',margin:'0 -16px',paddingLeft:16,paddingRight:16}}
              className="wmc-lib-row">
              {items.map(a=><WmcLibCard key={a.id+tick} article={a} userId={uid} onOpen={onOpen}/>)}
            </div>
        }
      </div>
    );
  };

  const featured = ALL_WMC_ARTICLES.find(a=>a.featured) || ALL_WMC_ARTICLES[0];
  const { photo: heroPhoto } = useLibPhoto(featured.id, uid);
  const readCount = ALL_WMC_ARTICLES.filter(a=>!!ls.get(`wmc-lib-read-${uid}-${a.id}`)).length;

  return (
    <div style={{paddingBottom:100}}>
      {openArticle&&<WmcArticleReader article={openArticle} userId={uid} onClose={onClose}/>}

      {/* Hero */}
      {!search&&(
        <div onClick={()=>onOpen(featured)} style={{cursor:'pointer',margin:'0 0 20px',borderRadius:14,overflow:'hidden',position:'relative',height:180}}>
          {heroPhoto
            ? <img src={heroPhoto} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
            : <div style={{height:'100%',background:'linear-gradient(135deg,#FF6600,#E5007D)',
                display:'flex',alignItems:'center',justifyContent:'center'}}>
                <span style={{fontSize:'3rem',opacity:.3}}>🎺</span>
              </div>
          }
          <div style={{position:'absolute',inset:0,background:'linear-gradient(to top,rgba(7,9,15,.92) 0%,rgba(7,9,15,.2) 60%,transparent 100%)',
            display:'flex',flexDirection:'column',justifyContent:'flex-end',padding:'16px'}}>
            <div style={{display:'inline-flex',alignItems:'center',gap:5,background:'rgba(255,102,0,.25)',
              border:'1px solid rgba(255,102,0,.4)',borderRadius:20,padding:'2px 9px',
              fontFamily:'var(--font-m)',fontSize:'.6rem',color:'#FF6600',letterSpacing:'.06em',marginBottom:7,alignSelf:'flex-start'}}>
              🔥 Verplicht lezen voor je eerste shift
            </div>
            <div style={{fontFamily:'var(--font-d)',fontWeight:300,fontSize:'1.3rem',lineHeight:1.2,
              color:'#fff',marginBottom:4}}>{featured.title}</div>
            <div style={{fontFamily:'var(--font-m)',fontSize:'.68rem',color:'rgba(255,255,255,.65)'}}>
              {featured.readMin} min · {featured.cat}
            </div>
          </div>
        </div>
      )}

      {/* Search + progress */}
      <div style={{display:'flex',gap:10,alignItems:'center',marginBottom:16}}>
        <div style={{flex:1,display:'flex',alignItems:'center',gap:8,background:'var(--surface)',
          borderRadius:20,padding:'8px 12px',border:'1px solid var(--border)'}}>
          <span style={{fontSize:14,opacity:.5}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Zoek in de bibliotheek…"
            style={{flex:1,background:'none',border:'none',outline:'none',fontSize:'.85rem',
              color:'var(--text)',fontFamily:'var(--font-b)'}}/>
          {search&&<button onClick={()=>setSearch('')}
            style={{background:'none',border:'none',color:'var(--dim)',cursor:'pointer',fontSize:'.8rem'}}>✕</button>}
        </div>
        <div style={{fontFamily:'var(--font-m)',fontSize:'.65rem',color:'var(--dim)',whiteSpace:'nowrap',flexShrink:0}}>
          <span style={{color:'var(--sage)'}}>{readCount}</span>/{ALL_WMC_ARTICLES.length} gelezen
        </div>
      </div>

      {/* Sections */}
      {search ? (
        <div>
          {visible.length===0
            ? <div style={{textAlign:'center',padding:'32px 0',color:'var(--dim)',fontSize:'.88rem'}}>Geen resultaten voor "{search}"</div>
            : visible.map(a=><WmcLibCard key={a.id+tick} article={a} userId={uid} onOpen={onOpen} wide/>)
          }
        </div>
      ) : (
        <>
          {section('Jouw locatie',a=>a.loc===loc)}
          {section('WMC Verhalen',a=>a.cat==='WMC Verhaal',true)}
          {section('Muzikanten begrijpen',a=>a.cat==='Muzikanten begrijpen')}
          {section('Methode & Mindset',a=>a.cat==='Methode')}
          {section('Protocollen',a=>a.cat==='Protocol')}
          {section('Arena-gidsen',a=>a.cat==='Arena-gids')}
          {section('Tempel-gidsen',a=>a.cat==='Tempel-gids'&&a.loc!==loc)}
          {(role==='sergeant'||role==='manager')&&section('Sergeant-academie',a=>a.cat==='Sergeant-academie')}
          <div style={{marginTop:24,padding:'10px 14px',background:'var(--surface)',borderRadius:8,
            border:'1px solid var(--border)',fontFamily:'var(--font-m)',fontSize:'.6rem',
            color:'var(--dim)',lineHeight:1.6}}>
            💡 Tik op een thumbnail om een eigen foto te uploaden — het icoon verdwijnt zodra je foto er is.
          </div>
        </>
      )}
    </div>
  );
}

function AcademieTab({user}){
  const [activeModule,setActiveModule]=useState(null);
  const [tick,setTick]=useState(0);
  const uid=user?.id||'demo';
  const uHash=user?.hash||null;
  useEffect(()=>{
    WMC_MODULES.forEach(mod=>{
      const st=wmcGetBadge(uid,mod.badge);
      if(st==='LOCKED'&&mod.prereqs.length===0)wmcSetBadge(uid,mod.badge,'AVAILABLE');
      else if(st==='LOCKED'){const all=mod.prereqs.every(b=>wmcGetBadge(uid,b)==='BADGE_ACTIVE');if(all)wmcSetBadge(uid,mod.badge,'AVAILABLE');}
    });
  },[uid,tick]);
  const onBadge=(badge)=>{
    WMC_MODULES.forEach(mod=>{if(mod.prereqs.includes(badge)){const all=mod.prereqs.every(b=>wmcGetBadge(uid,b)==='BADGE_ACTIVE');if(all&&wmcGetBadge(uid,mod.badge)==='LOCKED')wmcSetBadge(uid,mod.badge,'AVAILABLE');}});
    setTick(t=>t+1);
  };
  if(activeModule)return <WmcModulePlayer mod={activeModule} userId={uid} userHash={uHash} onClose={()=>{setActiveModule(null);setTick(t=>t+1);}} onBadgeEarned={onBadge}/>;
  const earned=WMC_MODULES.filter(m=>wmcGetBadge(uid,m.badge)==='BADGE_ACTIVE').length;
  return(
    <div style={{padding:'16px 16px 100px',maxWidth:540,margin:'0 auto'}}>
      <div style={{marginBottom:22}}>
        <div style={{fontFamily:'var(--font-m)',fontSize:'.62rem',color:'var(--sage)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:5}}>WMC 2026 · Digital Sanctuary</div>

        {WMC_MODULES.map(m=>{const a=wmcGetBadge(uid,m.badge)==='BADGE_ACTIVE';return(<div key={m.id} style={{flex:1,textAlign:'center'}}><div style={{fontSize:'1.05rem',filter:a?`drop-shadow(0 0 5px ${m.color}50)`:undefined,opacity:a?1:0.35}}>{m.icon}</div><div style={{fontFamily:'var(--font-m)',fontSize:'.5rem',color:a?m.color:'var(--dim)',marginTop:2}}>{a?'✓':m.number}</div></div>);})}

async function wmcSyncProfile(user) {
  if(typeof SUPABASE_ACTIVE==='undefined'||!SUPABASE_ACTIVE)return;
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/wmc_profiles`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY,
        'Authorization':`Bearer ${SUPABASE_ANON_KEY}`,'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify({
        token:user.token, name:user.name,
        wmc_role:user.wmc_role, location:user.location,
        onboarded:true, onboarded_at:new Date().toISOString()
      })
    });
  }catch(e){}
}

function App() {
  const [user, setUser] = React.useState(null);
  const [screen, setScreen] = React.useState('gate');
  const [mod, setMod] = React.useState(0);
  const [progress, setProgress] = React.useState({});
  const [err, setErr] = React.useState(null);
  const [welcomed, setWelcomed] = React.useState(() => !!ls.get('koraal-welcomed-v81'));

  const TOTAL = 10;

  // Login handler
  const loginUser = React.useCallback((userData) => {
    setUser(userData);

    // ── Zorg dat deze deelnemer een profielrij heeft in Supabase ──
    // Upsert: maakt aan als hij niet bestaat, laat bestaande step ongemoeid
    if (SUPABASE_ACTIVE && userData.role !== 'manager') {
      _supabase
        .from('profiles')
        .upsert({
          token: userData.token,
          name: userData.name,
          role: userData.role,
          onboarding_step: 0
        }, { 
          onConflict: 'token',
          ignoreDuplicates: true  // bestaande onboarding_step NIET overschrijven
        })
        .then(({ error }) => {
          if (error) console.warn('[Sanctuary] Profiel upsert waarschuwing:', error.message);
        });
    }
    if (userData.role === 'manager') {
      setScreen('manager');
    } else if (userData.wmc_role) {
      // WMC token — check of onboarding al gedaan
      const wmcOnboarded = ls.get(`wmc-onboarded-${userData.id}`);
      const displayName  = ls.get(`wmc-displayname-${userData.id}`);
      if (displayName) setUser(u => u ? {...u, name:displayName} : u);
      if (wmcOnboarded) {
        setScreen('workspace');
      } else {
        setScreen('wmc-onboarding');
      }
    } else {
      const saved = ls.get(`koraal-prog-v8-${userData.id}`, {});
      const isDone = ls.get(`koraal-done-v8-${userData.id}`);
      const hasFinalDNA = ls.get(`koraal-final-dna-${userData.id}`);

      /* Migratie: deelnemers die onboarding al afrondden vóór v9.5 fix */
      if (hasFinalDNA && !isDone) {
        ls.set(`koraal-done-v8-${userData.id}`, true);
        const fullProg = {};
        for (let i = 0; i < 10; i++) fullProg[i] = true;
        ls.set(`koraal-prog-v8-${userData.id}`, fullProg);
        setProgress(fullProg);
        setScreen('workspace');
        return;
      }

      setProgress(saved);
      if (isDone || Object.keys(saved).length >= TOTAL) {
        setScreen('workspace');
      } else {
        const first = Array.from({length:TOTAL},(_,i)=>i).find(k=>!saved[k]);
        setMod(first !== undefined ? first : 0);
        setScreen('onboarding');
      }
    }
  }, []);

  // Initial Check
  React.useEffect(() => {
    const t = getToken();
    if (t) {
      const key = t.toUpperCase();
      const userData = TOKENS[key];
      if (userData) {
        ls.set('koraal-last-user', {id:userData.id, token:key});
        loginUser({ ...userData, token: key });
      } else {
        setErr('Ongeldige toegangscode.');
      }
    } else {
      const cached = ls.get('koraal-last-user');
      if (cached && TOKENS[cached.token]) {
        loginUser({ ...TOKENS[cached.token], token: cached.token });
      } else {
        setErr('Geen actieve sessie. Gebruik je persoonlijke link.');
      }
    }
  }, [loginUser]);

  // Render logic
  if (!welcomed) return <WelcomeScreen onContinue={() => { ls.set('koraal-welcomed-v81',true); setWelcomed(true); }}/>;
  if (err && !user) return <GateScreen error={err}/>;
  if (!user) return <div style={{color:'var(--sage)', padding:20, fontFamily:'monospace'}}>Laden van Digital Sanctuary...</div>;

  if (screen === 'manager') return <ManagerView user={user} />;
  if (screen === 'wmc-onboarding') return <WmcOnboarding user={user} onComplete={(displayName)=>{
    const updatedUser={...user,name:displayName};
    setUser(updatedUser);
    setScreen('workspace');
  }}/>;
  if (screen === 'workspace') return <Workspace user={user} />;
  if (screen === 'complete') return <CompletedScreen user={user} onEnterWorkspace={()=>setScreen('workspace')}/>;

  // Onboarding Modules
  const mods = [Mod0Intro, Mod1Consent, Mod2Welkom, Mod3PI, Mod4Basislijn, Mod5Spiegel, Mod6Journal, Mod7Privacy, Mod8Gebruik, Mod9Start];
  const Cur = mods[mod];
  const pct = (Object.keys(progress).length / TOTAL) * 100;

  return (
    <div>
      <div className="hdr">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <div>
            <span className="label">Koraal Op de Bies · Pilot 2026</span>
            <p style={{fontWeight:600,fontSize:'.88rem',marginTop:2}}>{MOD_META[mod].icon} {MOD_META[mod].label}</p>
          </div>
          <div style={{textAlign:'right'}}>
            <p className="dim" style={{fontSize:'.75rem'}}>Module {mod+1}/{TOTAL}</p>
            <p style={{fontWeight:700,color:'var(--sage)',fontSize:'.85rem'}}>{Math.round(pct)}%</p>
          </div>
        </div>
        <div className="pbar"><div className="pbar-fill" style={{width:`${pct}%`}}/></div>
      </div>
      <Cur key={mod} onComplete={() => {
          const next = mod + 1;
          /* Sla voortgang op zodat herstart niet terugstuurt naar module 1 */
          const updatedProg = { ...progress, [mod]: true };
          setProgress(updatedProg);
          ls.set(`koraal-prog-v8-${user.id}`, updatedProg);
          if (next < TOTAL) {
            setMod(next);
          } else {
            ls.set(`koraal-done-v8-${user.id}`, true);
            setScreen('complete');
          }
      }} user={user}/>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
    § ATTACH TO DOM
═══════════════════════════════════════════════════ */
const container = document.getElementById('root');
if (container) {
  const root = ReactDOM.createRoot(container);
  root.render(<App />);
  // Verwijder de Sanctuary Loader zodra React gemount is
  requestAnimationFrame(() => {
    if (typeof window.__sanctuaryReady === 'function') {
      window.__sanctuaryReady();
    }
  });
}
</script>
</body>
</html>
