  const [loading,setLoading] = useState(true);
  
  // Bestaande states voor behoud van je import-functie
  const [imported,setImported]=useState(()=>ls.get('mgr-imported',[]));
  const [importTxt,setImportTxt]=useState('');
  const [importMsg,setImportMsg]=useState('');

  useEffect(()=>ls.set('mgr-imported',imported),[imported]);

  // NIEUW: Fetch live profielen en onboarding-status uit Supabase
  const fetchKoraalData = async () => {
    if(!SUPABASE_ACTIVE) { setLoading(false); return; }
    setLoading(true);
    try {
      const { data, error } = await _supabase
        .from('profiles')
        .select('*')
        .order('onboarding_step', { ascending: false });
      
      if (error) throw error;
      setStaff(data || []);
    } catch (err) {
      console.error("Manager Sync Error:", err);
    } finally {
      setLoading(false);
    }
  };

  useEffect(() => { fetchKoraalData(); }, []);

  // Import handler
  const doImport = () => {
    try {
      const parsed = JSON.parse(importTxt.trim());
      if (!parsed.userId || !Array.isArray(parsed.piEntries)) {
        setImportMsg('❌ Ongeldig formaat. Verwacht: {"userId":"...", "piEntries":[...]}');
        return;
      }
      const entry = { id: parsed.userId, entries: parsed.piEntries, importDate: new Date().toISOString() };
      setImported(prev => [...prev.filter(d => d.id !== entry.id), entry]);
      setImportTxt('');
      setImportMsg(`✓ Data van ${parsed.userId} geïmporteerd (${parsed.piEntries.length} metingen).`);
      setTimeout(() => setImportMsg(''), 4000);
    } catch {
      setImportMsg('❌ JSON-fout. Controleer het formaat.');
    }
  };

  // Handige statistieken berekenen voor het overzicht
  const stats = useMemo(() => {
    const total = staff.filter(s => s.role !== 'manager').length;
    const completed = staff.filter(s => s.onboarding_step >= 10).length;
    const avgStep = total ? (staff.reduce((acc, s) => acc + (s.onboarding_step || 0), 0) / total).toFixed(1) : 0;
    return { total, completed, avgStep };
  }, [staff]);

  return(
    <div style={{paddingBottom:'20px'}}>
      <div className="hdr">
        <div className="wm row sb">
          <div>
            <p className="lbl" style={{color:'var(--gold)'}}>People Intelligence Dashboard</p>
            <p style={{fontWeight:600,fontSize:'.95rem'}}>{user.name} · God Mode</p>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span className="sync-dot sync-ok"/>
            <p className="dim">Koraal-Sanctuary Live</p>
          </div>
        </div>
      </div>

      {/* Tab bar (Geoptimaliseerd met Onboarding) */}
      <div style={{borderBottom:'1px solid var(--b0)',background:'var(--s1)',position:'sticky',top:52,zIndex:90}}>
        <div className="wm" style={{display:'flex',gap:4,padding:'10px 0',overflowX:'auto'}}>
          {[
            ['overview','📊 Status'],
            ['participants','👥 Deelnemers'],
            ['library','📚 Bibliotheek'],
            ['import','📥 Import']
          ].map(([id,l])=>(
            <button key={id} onClick={()=>setTab(id)} style={{
              padding:'8px 16px',borderRadius:8,border:'1px solid var(--b0)',
              background:tab===id?'var(--sage)':'transparent',
              color:tab===id?'#0D1F17':'var(--t1)',fontWeight:600,cursor:'pointer',fontSize:'.85rem'
            }}>{l}</button>
          ))}
        </div>
      </div>

      {/* OVERVIEW TAB */}
      {tab==='overview' && (
        <div className="wm" style={{padding:'28px 20px 80px'}}>
          <div className="g3" style={{marginBottom:16}}>
            <div className="card" style={{textAlign:'center'}}>
              <p className="dim">Actieve Deelnemers</p>
              <p style={{fontFamily:'Syne',fontSize:'2.4rem',fontWeight:800,color:'var(--sage)'}}>{stats.total}</p>
            </div>
            <div className="card" style={{textAlign:'center'}}>
              <p className="dim">Onboarding Voltooid</p>
              <p style={{fontFamily:'Syne',fontSize:'2.4rem',fontWeight:800,color:'var(--blue)'}}>{stats.completed}</p>
            </div>
            <div className="card" style={{textAlign:'center'}}>
              <p className="dim">Gem. Voortgang</p>
              <p style={{fontFamily:'Syne',fontSize:'2.4rem',fontWeight:800,color:'var(--gold)'}}>{stats.avgStep}/10</p>
            </div>
          </div>
          
          <div className="card" style={{background:'rgba(184,149,110,.05)', border:'1px solid var(--gold)'}}>
            <div className="h3">🤖 Strategische Simulatie (SR-17)</div>
            <p className="dim" style={{margin:'10px 0'}}>De onboarding data voedt momenteel de simulatie-engine in het hoofd-dashboard.</p>
            <button onClick={()=>window.location.href=`/dashboard?token=${user.token}`} className="btn bsm">Open People Intelligence Engine</button>
          </div>
        </div>
      )}

{/* PARTICIPANTS TAB met Intake-mogelijkheid */}
      {tab==='participants' && (
        <div className="wm" style={{padding:'28px 20px 80px'}}>
          <div className="h2" style={{marginBottom:20}}>Strategische Monitor</div>
          {loading ? <p className="dim">Data synchroniseren...</p> : (
            <div style={{display:'flex', flexDirection:'column', gap:10}}>
              {staff.filter(s=>s.role!=='manager').map(p => {
                // Uniek ID voor het tekstveld om label-fouten te voorkomen
                const fieldId = `intake-${p.token}`;
                
                return (
                  <div key={p.token} className="card ci" style={{borderLeft: p.onboarding_step >= 10 ? '4px solid var(--sage)' : '4px solid var(--gold)'}}>
                     <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom: 12}}>
                       <div>
                         <div style={{fontWeight:600, fontSize:'1.1rem'}}>{p.name}</div>
                         <div className="dim" style={{fontSize:'.75rem'}}>{p.token}</div>
                       </div>
                       <span className="label" style={{background:'var(--surface-2)', padding:'4px 8px', borderRadius:4}}>
                         Module {p.onboarding_step}/10
                       </span>
                     </div>
                     
                     {/* Strategisch Intake Veld voor Tom & Ralph */}
                     <div style={{marginTop:10, borderTop:'1px solid var(--surface-2)', paddingTop:10}}>
                       {/* FIX: Gebruik htmlFor die matcht met het id van de textarea */}
                       <label htmlFor={fieldId} className="lbl" style={{fontSize:'.7rem', marginBottom:5, display:'block'}}>
                         Strategische Intake / Casus notitie:
                       </label>
                       <textarea 
                         id={fieldId}
                         placeholder="Typ hier de intake informatie die de SR-17 engine moet gebruiken..."
                         style={{
                           width:'100%', background:'var(--void)', border:'1px solid var(--surface-3)', 
                           borderRadius:6, color:'var(--t1)', padding:8, fontSize:'.85rem', minHeight:60
                         }}
                         onBlur={async (e) => {
                           const val = e.target.value;
                           if(!val) return;
                           await _supabase.from('intake_notes').upsert({
                             target_token: p.token,
                             author_token: user.token,
                             content: val,
                             updated_at: new Date().toISOString()
                           }, { onConflict: 'target_token' });
                           console.log("Intake opgeslagen voor " + p.name);
                         }}
                       />
                     </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
      {/* De tabs 'library' en 'import' kunnen behouden blijven zoals in je originele code */}
      {tab==='library' && (
        <div className="wm" style={{padding:'28px 20px 80px'}}>
          <div className="h2" style={{marginBottom:16}}>Inhoudsbibliotheek</div>
          <div className="card">
            <div className="h3">📚 Content Library</div>
            <p className="dim" style={{marginTop:8}}>De bibliotheek toont beschikbare SR-17 content gekoppeld aan de pilot. Beschikbaar na kalibratiefase.</p>
          </div>
        </div>
      )}

      {tab==='import' && (
        <div className="wm" style={{padding:'28px 20px 80px'}}>
          <div className="h2" style={{marginBottom:8}}>Data Import</div>
          <p className="mut" style={{marginBottom:20}}>Deelnemers exporteren hun data (Info-tab → Download JSON) en sturen dat naar jou.</p>
          <div className="card" style={{marginBottom:14}}>
            <div className="h3" style={{marginBottom:10}}>JSON plakken</div>
            <textarea value={importTxt} onChange={e=>setImportTxt(e.target.value)} placeholder='{"userId":"p001","piEntries":[...]}' style={{width:'100%',minHeight:120,padding:'11px 13px',background:'var(--s2)',border:'1px solid var(--b0)',borderRadius:8,color:'var(--t0)',fontSize:14,fontFamily:'monospace',lineHeight:1.5,resize:'vertical',outline:'none',marginBottom:10}}/>
            <button onClick={doImport} disabled={!importTxt.trim()} className="btn bp" style={{width:'auto',padding:'10px 22px',fontSize:14}}>Importeren</button>
            {importMsg&&<p style={{marginTop:10,fontSize:'.88rem',color:importMsg.startsWith('✓')?'var(--koraal-green)':'var(--koraal-amber)'}}>{importMsg}</p>}
          </div>
          {imported.length>0&&(
            <div className="card">
              <div className="h3" style={{marginBottom:10}}>Geïmporteerd ({imported.length})</div>

                <div key={i} className="row sb" style={{padding:'8px 0',borderBottom:i<imported.length-1?'1px solid var(--b0)':'none'}}>
                  <div><p style={{fontWeight:600,fontSize:'.9rem'}}>{d.id}</p><p className="dim">{d.entries?.length||0} entries · {new Date(d.importDate).toLocaleDateString('nl-NL')}</p></div>
                  <button onClick={()=>setImported(p=>p.filter((_,j)=>j!==i))} className="btn bs bsm" style={{fontSize:12}}>Verwijder</button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

    </div>
  );
}

function GateScreen({ error }) {
  const [manualToken, setManualToken] = useState('');
  const [localErr, setLocalErr] = useState('');

  const tryManualLogin = () => {
    const key = manualToken.trim().toUpperCase();
    const userData = TOKENS[key];
    if (userData) {
      ls.set('koraal-last-user', {id:userData.id, token:key});
      window.location.href = window.location.pathname + '?token=' + key;
    } else {
      setLocalErr('Toegangscode niet herkend. Controleer de code uit je e-mail.');
    }
  };

  return (
    <div className="gate">
      <div className="card" style={{maxWidth:400, width:'100%'}}>
        <div style={{textAlign:'center',marginBottom:20}}>
          <div style={{fontSize:'3rem',marginBottom:10}}>🌿</div>
          <h1 style={{fontSize:'1.3rem',fontWeight:700,marginBottom:6,fontFamily:'var(--font-display)'}}>
            Koraal Digital Sanctuary
          </h1>
          <p style={{fontSize:'.88rem',color:'var(--text-muted)'}}>Pilot 2026 · Symbiotic Spark BV</p>
        </div>

        {(error||localErr) && (
          <div className="card card-warn" style={{marginBottom:16,padding:'12px 16px'}}>
            <p style={{fontSize:'.88rem'}}>{localErr||error}</p>
          </div>
        )}

        <p style={{fontSize:'.9rem',color:'var(--text-muted)',marginBottom:12}}>
          Voer je persoonlijke toegangscode in:
        </p>
        <input
          type="text"
          value={manualToken}
          onChange={e => setManualToken(e.target.value)}
          onKeyDown={e => e.key==='Enter' && tryManualLogin()}
          placeholder="KORAAL2026-P001-XXXX"
          style={{
            width:'100%',padding:'12px 14px',background:'var(--surface-2)',
            border:'1px solid var(--border)',borderRadius:10,color:'var(--text)',
            fontSize:14,fontFamily:'var(--font-mono)',marginBottom:12,outline:'none',
            letterSpacing:'.04em'
          }}

        <button
          onClick={tryManualLogin}
          disabled={!manualToken.trim()}
          className="btn bp"
          style={{marginBottom:16,fontFamily:'var(--font-body)'}}
        >
          Inloggen →
        </button>

        <div style={{background:'var(--surface-2)',borderRadius:8,padding:'10px 14px',marginBottom:12}}>
          <p className="dim" style={{fontSize:'.78rem'}}>Of gebruik de directe link uit je onboarding-e-mail.</p>
        </div>
        <p className="dim" style={{fontSize:'.8rem',textAlign:'center'}}>Vragen? vannuystp@gmail.com · HR: 088–015 02 00</p>
      </div>
    </div>
  );
}

    phase1:{title:'Brief van Thomas Hartley, Yorkshire',source:'Carlton Main Frickley Colliery Band · 14 november 1949',text:`Geachte burgemeester Vrancken,\n\nIk schrijf u deze brief vanuit Yorkshire, waar de rook van de kolencentrale nog steeds elk uitzicht op de horizon verhult. Wij zijn drie weken terug uit Kerkrade.\n\nIk ben 34 jaar. Ik ben 17 jaar ondergronds. Ik heb kolenstof in mijn longen die er nooit meer uitkomt, dat weet ik. Maar op de avond van 22 oktober stond ik in uw stadhuis, met een trompet tegen mijn lippen, en voor het eerst in mijn leven voelde ik geen gewicht.\n\nUw vrijwilligers hebben ons niet behandeld als buitenlanders. Ze hebben ons behandeld als muzikanten. Dat verschil — dat kleine, enorme verschil — zal ik nooit vergeten.\n\nMet respect en dankbaarheid,\nThomas Hartley`},
    pillars:[
      {title:'De zes pijlers van het WMC-DNA',items:[{l:'Internationaal',t:'252 ensembles uit 31 landen. Het WMC is het diepste internationale muziekwedstrijdplatform ter wereld.'},{l:'Mijnwerkers-erfgoed',t:'Born uit de kolenmijnen van Kerkrade en Yorkshire. De British Miners Bands kwamen in 1949 — niet als winnaars, maar als mensen die herstelden via muziek.'},{l:'Kerkrade als Klankstad',t:'350.000 bezoekers. De stad transformeert. Jij bent mede-architect van die transformatie.'},{l:'Competitie als verbinding',t:'De wedstrijd is het voertuig, niet het doel. Ensembles komen om te meten, te leren, en contact te maken.'},{l:'Kwaliteit boven spektakel',t:'Het WMC kiest bewust voor muzikale diepgang. Jurering is streng en onafhankelijk. De integriteit is niet onderhandelbaar.'},{l:'Vrijwilligers als ruggengraat',t:'500+ vrijwilligers. Elke gast die een stoel vindt omdat jij er was — dat is het WMC.'}]},
      {title:'De ZAKVE-doctrine',items:[{l:'Z — Zelfstandig',t:'Je weet wat je moet doen zonder dat het gevraagd wordt.'},{l:'A — Autonoom',t:'Je neemt beslissingen op basis van begrip, niet op basis van instructies.'},{l:'K — Kwaliteit',t:'Je levert wat verwacht wordt — consistent, ook als het niet gemakkelijk is.'},{l:'V — Vertrouwen',t:"Collega's, gasten en muzikanten kunnen op jou rekenen."},{l:'E — Expertise',t:'Je kent jouw domein. Je weet wat in jouw locatie speelt.'}]},

    questions:[
      {q:'Welk jaar werd het eerste WMC gehouden?',opts:['1945','1951','1949','1960'],correct:1,exp:'Het eerste WMC was in 1951. De British Miners Bands kwamen in 1949 — dat was het culturele zaadje, niet het concours zelf.'},
      {q:'Wat is de kern van de ZAKVE-doctrine?',opts:['Zorg, Aandacht, Kwaliteit, Veiligheid, Efficiëntie','Zelfstandig, Autonoom, Kwaliteit, Vertrouwen, Expertise','Zekerheid, Aanpassing, Kennis, Verbinding, Ervaring','Zichtbaar, Actief, Klaar, Vakkundig, Empathisch'],correct:1,exp:'ZAKVE staat voor de vijf operationele kernwaarden van de WMC vrijwilligersdoctrine.'},
      {q:'Hoeveel vrijwilligers draaien het WMC 2026?',opts:['Meer dan 200','Meer dan 1000','Meer dan 500','Precies 350'],correct:2,exp:'500+ vrijwilligers vormen samen de operationele ruggengraat naast 350.000 bezoekers en 20.000 muzikanten.'},
    ],
    sjt:{situation:"Je staat bij de ingang van de Rodahal. Een muzikant van een Japans ensemble loopt langs. Hij ziet er uitgeput uit — rugzak, instrumentenkoffer, vermoeide blik. Hij maakt geen oogcontact. Een collega fluistert: 'Vraag hem of hij hulp nodig heeft.'",opts:['Je spreekt hem aan: "Kan ik u helpen, meneer?"','Je wacht tot hij zelf iets vraagt.','Je loopt naast hem mee en wijst zwijgend naar de kluizen.','Je vraagt je collega het over te nemen.'],correct:1,exp:'De muzikant heeft geen oogcontact gemaakt — dat is een signaal. Aanspreken onderbreekt zijn mentale voorbereiding. Wacht. Jouw zichtbare aanwezigheid communiceert al: er is iemand als je iets nodig hebt.'},
    reflections:[{n:1,text:'Thomas Hartley schreef dat de vrijwilligers van 1949 hem lieten vergeten hoe zwaar het leven was — niet door iets te doen, maar door er te zijn. Wanneer heb jij zelf ooit iemand ontmoet die precies dat voor jou deed?',sanctuary:'Teruggespeeld bij Oranje check-in in week 2 als ankerpunt voor ontvangen zorg.'},{n:2,text:'Als jouw dienst op het WMC zijn zwaarste punt bereikt — wat is dan jouw persoonlijke vonk? Niet wat je zou moeten voelen, maar wat je in werkelijkheid weet dat je draaiende houdt.',sanctuary:'Primair ankerpunt bij Rode check-in.',critical:true}],
    activation:{head:'De Vonk is actief.',body:'Thomas Hartley schreef zijn brief drie weken na zijn terugkeer. Hij wachtte omdat hij de woorden nog niet had. Nu heb jij ze.'},

  {id:'m2',number:2,title:'De Wereldtaal',sub:'Internationale Gastvrijheid',badge:'DE_DANS',icon:'🌍',badgeLabel:'De Dans',color:'#5a8aaa',duration:15,domain:'Relaties & Communicatie',prereqs:['DE_VONK'],passScore:0.75,
    phase1:{title:'Tourdagboek van Yuki Matsumoto, fluitiste',source:'Osaka Municipal Wind Orchestra · WMC 2013 · Vertaald met toestemming',text:`Dag 4 — Kerkrade\n\nWe landen om 06:15. Ik heb 22 uur niet geslapen. Een vrouw staat bij de ingang van de Rodahal. Ze zegt niets. Ze wijst. Ze geeft me een flesje water. Ze glimlacht en loopt weg.\n\nIk heb haar naam nooit geweten. Maar ik denk nog steeds aan haar.\n\nDag 5 — De dag voor het optreden\n\nEen vrijwilliger vraagt me hoe het gaat. Ik zeg: 'Fine, thank you.' Ik loop door. Hij roept me na: 'Er staat een stoel in de gang als u even wilt zitten.'\n\nIk ben gaan zitten. Vijftien minuten. Niemand heeft me aangesproken. Dat was het meest gastvrije wat iemand ooit voor mij heeft gedaan.\n\nDag 6 — Na het optreden\n\nIemand legde een flesje water naast me zonder te kijken. Later hoorde ik: een vrijwilliger. Twintig jaar oud. Zijn eerste dag.\n\nAls hij dit ooit leest: u heeft het goed gedaan.`},
    pillars:[
      {title:'De Muzikanten-Radar',items:[{l:'Isolatie',t:'Stil naar de grond kijken = mentale voorbereiding. Spreek nooit aan. Geen oogcontact tenzij geïnitieerd.'},{l:'Ademhaling',t:'Diep, bewust ademhalen = arousal-regulatie. De muzikant daalt zijn hartslag. Onderbreek het nooit.'},{l:'Herhaling',t:'Vingeroefeningen, zachte toonherhalingen = spiergeheugenanker. Onderbreek ze nooit.'},{l:'Agitatie',t:'Snelle bewegingen, pacing = overstimulatie, geen onbeleefdheid. Geef ruimte. Stel geen vragen.'},{l:'Stille ontlading',t:'Na het optreden: leeg gezicht, hangende schouders = herstel. Bied water. Geef een stoel. Dat is alles.'}]},
      {title:'Culturele choreografie',items:[{l:'Aziatische groepen',t:'Twee-handen protocol: overhandig altijd documenten met twee handen. Oogcontact kort houden. Stilte: vul hem niet op.'},{l:'Amerikaanse groepen',t:"Can-do mentaliteit: zeg nooit 'dat is niet mogelijk' zonder direct een alternatief. Match hun energie."},{l:'Zuid-Europese groepen',t:'Relatie eerst. Kleinere persoonlijke ruimte is warmte, geen grensoverschrijding.'},{l:"Muzikanten (alle regio's)",t:'Water staat er altijd. Instrumenten zijn heilig: vraag expliciet toestemming voor je iets aanraakt.'}]},
    ],
    questions:[
      {q:'Wat doe je als een muzikant vlak vóór zijn optreden stil naar de grond kijkt?',opts:['Je vraagt: "Is alles goed?"','Je laat hem volledig met rust','Je biedt water aan','Je haalt zijn begeleider erbij'],correct:1,exp:'Mentale voorbereiding vereist ononderbroken concentratie. Aanspreken — zelfs empathisch — doorbreekt dit.'},
      {q:'Welk gebaar is onmisbaar bij Aziatische gasten?',opts:['Diep buigen','Geen direct oogcontact','Twee handen bij overhandigen','Fluisteren als respect'],correct:2,exp:'Het twee-handige overhandigen is diep geworteld in Oost-Aziatische etiquette.'},
      {q:'Een Zuid-Europese gast staat dichter bij je dan je gewend bent. Wat doe je?',opts:['Je stapt achteruit','Je vraagt meer ruimte','Je blijft staan — het is warmte','Je belt een collega'],correct:2,exp:'Kleinere persoonlijke ruimte is een culturele norm. Achteruittappen wordt gelezen als afwijzing.'},
    ],
    sjt:{situation:'Backstage in de Rodahal. Een soliste komt net van het podium — ademt zwaar, geïsoleerd op de grond, geen oogcontact. Een persfotograaf met VIP-pass loopt op haar af: "Can I get a quote about the acoustics?"',opts:['Je zegt dat hij eerst de bandmanager moet vinden.','Je vraagt de soliste of ze zich goed voelt.','Je onderschept de fotograaf vriendelijk, geeft de soliste stil water — geen woorden.','Je verwijst de fotograaf naar de perszaal.'],correct:2,exp:'De soliste herstelt fysiologisch. Jij beschermt haar grens en biedt de minimale service: aanwezigheid en water. Geen woorden, geen vragen.'},
    reflections:[{n:3,text:'Yuki Matsumoto schreef dat de vrijwilliger die haar een stoel aanbood meer voor haar deed dan iemand die haar had aangesproken. Beschrijf een moment waarop jij iets zag bij een ander maar bewust niets zei. Waarom niet?',sanctuary:'Ontwikkelt onderscheid tussen actieve stilte en passiviteit.'},{n:4,text:'Muzikanten na een optreden hebben ruimte en water nodig, geen woorden. Denk aan een moment in jouw eigen leven waarop jij na een grote inspanning precies dat nodig had. Wie gaf het je?',sanctuary:'Verankert empathie in persoonlijke ervaring.'}],
    activation:{head:'De Dans is actief.',body:'Yuki Matsumoto vergat de naam van de vrijwilliger die haar een stoel gaf. Maar ze vergat hem nooit. Dat is de dans.'},
  },
  {id:'m3',number:3,title:'De Arena & De Tempel',sub:'Locaties · Veiligheid · Etiquette',badge:'DE_PLEK',icon:'📍',badgeLabel:'De Plek',color:'#4aaa68',duration:10,domain:'Ritme & Werkstructuur',prereqs:['DE_VONK'],passScore:0.78,
    phase1:{title:'Operationeel Logboek · Stagemanager WMC 2009',source:'M.V. · Stagemanager Rodahal & Stadion · Geanonimiseerd',text:`Zaterdag 18 juli — Rodahal, 14:33\n\nTijdens het optreden viel er achter mij iets op de vloer. Een pennetje. Plastic. Gewicht: nul gram. De dirigent op het podium keek op.\n\nIk heb dat pennetje opgeraapt en er een halfuur aan gedacht.\n\nIn de Tempel is een pennetje op de vloer een incident.\n\nZondag 19 juli — Stadion, 15:47\n\nDuizend man publiek. Vier bands in de omkleedruimte. Twee kapotte communicatiesets. Eén fanfare die het veld op liep voordat het sein werd gegeven. Ik heb niemand in paniek gezien.\n\nIn de Arena is een fanfare die te vroeg loopt geen incident. Het is dinsdag.\n\nReflectie, op de trein terug:\n\nIn de Tempel is jouw onzichtbaarheid het product.\nIn de Arena is jouw zichtbaarheid het product.\n\nAls je dat verschil begrijpt voor je eerste dienst, red je het.`},
    pillars:[
      {title:'De Tempel — Rodahal & Theater',items:[{l:'Beweging',t:'Loop langs de buitenwanden, nooit door het middenvlak. Zachte zolen verplicht.'},{l:'Communicatie',t:'Handgebaren zijn de standaardtaal. Naar jezelf wijzen = ik regel dit. Eén vinger omhoog = één moment.'},{l:'Deuren',t:'Elke deur die opengaat maakt geluid. Deur openen = klap op het podium. Altijd dicht. Geen uitzonderingen.'},{l:'Service timing',t:'Dranken vóór aanvang. Tijdens optreden: nul handelingen. Daarna: normaal tempo, gedempte stem.'}]},
      {title:'De Arena — Parkstad Stadion',items:[{l:'10-yard regel',t:'WFIMC-regel: geen personeel binnen tien yard van de marching zone tijdens een optreden. Absoluut.'},{l:'Props',t:'Grote props: alleen bevoegd stagepersoneel. Grounding verplicht bij windkracht 4+.'},{l:'Instrumenten',t:'Een sousafoon weegt 12 kilo. Nooit aanraken zonder expliciete toestemming. Transportwagens zijn er — gebruik ze.'},{l:'Zichtbaarheid',t:'In de Arena ben jij het product. Sta op de hoeken. Beweeg met militaire precisie en Limburgse glimlach — tegelijk.'}]},
    ],
    questions:[
      {q:'Wat IS het product in de Rodahal?',opts:['Bier en service','Muziek','Stilte','Zichtbaarheid'],correct:2,exp:'De akoestische stilte is letterlijk het product. Elk geluid compromitteert de concertervaring.'},
      {q:'Wat is de 10-yard regel in het Stadion?',opts:['Afstand tussen mediawagens','Grens voor personeel tijdens marching','Maximale afstand tot nooduitgang','Marge bij propopstelling'],correct:1,exp:'WFIMC-regels bepalen een exclusieve zone. Overtreding kan leiden tot diskwalificatie van het ensemble.'},
      {q:'Welk handgebaar betekent "ik regel dit" in de Tempel?',opts:['Duim omhoog','Wijs naar de deur','Wijs naar jezelf','Open hand naar voren'],correct:2,exp:'Het non-verbale alfabet van de Tempel heeft vaste betekenissen. Naar jezelf wijzen = eigenaarschap.'},
    ],
    sjt:{situation:'Je werkt in de brasserie van de Rodahal. Midden in een optreden. Een gast vraagt een bier. Je pakt een glas. Het glas rinkelt licht. De dirigent draait zijn hoofd.',opts:['Je geeft het bier — het was een klein geluid.','Je vraagt de gast later terug te komen.','Je stopt, zet het glas neer, maakt een stilte-gebaar en wacht op een rustpauze.','Je fluistert een verontschuldiging.'],correct:2,exp:'Stoppen is correct. Méér geluid toevoegen maakt het erger. Wachten op een rustpauze is de enige juiste interventie.'},
    reflections:[{n:5,text:'De stagemanager schreef: "In de Tempel is jouw onzichtbaarheid het product. In de Arena is jouw zichtbaarheid het product." In welke van deze twee omgevingen voel jij je van nature het meest thuis — en wat zegt dat over hoe jij het best kunt bijdragen?',sanctuary:'Voedt de rol-aanbeveling. Bepaalt toon dagelijkse briefing.'},{n:6,text:'Beschrijf een situatie — op werk of privé — waarin jij iets zag wat gevaarlijk of fout was, maar niet onmiddellijk ingreep. Wat weerhield je? Wat zou je nu anders doen?',sanctuary:'Voorbereiding op veiligheidsprotocollen.'}],
    activation:{head:'De Plek is actief.',body:'Een pennetje op de vloer is in de Tempel een incident. In de Arena is een fanfare die te vroeg loopt gewoon dinsdag. Jij leest de ruimte. De ruimte leest jou.'},
  },
  {id:'m4',number:4,title:'De Kracht',sub:'VIP · Jury · SpiegelSessie',badge:'DE_SPIEGEL',icon:'🪞',badgeLabel:'De Spiegel',color:'#c4965e',duration:14,domain:'Vaardigheden & Verwachtingen',prereqs:['DE_VONK','DE_DANS','DE_PLEK'],passScore:0.80,
    phase1:{title:'WFIMC — Artikel 7: Juryisolatie & Integriteitsprotocol',source:'Sterk ingekort en geanonimiseerd voor intern trainingsgebruik',text:`ARTIKEL 7.3 — VERTROUWELIJKHEID EN ISOLATIE\n\nJuryleden mogen GEEN direct of indirect contact hebben met: deelnemende ensembles of hun vertegenwoordigers / sponsors of donateurs / persvertegenwoordigers niet geaccrediteerd door de organisatie.\n\nARTIKEL 7.4 — VERANTWOORDELIJKHEID VAN FACILITAIR PERSONEEL\n\nHet is de expliciete verantwoordelijkheid van alle gastvrijheidsmedewerkers om elk verzoek tot contact te weigeren, ongeacht status of toon — en onmiddellijk te rapporteren aan de wedstrijdcoördinator.\n\nNOOT VAN DE WMC-ORGANISATIE:\n\nIn 2009 werd een jurylid in een hotellobby aangesproken door een sponsor. "Even gedag zeggen." De wedstrijd werd stilgelegd. De uitslag werd twee maanden later vernietigd.\n\nJij bent de laatste verdedigingslinie voor de integriteit van een wereldkampioenschap.`},
    pillars:[
      {title:'Zero-Inference bij jurybegeleiding',items:[{l:'Geen gesprek',t:'Ook niet als het jurylid initiatief neemt over deelnemende ensembles. Geen reactie, geen mening, geen bevestiging.'},{l:'Geen geschenken',t:'Ontvang met waardigheid, leid om naar de supervisor. Weigeren zonder diplomatie beschadigt de relatie.'},{l:'Geen lobbying',t:'Als een bandvertegenwoordiger jou benadert om iets door te geven aan de jury: stop het gesprek, rapporteer.'},{l:'Twijfel = verboden',t:'Als je twijfelt of iets mag: het mag niet. Bel de coördinator. Altijd.'}]},
      {title:'De SpiegelSessie als methodiek',items:[{l:'Drie vragen',t:'Wat heb jij gegeven dit weekend? → Wat heeft het jou gekost? → Wat heb jij nodig vóór het volgende weekend?'},{l:'Geen beoordeling',t:'Geen evaluatiegesprek. Geen rapportage. Geen advies tenzij expliciet gevraagd.'},{l:'Jouw rol',t:'Luisteren. Herhalen wat je hoort. Stille aanwezigheid. De enige handeling die van jou wordt gevraagd: blijven zitten.'}]},
    ],
    questions:[
      {q:'Wanneer initieer jij gesprek bij jurybegeleiding?',opts:['Als het jurylid er moe uitziet','Als ze om programma-info vragen','Nooit, tenzij aangesproken — en dan alleen logistiek','Na afloop van de beoordelingsdag'],correct:2,exp:'Zero-Inference vereist absolute passiviteit. Elk initiatief riskeert onbedoelde beïnvloeding.'},
      {q:'Een VIP-sponsor biedt een envelop aan "voor de jury". Wat doe je?',opts:['Je weigert direct en legt uit waarom.','Je accepteert en geeft het door aan de jury.','Je accepteert met waardigheid en leidt het om naar de supervisor.','Je vraagt de sponsor het zelf in te leveren.'],correct:2,exp:'Weigeren beschadigt de donateursrelatie. Accepteren en omleiden beschermt de integriteit en de relatie.'},
      {q:'Wat zijn de drie vragen van een SpiegelSessie?',opts:['Hoe was je dienst? Wat ging goed? Wat ging fout?','Wat heb je gegeven? Wat heeft het gekost? Wat heb je nodig?','Hoe voel je je? Wat verandert er? Wat wil je leren?','Wat was je energie? Wie heeft geholpen? Wat doe je anders?'],correct:1,exp:'Geven → kosten → behoefte. Drie vragen, geen beoordeling.'},
    ],
    sjt:{situation:'Bij de VIP-ingang. Een Platinum-sponsor nadert met een luxe geschenkmand: "Dit is voor de jury. Ze doen zo goed werk. Kun jij dat regelen? Nog twintig minuten tot de beoordeling."',opts:['Je accepteert en brengt het naar de juryruimte.','Je weigert vriendelijk: "Dat kan helaas niet."','Je accepteert met oprechte dankbaarheid en brengt de mand naar het archief — zonder de jury te contacteren.','Je roept je supervisor er onmiddellijk bij.'],correct:2,exp:'De sponsor heeft een oprechte intentie. Accepteren met warmte erkent die intentie. De omleiding beschermt de jury zonder de sponsor te kleineren.'},
    reflections:[{n:7,text:'De VIP-module stelt dat jij de laatste verdedigingslinie bent voor de integriteit van een wereldkampioenschap. Wanneer voelde jij voor het eerst dat jij persoonlijk verantwoordelijk was voor iets dat groter was dan jijzelf? Hoe ging je daarmee om?',sanctuary:'Verankert professionele ernst.'},{n:8,text:'De SpiegelSessie gaat over data bekijken zonder oordeel. Hoe sta jij zelf tegenover feedback? Wanneer voelt feedback als een aanval — en wanneer voelt het als hulp? Wat maakt het verschil?',sanctuary:'Bepaalt toon waarmee Spiegel-badge drager gesprekken faciliteert.'}],
    activation:{head:'De Spiegel is actief.',body:'Een spiegel oordeelt niet. Een spiegel toont wat er is. Dat is de kracht die jij nu draagt: zien — en tonen — zonder te oordelen.'},
  },
  {id:'m5',number:5,title:'De Symbiose',sub:'Teamwerk · Draagkracht · Buddy',badge:'DE_BRUG',icon:'🌉',badgeLabel:'De Brug',color:'#6eaa8c',duration:16,domain:'Welzijn & Energiebeheer',prereqs:['DE_VONK','DE_DANS','DE_PLEK'],passScore:0.78,
    phase1:{title:'End-of-Shift Handover Rapport — WMC 2017, Week 3',source:'Shiftleider Team B, Rodahal Horeca · Geanonimiseerd met toestemming',text:`Datum: Donderdag 20 juli 2017, 23:58 · Shift: 15:00–24:00\nBijzonderheden operatie: Geen incidenten.\n\nBijzonderheden team:\n\nMedewerker [naam] had om 21:30 een licht duizelig moment. Zij had dit niet gemeld — ik heb het waargenomen aan haar manier van lopen bij de trap. Ik heb haar taak aangepast naar de afwaspost. Zij wilde protesteren. Ik heb gezegd: "Je doet dit voor morgen, niet voor vanavond."\n\nZij is morgen als eerste begonnen. Volledig herstel.\n\nAanbeveling: Welzijnsstatus meenemen in de overdracht. Niet als verplichting — als informatieverstrekking.\n\nAfgehandeld door: [naam] · Dienst 14 van 16 · Slotweekend volgende week.`},
    pillars:[
      {title:'Het Zaagtandprofiel & de Continuïteitsformule',items:[{l:'Weekend 1 · 9–12 juli',t:'MAXIMAAL — Opening & Parade. Herstelvenster: 13–15 juli.'},{l:'Weekend 2 · 16–19 juli',t:'HOOG — Mars & Show. Herstelvenster: 20–22 juli.'},{l:'Weekend 3 · 23–26 juli',t:'MEDIUM/HOOG — Concertwedstrijden. Herstelvenster: 27–29 juli.'},{l:'Weekend 4 · 30 jul–2 aug',t:'MAXIMAAL — Slotweekend & Finale. Herstelvensters zijn operationeel, niet vrij.'},{l:'S + H ≥ T',t:'Staat + Herstel ≥ Aankomende Taak. Als de formule negatief wordt: eerst taak aanpassen, dan herstel verlengen, dan persoon opvangen.'}]},
      {title:'Het Buddy-systeem in de praktijk',items:[{l:'Tempo daalt onmerkbaar',t:'Net iets trager dan normaal. Niet zichtbaar voor gasten, maar jij ziet het.'},{l:'Verbaal minder',t:'Korte antwoorden, geen grappigheid meer, minder initiatief.'},{l:'Interventie',t:'Stap 1: water neerzetten zonder woorden. Stap 2: "Heb je even?" — geen diagnose. Stap 3: melden bij Sergeant als informatieverstrekking.'}]},
    ],
    questions:[
      {q:'Wat is de Continuïteitsformule?',opts:['Tempo + Kwaliteit ≥ Verwachting','Staat + Herstel ≥ Aankomende Taak','Energie + Buddy ≥ Weekend','Input + Feedback ≥ Output'],correct:1,exp:'S + H ≥ T. Als de formule negatief wordt: eerst taak aanpassen, dan herstel verlengen, dan persoon opvangen.'},
      {q:'Wat betekent een Oranje Sanctuary check-in?',opts:['Volledig uitgevallen','Kwetsbaar — aanwezig maar beperkt inzetbaar, Buddy actief','Tijdelijk ziek, afwezig','Geen dienst vandaag'],correct:1,exp:'Oranje is geen afwezigheid — het is een precisie-signaal. De Sergeant en het systeem weten: vandaag voorzichtig.'},
      {q:'Welke interventie gebruik je EERST als S + H < T?',opts:['Persoon naar huis sturen','Buddy-protocol activeren','Taak aanpassen','Herstelvenster verlengen'],correct:2,exp:'De volgorde is: taak aanpassen → herstel verlengen → persoon opvangen. Minst ingrijpend eerst.'},

    sjt:{situation:'Dag 12, Weekend 3. Jij bent Crew Buddy. Thomas — drie edities ervaring — is anders vandaag. Stiller. Twee kleine vergissingen die hij normaal nooit maakt. Hij drinkt zijn koffie op zonder het te proeven.',opts:['Je vraagt: "Gaat het goed met je, Thomas?"','Je laat het — iedereen heeft een slechte dag.','Je wacht tot de shift voorbij is en stuurt hem een berichtje.','Je zet water naast hem. Later: "Heb je even?" — je luistert. Daarna meld je het aan de Sergeant als informatie.'],correct:3,exp:'Water zonder vraag = non-verbale aanwezigheid. "Heb je even?" opent zonder diagnose. Melden aan Sergeant = zien, benoemen, doorgeven. Dat is het Buddy-systeem.'},

/* Badge state machine */
const WMC_VALID_TRANS={LOCKED:['AVAILABLE'],AVAILABLE:['IN_PROGRESS'],IN_PROGRESS:['L1_PASSED','L1_FAILED'],L1_FAILED:['L1_COOLDOWN'],L1_COOLDOWN:['L1_RETRY'],L1_RETRY:['L1_PASSED','L1_FAILED'],L1_PASSED:['L2_COMPLETE'],L2_COMPLETE:['L3_COMPLETE'],L3_COMPLETE:['BADGE_ACTIVE'],BADGE_ACTIVE:[]};
function wmcGetBadge(uid,badge){return ls.get(`wmc-badge-${uid}-${badge}`,'LOCKED');}
function wmcSetBadge(uid,badge,next){
  const cur=wmcGetBadge(uid,badge);
  if(!(WMC_VALID_TRANS[cur]||[]).includes(next)){console.warn(`[WMC Badge] Geblokkeerd: ${cur}→${next}`);return false;}
  ls.set(`wmc-badge-${uid}-${badge}`,next);return true;
}
function wmcGetProg(uid,mid){return ls.get(`wmc-mod-${uid}-${mid}`,{});}
function wmcSetProg(uid,mid,data){ls.set(`wmc-mod-${uid}-${mid}`,{...wmcGetProg(uid,mid),...data});}
function wmcSaveRefl(uid,n,text){const k=`wmc-refl-${uid}`;ls.set(k,{...(ls.get(k,{})),[n]:{text,savedAt:new Date().toISOString()}});}
function wmcGetRefl(uid,n){return(ls.get(`wmc-refl-${uid}`,{})||{})[n]?.text||'';}
async function wmcSyncBadge(userHash,badge,status){
  if(typeof SUPABASE_ACTIVE==='undefined'||!SUPABASE_ACTIVE||!userHash)return;
  try{await fetch(`${SUPABASE_URL}/rest/v1/badge_progress`,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}`,'Prefer':'resolution=merge-duplicates'},body:JSON.stringify({user_hash:userHash,badge_id:badge,status,updated_at:new Date().toISOString()})});}catch(e){}
}

function WmcKnowledgeFlash({questions,onDone,passScore}){
  const [idx,setIdx]=useState(0);
  const [answers,setAnswers]=useState({});
  const [showRes,setShowRes]=useState(false);
  const [done,setDone]=useState(false);
  const q=questions[idx];
  const select=(i)=>{
    if(answers[idx]!==undefined)return;
    setAnswers(a=>({...a,[idx]:i}));
    setShowRes(true);
    haptic(i===q.correct?'medium':'heavy');
    setTimeout(()=>{setShowRes(false);if(idx<questions.length-1)setIdx(x=>x+1);else setDone(true);},1800);
  };
  if(done){
    const sc=Object.keys(answers).filter(k=>answers[k]===questions[k].correct).length;
    const pct=sc/questions.length;
    const pass=pct>=passScore;
    return(
      <div style={{textAlign:'center',padding:'24px 0 80px'}}>
        <div style={{fontSize:'2.5rem',marginBottom:10}}>{pass?'✓':'✗'}</div>
        <div style={{fontFamily:'var(--font-d)',fontSize:'1.5rem',fontWeight:300,marginBottom:6}}>{pass?'Kennislaag behaald':'Nog niet genoeg'}</div>
        <div style={{fontFamily:'var(--font-m)',fontSize:'.72rem',color:'var(--dim)',marginBottom:22}}>{sc}/{questions.length} correct · {Math.round(pct*100)}% · Drempel: {Math.round(passScore*100)}%</div>
        <button onClick={()=>onDone(pass)} style={{padding:'12px 28px',background:pass?'var(--sage-b)':'var(--surface-2)',border:`1px solid ${pass?'var(--border-act)':'var(--border)'}`,borderRadius:10,color:pass?'var(--sage)':'var(--muted)',fontWeight:600,cursor:'pointer'}}>{pass?'Verder →':'Opnieuw proberen'}</button>
      </div>
    );
  }
  return(
    <div style={{paddingBottom:80}}>
      <WmcProgressBar value={idx+1} max={questions.length}/>
      <div style={{fontFamily:'var(--font-m)',fontSize:'.62rem',color:'var(--dim)',marginBottom:10,letterSpacing:'.06em'}}>VRAAG {idx+1} VAN {questions.length}</div>
      <div style={{fontSize:'1rem',fontWeight:500,lineHeight:1.6,marginBottom:18}}>{q.q}</div>
      {q.opts.map((opt,i)=>{
        const chosen=answers[idx]===i;const correct=i===q.correct;
        const bg=showRes&&chosen?(correct?'rgba(74,170,104,.15)':'rgba(196,96,74,.12)'):chosen?'var(--sage-b)':'var(--surface)';
        const bc=showRes&&chosen?(correct?'rgba(74,170,104,.5)':'rgba(196,96,74,.5)'):chosen?'var(--border-act)':'var(--border)';
        return(<button key={i} onClick={()=>select(i)} style={{width:'100%',marginBottom:7,padding:'11px 13px',background:bg,border:`1px solid ${bc}`,borderRadius:8,textAlign:'left',cursor:'pointer',fontSize:'.85rem',color:'var(--text)',lineHeight:1.5,transition:'all .15s'}}>
          <span style={{fontFamily:'var(--font-m)',fontSize:'.62rem',color:'var(--dim)',marginRight:7}}>{'ABCD'[i]}</span>{opt}
        </button>);
      })}
      {showRes&&answers[idx]!==undefined&&<div style={{marginTop:10,padding:'10px 13px',background:'var(--surface-2)',borderRadius:8,fontSize:'.82rem',color:'var(--muted)',lineHeight:1.5}}>{answers[idx]===q.correct?'✓ Correct — ':'✗ — '}{q.exp}</div>}
    </div>
  );
}

function WmcSJTLayer({sjt,onDone}){
  const [chosen,setChosen]=useState(null);
  const [revealed,setRevealed]=useState(false);
  return(
    <div style={{paddingBottom:80}}>
      <div style={{fontFamily:'var(--font-m)',fontSize:'.62rem',color:'var(--gold)',marginBottom:10,letterSpacing:'.06em'}}>SITUATIE</div>
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'14px',marginBottom:18,fontSize:'.86rem',lineHeight:1.7,color:'var(--muted)'}}>{sjt.situation}</div>
      <div style={{fontFamily:'var(--font-m)',fontSize:'.62rem',color:'var(--dim)',marginBottom:10}}>KIES DE BESTE REACTIE</div>
      {sjt.opts.map((opt,i)=>{
        const sel=chosen===i;const correct=i===sjt.correct;
        const bg=revealed&&sel?(correct?'rgba(74,170,104,.15)':'rgba(196,96,74,.1)'):'var(--surface)';
        const bc=revealed&&sel?(correct?'rgba(74,170,104,.5)':'rgba(196,96,74,.4)'):sel?'var(--border-act)':'var(--border)';
        return(<button key={i} onClick={()=>{if(!revealed){setChosen(i);haptic('light');}}} style={{width:'100%',marginBottom:7,padding:'11px 13px',background:bg,border:`1px solid ${bc}`,borderRadius:8,textAlign:'left',cursor:revealed?'default':'pointer',fontSize:'.84rem',color:'var(--text)',lineHeight:1.5,transition:'all .2s'}}>
          <span style={{fontFamily:'var(--font-m)',fontSize:'.62rem',color:'var(--dim)',marginRight:7}}>{'ABCD'[i]}</span>{opt}
        </button>);
      })}
      {chosen!==null&&!revealed&&<button onClick={()=>{setRevealed(true);haptic('medium');}} style={{width:'100%',marginTop:4,padding:'12px',background:'var(--sage-b)',border:'1px solid var(--border-act)',borderRadius:8,color:'var(--sage)',fontWeight:600,fontSize:'.88rem',cursor:'pointer'}}>Toon uitleg →</button>}
      {revealed&&<>
        <div style={{marginTop:14,padding:'13px 15px',background:'var(--surface-2)',border:'1px solid var(--border)',borderRadius:10}}>
          <div style={{fontFamily:'var(--font-m)',fontSize:'.62rem',color:'var(--gold)',marginBottom:7,letterSpacing:'.04em'}}>MASTERY TOELICHTING</div>
          <div style={{fontSize:'.84rem',lineHeight:1.65,color:'var(--muted)'}}>{sjt.exp}</div>
        </div>
        <button onClick={()=>{haptic('medium');onDone();}} style={{width:'100%',marginTop:10,padding:'12px',background:'var(--sage-b)',border:'1px solid var(--border-act)',borderRadius:10,color:'var(--sage)',fontWeight:600,cursor:'pointer'}}>Doorgaan naar reflectie →</button>
      </>}
    </div>
  );
}

function WmcReflectionLayer({mod,userId,onDone}){
  const [idx,setIdx]=useState(0);
  const [texts,setTexts]=useState(()=>mod.reflections.map(r=>wmcGetRefl(userId,r.n)));
  const r=mod.reflections[idx];
  const wc=(texts[idx]||'').trim().split(/\s+/).filter(Boolean).length;
  const MIN=40;const ok=wc>=MIN;
  const save=()=>{wmcSaveRefl(userId,r.n,texts[idx]);haptic('medium');if(idx<mod.reflections.length-1)setIdx(i=>i+1);else onDone();};
  return(
    <div style={{paddingBottom:100}}>
      <WmcProgressBar value={idx+1} max={mod.reflections.length} color='var(--gold)'/>
      <div style={{fontFamily:'var(--font-m)',fontSize:'.62rem',color:'var(--gold)',marginBottom:7,letterSpacing:'.06em'}}>REFLECTIE {r.n} VAN 10</div>
      {r.critical&&<div style={{fontFamily:'var(--font-m)',fontSize:'.6rem',color:'var(--red)',marginBottom:8,padding:'5px 9px',background:'rgba(196,96,74,.1)',borderRadius:6,border:'1px solid rgba(196,96,74,.25)'}}>⚑ KRITISCH — wordt teruggespiegeld op je moeilijkste dag</div>}
      <div style={{fontFamily:'var(--font-d)',fontStyle:'italic',fontWeight:300,fontSize:'1.02rem',lineHeight:1.8,marginBottom:14,color:'var(--text)'}}>"{r.text}"</div>
      <div style={{fontFamily:'var(--font-m)',fontSize:'.62rem',color:'var(--dim)',marginBottom:7}}>Jouw antwoord · min. {MIN} woorden · Alleen op dit apparaat opgeslagen</div>
      <textarea value={texts[idx]} onChange={e=>setTexts(t=>{const n=[...t];n[idx]=e.target.value;return n;})} placeholder="Schrijf hier je antwoord…" style={{width:'100%',minHeight:130,background:'var(--surface)',border:`1px solid ${ok?'var(--border-act)':'var(--border)'}`,borderRadius:10,padding:'11px',color:'var(--text)',fontSize:'.9rem',fontFamily:'var(--font-b)',lineHeight:1.7,resize:'vertical',outline:'none',transition:'border-color .2s'}}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:6,marginBottom:14}}>
        <div style={{fontFamily:'var(--font-m)',fontSize:'.62rem',color:ok?'var(--sage)':'var(--dim)'}}>{wc} / {MIN} woorden</div>
        <div style={{fontFamily:'var(--font-m)',fontSize:'.58rem',color:'var(--dim)'}}>🔒 lokaal opgeslagen</div>
      </div>
      <button onClick={save} disabled={!ok} style={{width:'100%',padding:'12px',background:ok?'var(--sage-b)':'var(--surface-2)',border:`1px solid ${ok?'var(--border-act)':'var(--border)'}`,borderRadius:10,color:ok?'var(--sage)':'var(--dim)',fontWeight:600,fontSize:'.88rem',cursor:ok?'pointer':'not-allowed',transition:'all .2s'}}>
        {idx<mod.reflections.length-1?'Volgende reflectie →':'Reflecties opgeslagen ✓'}
      </button>
    </div>
  );
}

function WmcModulePlayer({mod,userId,userHash,onClose,onBadgeEarned}){
  const prog=wmcGetProg(userId,mod.id);
  const badgeState=wmcGetBadge(userId,mod.badge);
  const init=badgeState==='BADGE_ACTIVE'?'done':prog.l3Done?'badge':prog.l2Done?'l3':prog.l1Passed?'l2':prog.p1Done?'l1':'p1';
  const [phase,setPhase]=useState(init);
  const adv=(next,data={})=>{wmcSetProg(userId,mod.id,{...data,lastAt:new Date().toISOString()});setPhase(next);window.scrollTo({top:0,behavior:'smooth'});};
  const phases=['p1','p2','l1','l2','l3','badge','done'];
  const pi=phases.indexOf(phase);
  const handleL1=(passed)=>{if(passed){wmcSetBadge(userId,mod.badge,'L1_PASSED');adv('l2',{l1Passed:true});}};
  const finishBadge=()=>{wmcSetBadge(userId,mod.badge,'BADGE_ACTIVE');wmcSyncBadge(userHash,mod.badge,'BADGE_ACTIVE');adv('badge',{l3Done:true});onBadgeEarned&&onBadgeEarned(mod.badge);};
  return(
    <div style={{background:'var(--bg)',minHeight:'100vh'}}>
      <div style={{position:'sticky',top:0,zIndex:50,background:'rgba(11,15,20,.97)',backdropFilter:'blur(16px)',borderBottom:'1px solid var(--border)',padding:'12px 16px 0'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
          <button onClick={onClose} style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:'1.1rem',padding:'2px 6px'}}>←</button>
          <div style={{flex:1}}>
            <div style={{fontFamily:'var(--font-m)',fontSize:'.6rem',color:'var(--dim)',letterSpacing:'.08em'}}>{mod.icon} MODULE {mod.number} — {mod.domain.toUpperCase()}</div>
            <div style={{fontWeight:600,fontSize:'.92rem'}}>{mod.title}</div>
          </div>
          <div style={{fontFamily:'var(--font-m)',fontSize:'.62rem',color:'var(--dim)'}}>{mod.duration}min</div>
        </div>
        {phase!=='badge'&&phase!=='done'&&(
          <div style={{display:'flex',gap:3,paddingBottom:8}}>
            {['p1','p2','l1','l2','l3'].map((p,i)=>(
              <div key={p} style={{flex:1,height:3,borderRadius:2,background:pi>i?'var(--sage)':'var(--surface-3)',opacity:pi===i?1:pi>i?0.7:0.3,transition:'all .3s'}}/>
            ))}
          </div>
        )}
      </div>
      <div style={{padding:'18px 16px 0',maxWidth:540,margin:'0 auto'}}>
        {phase==='p1'&&<WmcArchivistCard mod={mod} onDone={()=>{wmcSetBadge(userId,mod.badge,'IN_PROGRESS');adv('p2',{p1Done:true});}}/>}
        {phase==='p2'&&<><WmcPillarSection pillars={mod.pillars}/><button onClick={()=>adv('l1')} style={{width:'100%',marginTop:-60,marginBottom:80,padding:'13px',background:'var(--sage-b)',border:'1px solid var(--border-act)',borderRadius:10,color:'var(--sage)',fontWeight:600,cursor:'pointer'}}>Naar de kennistoets →</button></>}
        {phase==='l1'&&<WmcKnowledgeFlash questions={mod.questions} onDone={handleL1} passScore={mod.passScore}/>}
        {phase==='l2'&&<WmcSJTLayer sjt={mod.sjt} onDone={()=>{wmcSetBadge(userId,mod.badge,'L2_COMPLETE');adv('l3',{l2Done:true});}}/>}
        {phase==='l3'&&<WmcReflectionLayer mod={mod} userId={userId} onDone={finishBadge}/>}
        {phase==='badge'&&<WmcBadgeActivation mod={mod} onDone={onClose}/>}
        {phase==='done'&&<div style={{textAlign:'center',padding:'36px 0 80px'}}><div style={{fontSize:'2.2rem',marginBottom:10}}>{mod.icon}</div><div style={{fontFamily:'var(--font-d)',fontSize:'1.3rem',fontWeight:300,marginBottom:6}}>{mod.badgeLabel} al actief</div><button onClick={onClose} style={{padding:'11px 26px',background:'var(--sage-b)',border:'1px solid var(--border-act)',borderRadius:10,color:'var(--sage)',fontWeight:600,cursor:'pointer',marginTop:14}}>Terug</button></div>}
      </div>
    </div>
  );
}

function WmcModuleCard({mod,userId,onOpen}){
  const state=wmcGetBadge(userId,mod.badge);
  const locked=state==='LOCKED';
  const active=state==='BADGE_ACTIVE';

      <div style={{display:'flex',alignItems:'center',gap:11,marginBottom:active||pct>0?9:0}}>

          <div style={{fontFamily:'var(--font-m)',fontSize:'.6rem',color:active?mod.color:'var(--dim)',letterSpacing:'.06em',marginBottom:2}}>{active?`${mod.badgeLabel} — ACTIEF`:locked?`Vereist: ${mod.prereqs.map(b=>WMC_MODULES.find(m=>m.badge===b)?.badgeLabel||b).join(' + ')}`:`Module ${mod.number} · ${mod.domain}`}</div>
          <div style={{fontWeight:600,fontSize:'.92rem'}}>{mod.title}</div>

/* ── Badge sync naar Supabase ── */
async function wmcLoadBadgesFromSupabase(userHash) {
  if(typeof SUPABASE_ACTIVE==='undefined'||!SUPABASE_ACTIVE||!userHash) return null;
  try {
    const r = await fetch(
      `${SUPABASE_URL}/rest/v1/badge_progress?user_hash=eq.${userHash}&select=badge_id,status`,
      {headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}`}}
    );
    if(!r.ok) return null;
    return await r.json(); // [{badge_id, status}, ...]
  } catch { return null; }
}

/* ── Check-in sync naar Supabase (anoniem — geen PII) ── */
async function wmcSyncCheckin(userHash, location, status) {
  if(typeof SUPABASE_ACTIVE==='undefined'||!SUPABASE_ACTIVE||!userHash) return;
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/wmc_checkins`, {
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY,
        'Authorization':`Bearer ${SUPABASE_ANON_KEY}`,'Prefer':'return=minimal'},
      body: JSON.stringify({
        user_hash: userHash,
        location,
        status,          // 'GREEN' | 'ORANGE' | 'RED'
        checked_at: new Date().toISOString(),
        // Geen naam, geen reflectietekst — Zero Inference Mandaat
      })
    });
  } catch(e) {}
}

/* ── Sanctuary card trigger logic (V2.0) ── */
function wmcShouldShowSanctuaryCard(userId) {
  const history = ls.get(`wmc-checkin-history-${userId}`, []);
  if (!history.length) return null;
  const last = history[history.length - 1];
  // RED = onmiddellijk
  if (last.status === 'RED') return 'RED';
  // ORANGE_DOUBLE = twee opeenvolgende Oranje check-ins
  if (history.length >= 2) {
    const prev = history[history.length - 2];
    if (last.status === 'ORANGE' && prev.status === 'ORANGE') return 'ORANGE_DOUBLE';
  }
  if (last.status === 'ORANGE') return 'ORANGE';
  return null;
}

/* ── Reflectie ophalen voor Sanctuary terugspeling ── */
function wmcGetSanctuaryReflection(userId, cardType) {
  const refls = ls.get(`wmc-refl-${userId}`, {});
  if (cardType === 'RED') {
    // Prompt 2 (De Vonk) of prompt 9 (De Symbiose) — beide zijn kritisch
    return refls[9]?.text || refls[2]?.text || null;
  }
  if (cardType === 'ORANGE_DOUBLE' || cardType === 'ORANGE') {
    // Prompt 1 (Thomas Hartley anker)
    return refls[1]?.text || refls[3]?.text || null;
  }
  return null;
}

/* ── Badge strip + sync ── */
function WmcBadgeStrip({user}) {
  const [badges,setBadges] = useState(()=>
    WMC_MODULES.map(m=>({...m,state:wmcGetBadge(user.id,m.badge)}))
  );

  // Laad badge-status vanuit Supabase bij eerste render (graceful fallback)
  useEffect(()=>{
    if(!user.hash) return;
    wmcLoadBadgesFromSupabase(user.hash).then(rows=>{
      if(!rows?.length) return;
      rows.forEach(({badge_id,status})=>{
        const cur = wmcGetBadge(user.id,badge_id);
        // Supabase wint alleen als status verder is dan lokaal
        const rank = s=>['LOCKED','AVAILABLE','IN_PROGRESS','L1_PASSED','L2_COMPLETE','L3_COMPLETE','BADGE_ACTIVE'].indexOf(s);
        if(rank(status)>rank(cur)) ls.set(`wmc-badge-${user.id}-${badge_id}`,status);
      });
      setBadges(WMC_MODULES.map(m=>({...m,state:wmcGetBadge(user.id,m.badge)})));
    });
  },[user.id,user.hash]);

  const earned = badges.filter(b=>b.state==='BADGE_ACTIVE').length;

  return (
    <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:'12px 14px',marginBottom:14}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <div style={{fontFamily:'var(--font-m)',fontSize:'.62rem',color:'var(--sage)',letterSpacing:'.08em'}}>BADGES — ACADEMIE</div>
        <div style={{fontFamily:'var(--font-m)',fontSize:'.62rem',color:'var(--dim)'}}>{earned}/5 behaald</div>
      </div>
      <div style={{display:'flex',gap:8}}>
        {badges.map(b=>{
          const active = b.state==='BADGE_ACTIVE';
          const inprog = ['IN_PROGRESS','L1_PASSED','L2_COMPLETE','L3_COMPLETE','AVAILABLE'].includes(b.state);
          return (
            <div key={b.id} style={{flex:1,textAlign:'center'}}>
              <div style={{fontSize:'1.2rem',filter:active?`drop-shadow(0 0 6px ${b.color}60)`:inprog?undefined:'grayscale(.9)',opacity:active?1:inprog?.7:0.3,transition:'all .3s'}}>
                {b.icon}
              </div>
              <div style={{fontFamily:'var(--font-m)',fontSize:'.5rem',color:active?b.color:inprog?'var(--muted)':'var(--dim)',marginTop:2,transition:'color .3s'}}>
                {active?'✓':inprog?'…':b.number}
              </div>
            </div>
          );
        })}
      </div>
      {earned>0&&(
        <div style={{marginTop:10,height:2,background:'var(--surface-3)',borderRadius:1,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${earned/5*100}%`,background:'linear-gradient(90deg,var(--sage),var(--sage-bright))',borderRadius:1,transition:'width .6s ease'}}/>
        </div>
      )}
    </div>
  );
}

/* ── MAIN WMC HOME PANEL ── */
function WmcHomePanel({user}) {
  const [sanctuaryCard,setSanctuaryCard]=useState(null);
  const [sanctuaryRefl,setSanctuaryRefl]=useState(null);
  const [tick,setTick]=useState(0);

  const doCheckin=async(status)=>{
    const today=new Date().toISOString().split('T')[0];
    // Sla op in localStorage
    ls.set(`wmc-checkin-today-${user.id}`,{status,date:today,checkedAt:new Date().toISOString()});
    // Update history
    const hist=ls.get(`wmc-checkin-history-${user.id}`,[]);
    hist.push({status,date:today});
    // Bewaar max 30 dagen
    ls.set(`wmc-checkin-history-${user.id}`,hist.slice(-30));
    // Sync naar Supabase (anoniem)
    if(user.hash) await wmcSyncCheckin(user.hash,user.location,status);
    // Check sanctuary trigger
    const cardType=wmcShouldShowSanctuaryCard(user.id);
    if(cardType&&cardType!=='GREEN'){
      const refl=wmcGetSanctuaryReflection(user.id,cardType);
      setSanctuaryRefl(refl);
      setSanctuaryCard(cardType);
    }
    haptic('medium');
    setTick(t=>t+1);
  };

  return(
    <>
      {sanctuaryCard&&(
        <WmcSanctuaryCard
          cardType={sanctuaryCard}
          reflection={sanctuaryRefl}
          userName={user.name}
          onClose={(action)=>{
            setSanctuaryCard(null);
          }}
        />
      )}
      <div style={{marginBottom:4}}>
        <WmcCountdown/>
        <WmcLocatieBriefing user={user}/>
        <WmcCheckinCard user={user} onCheckin={doCheckin} key={tick}/>
        <WmcBadgeStrip user={user}/>
      </div>
    </>
  );
}

/* ── Check-in kalender ── */
function WmcCheckinKalendar({userId}) {
  const history = ls.get(`wmc-checkin-history-${userId}`, []);
  const today = new Date();

  // Bouw 28-dagenraster (4 weken)
  const days = Array.from({length:28}, (_,i) => {
    const d = new Date(today);
    d.setDate(d.getDate() - 27 + i);
    const dateStr = d.toISOString().split('T')[0];
    const entry = [...history].reverse().find(h=>h.date===dateStr);
    return { dateStr, day:d.getDate(), weekday:d.getDay(), entry };
  });

  const statusColor = s => ({GREEN:'#4aaa68',ORANGE:'#e8a554',RED:'#c4604a'}[s]||'var(--surface-3)');

  const counts = {GREEN:0,ORANGE:0,RED:0};
  history.slice(-28).forEach(h=>{if(counts[h.status]!==undefined)counts[h.status]++;});

  return (
    <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:'14px 16px',marginBottom:14}}>
      <div style={{fontFamily:'var(--font-m)',fontSize:'.62rem',color:'#FF6600',letterSpacing:'.08em',marginBottom:10}}>CHECK-IN HISTORIE — 28 DAGEN</div>
      {/* Weekdaglabels */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3,marginBottom:4}}>
        {['Z','M','D','W','D','V','Z'].map((d,i)=>(
          <div key={i} style={{textAlign:'center',fontFamily:'var(--font-m)',fontSize:'.55rem',color:'var(--dim)'}}>{d}</div>
        ))}
      </div>
      {/* Dagraster */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3,marginBottom:12}}>
        {/* Lege cellen vóór de eerste dag */}
        {Array.from({length:days[0].weekday===0?6:days[0].weekday-1}, (_,i)=>(
          <div key={`empty-${i}`}/>
        ))}
        {days.map((d,i)=>(
          <div key={i} title={`${d.dateStr}: ${d.entry?.status||'Niet ingecheckt'}`}
            style={{aspectRatio:'1',borderRadius:4,
              background:d.entry?statusColor(d.entry.status):'var(--surface-2)',
              opacity:d.dateStr===new Date().toISOString().split('T')[0]?1:d.entry?0.85:0.35,
              border:d.dateStr===new Date().toISOString().split('T')[0]?'1px solid #FF6600':'1px solid transparent',
            }}/>
        ))}
      </div>
      {/* Legenda + stats */}
      <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
        {[['#4aaa68','Groen',counts.GREEN],['#e8a554','Oranje',counts.ORANGE],['#c4604a','Rood',counts.RED]].map(([c,l,n])=>(
          <div key={l} style={{display:'flex',alignItems:'center',gap:4}}>
            <div style={{width:8,height:8,borderRadius:2,background:c,flexShrink:0}}/>
            <span style={{fontFamily:'var(--font-m)',fontSize:'.6rem',color:'var(--dim)'}}>{l}</span>
            <span style={{fontFamily:'var(--font-m)',fontSize:'.6rem',color:'var(--text)',fontWeight:700}}>{n}×</span>
          </div>
        ))}
        <div style={{marginLeft:'auto',fontFamily:'var(--font-m)',fontSize:'.6rem',color:'var(--dim)'}}>
          {history.length} totaal
        </div>
      </div>
    </div>
  );
}

/* ── Weekendplanning ── */
function WmcWeekendPlanning({userId}) {
  const [notes, setNotes] = useState(()=>ls.get(`wmc-weekend-notes-${userId}`,{}));
  const [editing, setEditing] = useState(null);
  const [draft, setDraft] = useState('');
  const now = new Date();

  const saveNote = (wId) => {
    const updated = {...notes, [wId]:draft};
    ls.set(`wmc-weekend-notes-${userId}`, updated);
    setNotes(updated);
    setEditing(null);
    haptic('medium');
  };

  return (
    <div style={{marginBottom:14}}>
      <div style={{fontFamily:'var(--font-m)',fontSize:'.62rem',color:'#FF6600',letterSpacing:'.08em',marginBottom:10}}>VIER PIEKWEEKENDEN</div>
      {WMC_WEEKENDS.map(w => {
        const start = new Date(`2026-07-${w.period.replace(' jul','').replace(' jul','')}`);
        const isPast = now > new Date(start.getTime()+4*86400000);
        const isActive = now >= start && !isPast;
        const diffDays = Math.ceil((start-now)/(1000*60*60*24));
        const isEditing = editing===w.id;
        const note = notes[w.id]||'';

        const bars = Array.from({length:5},(_,i)=>(
          <div key={i} style={{flex:1,height:i<w.intensity?'100%':'40%',background:i<w.intensity?w.kleur:'var(--surface-3)',borderRadius:2,alignSelf:'flex-end',transition:'height .3s'}}/>
        ));

        return (
          <div key={w.id} style={{background:'var(--surface)',border:`1px solid ${isActive?w.kleur+'60':'var(--border)'}`,
            borderRadius:12,marginBottom:10,overflow:'hidden',
            opacity:isPast?.7:1}}>
            <div style={{padding:'12px 14px 0'}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                {/* Intensiteitsbalkje */}
                <div style={{display:'flex',gap:2,height:22,width:40,alignItems:'flex-end',flexShrink:0}}>{bars}</div>
                <div style={{flex:1}}>
                  <div style={{display:'flex',alignItems:'baseline',gap:6}}>
                    <span style={{fontFamily:'var(--font-m)',fontSize:'.6rem',color:w.kleur,letterSpacing:'.06em'}}>{w.label}</span>
                    {isActive&&<span style={{fontFamily:'var(--font-m)',fontSize:'.58rem',background:`${w.kleur}20`,color:w.kleur,padding:'1px 5px',borderRadius:8}}>LIVE</span>}
                    {isPast&&<span style={{fontFamily:'var(--font-m)',fontSize:'.58rem',color:'var(--dim)'}}>Afgerond</span>}
                    {!isPast&&!isActive&&diffDays>0&&<span style={{fontFamily:'var(--font-m)',fontSize:'.58rem',color:'var(--dim)'}}>{diffDays} dagen</span>}
                  </div>
                  <div style={{fontWeight:600,fontSize:'.88rem',color:'var(--text)'}}>{w.name}</div>
                  <div style={{fontFamily:'var(--font-m)',fontSize:'.65rem',color:'var(--muted)'}}>{w.dates}</div>
                </div>
              </div>
              {/* Herstelvenster */}
              {w.herstel!=='–'&&(
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8,padding:'5px 8px',background:'var(--surface-2)',borderRadius:6}}>
                  <span style={{fontSize:'.75rem'}}>🌿</span>
                  <span style={{fontFamily:'var(--font-m)',fontSize:'.62rem',color:'var(--muted)'}}>Herstelvenster: {w.herstel}</span>
                </div>
              )}
            </div>
            {/* Persoonlijke notitie */}
            <div style={{padding:'0 14px 12px'}}>
              {isEditing ? (
                <div>
                  <textarea value={draft} onChange={e=>setDraft(e.target.value)}
                    placeholder="Jouw voorbereiding, aandachtspunten, intentie…"
                    style={{width:'100%',minHeight:72,background:'var(--surface-2)',
                      border:`1px solid ${w.kleur}40`,borderRadius:8,padding:'8px 10px',
                      color:'var(--text)',fontSize:'.82rem',fontFamily:'var(--font-b)',
                      lineHeight:1.6,resize:'none',outline:'none',marginBottom:6}}/>
                  <div style={{display:'flex',gap:6}}>
                    <button onClick={()=>saveNote(w.id)}
                      style={{padding:'6px 14px',background:`${w.kleur}18`,border:`1px solid ${w.kleur}40`,
                        borderRadius:8,color:w.kleur,fontWeight:600,cursor:'pointer',fontSize:'.8rem'}}>
                      Opslaan
                    </button>
                    <button onClick={()=>{setEditing(null);}}
                      style={{padding:'6px 10px',background:'none',border:'1px solid var(--border)',
                        borderRadius:8,color:'var(--dim)',cursor:'pointer',fontSize:'.8rem'}}>
                      Annuleer
                    </button>
                  </div>
                </div>
              ) : (
                <button onClick={()=>{setEditing(w.id);setDraft(note||'');haptic('light');}}
                  style={{width:'100%',textAlign:'left',background:note?'var(--surface-2)':'transparent',
                    border:`1px dashed ${note?'var(--border)':w.kleur+'30'}`,borderRadius:8,
                    padding:'6px 10px',cursor:'pointer',color:note?'var(--muted)':'var(--dim)',
                    fontSize:'.8rem',lineHeight:1.5,fontFamily:'var(--font-b)'}}>
                  {note||`+ Notitie voor ${w.label}…`}
                </button>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ── S+H≥T persoonlijke tracker ── */
function WmcContinuiteitsCheck({userId}) {
  const history = ls.get(`wmc-checkin-history-${userId}`,[]);
  const last7 = history.slice(-7);
  const greenCount = last7.filter(h=>h.status==='GREEN').length;
  const orangeCount = last7.filter(h=>h.status==='ORANGE').length;
  const redCount = last7.filter(h=>h.status==='RED').length;
  const total = last7.length;

  if(!total) return null;

  const pct = Math.round(greenCount/total*100);
  const veerkracht = pct>=70?{label:'Sterk',color:'#4aaa68',emoji:'💪'}:
                     pct>=40?{label:'Kwetsbaar',color:'#e8a554',emoji:'⚠️'}:
                             {label:'Kritiek',color:'#c4604a',emoji:'🔴'};
  return (
    <div style={{background:'var(--surface)',border:`1px solid ${veerkracht.color}30`,borderRadius:12,padding:'14px 16px',marginBottom:14}}>
      <div style={{fontFamily:'var(--font-m)',fontSize:'.62rem',color:'#FF6600',letterSpacing:'.08em',marginBottom:10}}>VEERKRACHT — AFGELOPEN 7 DAGEN</div>
      <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:10}}>
        <div style={{textAlign:'center',flexShrink:0}}>
          <div style={{fontFamily:'var(--font-m)',fontSize:'2rem',fontWeight:700,color:veerkracht.color,lineHeight:1}}>{pct}%</div>
          <div style={{fontFamily:'var(--font-m)',fontSize:'.6rem',color:'var(--dim)',marginTop:2}}>groen</div>
        </div>
        <div style={{flex:1}}>
          <div style={{fontWeight:600,fontSize:'.9rem',marginBottom:2}}>{veerkracht.emoji} {veerkracht.label}</div>
          <div style={{fontFamily:'var(--font-m)',fontSize:'.68rem',color:'var(--muted)',lineHeight:1.5}}>
            {greenCount}× groen · {orangeCount}× oranje · {redCount}× rood
          </div>
        </div>
      </div>
      <div style={{height:4,background:'var(--surface-3)',borderRadius:2,overflow:'hidden',display:'flex',gap:1}}>
        <div style={{background:'#4aaa68',width:`${greenCount/total*100}%`}}/>
        <div style={{background:'#e8a554',width:`${orangeCount/total*100}%`}}/>
        <div style={{background:'#c4604a',width:`${redCount/total*100}%`}}/>
      </div>
      <div style={{fontFamily:'var(--font-m)',fontSize:'.62rem',color:'var(--dim)',marginTop:8,lineHeight:1.5}}>
        S+H≥T: jouw veerkracht over de afgelopen week. Groen is de basis voor het volgende weekend.
      </div>
    </div>
  );
}

/* ── SVG Thumbnails — kleur+emoji combinatie ── */
function WmcThumb({type, color, size}){
  const W=(size||{}).w||110, H=(size||{}).h||68;
  const icons = {
    rodahal:'🎼', stadion:'🏟️', trumpet:'🎺', letter:'📜',
    eye:'👁', globe:'🌍', shield:'🛡', star:'⭐', mirror:'🪞',
    water:'💧', handshake:'🤝', door:'🚪', vip:'👑', zaagtand:'📊',
    brain:'🧠', hands:'🙌',
  };
  const icon = icons[type] || icons.trumpet;
  const bg = color || '#FF6600';
  return (
    <div style={{
      width:W, height:H, display:'flex', alignItems:'center', justifyContent:'center',
      background:`linear-gradient(135deg,${bg}22,${bg}08)`,
      position:'relative', overflow:'hidden',
    }}>
      <span style={{fontSize:Math.min(W,H)*.38,lineHeight:1,filter:'saturate(1.2)'}}>{icon}</span>
      <div style={{
        position:'absolute', bottom:0, left:0, right:0, height:3,
        background:`linear-gradient(90deg,${bg},transparent)`, opacity:.5,
      }}/>
    </div>
  );
}
