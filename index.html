<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#07090d">
  <title>Koraal Op de Bies — Digital Sanctuary 2026 · V8.1</title>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <title>WMC 2026 · Digital Sanctuary — Symbiotic Spark</title>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
    :root {
      --void: #07090d;
      /* ─── V1 COMPAT ALIASES (Workspace components) ─── */
      --s1: #0D1F17;
      --s2: #1A2420;
      --s3: #1f2d28;
      --b0: rgba(122,159,133,.14);
      --b1: rgba(122,159,133,.42);
      --t0: #E8E4E0;
      --t1: #A8A4A0;
      --t2: #686460;
      --koraal-green: #22c55e;
      --koraal-green-light: #4ade80;
      --koraal-amber: #f59e0b;
      --sr17-critical: #ef4444;
      --sr17-high: #f97316;
      --sr17-moderate: #eab308;
      --sr17-low: #22c55e;
      --surface-elevated: #18181f;
      --border-ml: rgba(255,255,255,.08);
      --text-ml: #fafafa;

      --bg: #0b0f14;
      --surface: #0f1720;
      --surface-2: #172030;
      --surface-3: #1d2a3a;
      --border: rgba(110,170,140,0.13);
      --border-active: rgba(110,170,140,0.45);
      --text: #e8e4df;
      --text-muted: #a5a09a;
      --text-dim: #5e5a56;
      --sage: #6eaa8c;
      --sage-bright: #93c9ae;
      --sage-dim: rgba(110,170,140,0.1);
      --gold: #c4965e;
      --gold-dim: rgba(196,150,94,0.08);
      --amber: #e8a554;
      --red: #c4604a;
      --green: #4aaa68;
      --blue: #5a8aaa;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'DM Sans', -apple-system, sans-serif;
      --font-mono: 'DM Mono', monospace;
      /* ── Academie component aliases ── */
      --font-d: var(--font-display);
      --font-b: var(--font-body);
      --font-m: var(--font-mono);
      --border-act: rgba(110,170,140,0.45);
      --muted: #a5a09a;
      --dim: #5e5a56;
      --sage-b: rgba(110,170,140,0.10);
      --gold-b: rgba(196,150,94,0.08);
    }

    /* ═══════════════════════════════════════════════════
       WMC 2026 OFFICIEEL KLEURENPALET
       Bron: Gemini Deep Research + wmc.nl bronanalyse
       Concept: "The Heart of Music" — oranje × magenta
       ─────────────────────────────────────────────────
       Primair (Stad Kerkrade):   #FF6600  Oranje
       Secundair (Stichting WMC): #E5007D  Magenta
       Accent "The Heart":        gradiënt oranje → magenta
       Typografie:                Montserrat (modern sans-serif)
    ═══════════════════════════════════════════════════ */
    body.wmc-theme {
      /* ── Primair accent: oranje (Kerkrade) ── */
      --wmc-orange:       #FF6600;
      --wmc-orange-dim:   rgba(255,102,0,.10);
      --wmc-orange-b:     rgba(255,102,0,.12);

      /* ── Secundair accent: magenta (WMC instituut) ── */
      --wmc-magenta:      #E5007D;
      --wmc-magenta-dim:  rgba(229,0,125,.10);

      /* ── "The Heart" — fusie van oranje + magenta ── */
      --wmc-heart:        linear-gradient(135deg, #FF6600, #E5007D);
      --wmc-heart-solid:  #F2333E;

      /* ── Override: Koraal-groen → WMC-oranje als primair accent ── */
      --sage:             #FF6600;
      --sage-bright:      #FF8533;
      --sage-dim:         rgba(255,102,0,.08);
      --sage-b:           rgba(255,102,0,.10);
      --border-act:       rgba(255,102,0,.45);
      --border:           rgba(255,102,0,.13);
      --b0:               rgba(255,102,0,.12);
      --b1:               rgba(255,102,0,.38);

      /* ── Typografie: Montserrat (WMC official sans-serif) ── */
      --font-body:        'Montserrat', 'DM Sans', -apple-system, sans-serif;
      --font-b:           'Montserrat', 'DM Sans', -apple-system, sans-serif;

      /* ── Achtergrond: diep marineblauw ── */
      --bg:               #07090f;
      --void:             #04050a;
      --surface:          #0c1020;
      --surface-2:        #111828;
      --surface-3:        #172030;
      --s1:               #0c1020;
      --s2:               #111828;
      --s3:               #172030;

      /* ── Systeem kleuren ── */
      --koraal-green:       #FF6600;
      --koraal-green-light: #FF8533;
      --koraal-amber:       #E5007D;
      --gold:               #FF6600;
      --gold-dim:           rgba(255,102,0,.08);
    }

    /* ── WMC "The Heart" gradiënt op interactieve elementen ── */
    body.wmc-theme .btn.bp,
    body.wmc-theme button.btn-primary {
      background: var(--wmc-heart) !important;
      color: #fff !important;
      border: none !important;
    }

    /* ── Zone-kleuren voor WMC ── */
    body.wmc-theme .pi-flow    { color: #4aaa68; }
    body.wmc-theme .pi-friction{ color: var(--amber); }
    body.wmc-theme .pi-crash   { color: var(--red); }

    /* ── WMC-font override voor koppen in WMC-context ── */
    body.wmc-theme .wmc-hdr-title,
    body.wmc-theme .wmc-hdr-event { font-family: 'Montserrat', sans-serif; }

    /* ── WMC header identiteitsbar ── */
    .wmc-hdr-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0 10px;
      border-bottom: 1px solid rgba(255,102,0,.20);
      margin-bottom: 4px;
    }
    .wmc-logo-svg { flex-shrink: 0; }
    .wmc-hdr-info { flex: 1; min-width: 0; }
    .wmc-hdr-event {
      font-family: 'Montserrat', 'DM Mono', monospace;
      font-size: .6rem; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase;
      background: var(--wmc-heart);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 2px;
    }
    .wmc-hdr-title {
      font-family: 'Montserrat', 'Syne', sans-serif;
      font-weight: 700; font-size: .95rem;
      color: var(--text); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .wmc-hdr-right { text-align: right; flex-shrink: 0; }
    .wmc-loc-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 12px;
      font-size: .65rem; font-family: 'Montserrat', monospace;
      font-weight: 600; white-space: nowrap;
      background: rgba(255,102,0,.12);
      border: 1px solid rgba(255,102,0,.35);
      color: #FF6600;
    }
    .wmc-role-label {
      font-size: .62rem; color: var(--text-dim); margin-top: 3px;
      font-family: 'Montserrat', monospace; letter-spacing: .04em;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html { -webkit-text-size-adjust:100%; scroll-behavior:smooth; }
    body {
      font-family: var(--font-body);
      background: var(--void);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── LAYOUT ─── */
    .wrap { max-width: 680px; margin: 0 auto; padding: 0 20px; }
    .pad  { padding: 36px 0 100px; }

    /* ─── CARDS ─── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 14px;
    }
    .card-accent  { border-left: 3px solid var(--sage); }
    .card-gold    { border-left: 3px solid var(--gold); background: var(--gold-dim); }
    .card-warn    { background: rgba(196,96,74,.06); border-color: rgba(196,96,74,.28); }
    .card-info    { background: rgba(90,138,170,.07); border-color: rgba(90,138,170,.3); }
    .card-success { background: rgba(74,170,104,.07); border-color: rgba(74,170,104,.3); }
    .card-dark    { background: rgba(0,0,0,.35); border-color: rgba(255,255,255,.05); }

    /* ─── TYPOGRAPHY ─── */
    .hero {
      font-family: var(--font-display);
      font-size: clamp(1.9rem, 5.5vw, 2.9rem);
      font-weight: 600;
      line-height: 1.15;
      letter-spacing: -0.01em;
    }
    .hero-xl {
      font-family: var(--font-display);
      font-size: clamp(2.4rem, 7vw, 3.8rem);
      font-weight: 300;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    .h2   { font-size: clamp(1.2rem, 3.5vw, 1.55rem); font-weight: 600; margin-bottom: 10px; }
    .h3   { font-size: 1rem; font-weight: 600; margin-bottom: 8px; letter-spacing: .01em; }
    .label{ font-size: .66rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--sage); }
    .label-gold{ font-size: .66rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--gold); }
    .muted{ color: var(--text-muted); }
    .dim  { color: var(--text-dim); font-size: .82rem; }
    .italic { font-family: var(--font-display); font-style: italic; }
    .mono  { font-family: var(--font-mono); }

    /* ─── BUTTONS ─── */
    .btn {
      min-height: 52px; padding: 14px 24px;
      border-radius: 12px; font-family: var(--font-body);
      font-weight: 600; font-size: 16px; cursor: pointer;
      border: none; display: inline-flex; align-items: center;
      justify-content: center; gap: 8px;
      transition: all .2s; width: 100%;
    }
    .btn-primary { background: var(--sage); color: #07200f; }
    .btn-primary:hover:not(:disabled) { background: var(--sage-bright); transform: translateY(-1px); box-shadow: 0 8px 28px rgba(110,170,140,.25); }
    .btn-primary:disabled { background: var(--surface-2); color: var(--text-dim); cursor: not-allowed; transform: none; }
    .btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-sm { min-height: 40px; padding: 8px 16px; width: auto; font-size: 14px; border-radius: 8px; }

    /* ─── CHIP SELECT ─── */
    .chip-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 4px; }
    .chip {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 16px 18px; border-radius: 12px; cursor: pointer;
      background: var(--surface-2); border: 2px solid transparent;
      transition: all .2s; text-align: left;
    }
    .chip:hover { border-color: var(--border-active); background: var(--surface-3); }
    .chip.sel { border-color: var(--sage); background: var(--sage-dim); }
    .chip-icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 1px; }
    .chip-text { font-size: .92rem; line-height: 1.5; }
    .chip-sub  { font-size: .78rem; color: var(--text-dim); margin-top: 2px; }

    /* ─── SLIDER ─── */
    .slider { -webkit-appearance:none; width:100%; height:8px; border-radius:4px; background:var(--surface-2); outline:none; cursor:pointer; }
    .slider::-webkit-slider-thumb { -webkit-appearance:none; width:44px; height:44px; border-radius:50%; background:var(--sage); cursor:pointer; box-shadow:0 2px 20px rgba(110,170,140,.4); transition: transform .15s; }
    .slider::-webkit-slider-thumb:hover { transform: scale(1.1); }
    .slider::-moz-range-thumb { width:44px; height:44px; border-radius:50%; background:var(--sage); cursor:pointer; border:none; }
    .slider-sm::-webkit-slider-thumb { width:28px; height:28px; }
    .slider-sm::-moz-range-thumb { width:28px; height:28px; }

    /* ─── CHECKBOX ROW ─── */
    .check-row {
      display:flex; align-items:flex-start; gap:14px;
      padding:16px; border-radius:10px; cursor:pointer;
      background:var(--surface-2); border:2px solid transparent;
      margin-bottom:10px; transition:all .2s;
    }
    .check-row:hover { border-color: var(--border-active); }
    .check-row.on { border-color:var(--sage); background:rgba(110,170,140,.08); }
    .check-row input { width:22px; height:22px; min-width:22px; margin-top:2px; accent-color:var(--sage); cursor:pointer; }

    /* ─── PI DISPLAY ─── */
    .pi-big { font-size: 5rem; font-weight: 800; line-height: 1; font-family: var(--font-body); }
    .pi-flow { color: var(--green); }
    .pi-friction { color: var(--amber); }
    .pi-crash { color: var(--red); }
    .zone-badge { padding: 7px 18px; border-radius: 24px; font-weight: 700; font-size: .82rem; display: inline-block; letter-spacing: .06em; }
    .zone-flow { background:rgba(74,170,104,.12); color:var(--green); }
    .zone-friction { background:rgba(232,165,84,.12); color:var(--amber); }
    .zone-crash { background:rgba(196,96,74,.12); color:var(--red); }
    .zone-critical { background:rgba(155,44,44,.25); color:#fc8181; border:1px solid rgba(155,44,44,.4); }

    /* ─── CANVAS ─── */
    .canvas-wrap { width:100%; display:flex; justify-content:center; }
    .sig-canvas { width:100%; height:150px; display:block; border:2px solid var(--border); border-radius:10px; background:var(--surface-2); touch-action:none; cursor:crosshair; }

    /* ─── PROGRESS ─── */
    .pbar { height:3px; background:var(--surface-2); border-radius:2px; overflow:hidden; }
    .pbar-fill { height:100%; background: linear-gradient(90deg, var(--sage), var(--sage-bright)); border-radius:2px; transition:width .6s ease; }
    .pbar-steps { display:flex; gap:4px; }
    .pbar-step  { flex:1; height:4px; border-radius:2px; transition: all .35s; }

    /* ─── HEADER ─── */
    .hdr {
      position:sticky; top:0; z-index:100;
      background:rgba(7,9,13,.96);
      backdrop-filter:blur(24px);
      -webkit-backdrop-filter:blur(24px);
      border-bottom:1px solid var(--border);
      padding:13px 20px;
    }

    /* ─── MODULE ICON ─── */
    .mod-icon { font-size:2.8rem; margin-bottom:12px; display:block; text-align:center; }

    /* ─── TIMELINE ─── */
    .timeline { position:relative; padding-left:26px; }
    .timeline::before { content:''; position:absolute; left:7px; top:4px; bottom:4px; width:2px; background:var(--border); border-radius:1px; }
    .tl-item { position:relative; margin-bottom:18px; }
    .tl-dot { position:absolute; left:-22px; top:5px; width:10px; height:10px; border-radius:50%; background:var(--sage); }
    .tl-date { font-size:.72rem; color:var(--sage); font-weight:700; letter-spacing:.07em; margin-bottom:2px; text-transform:uppercase; }

    /* ─── GATE SCREEN ─── */
    .gate { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }

    /* ─── COMPLETE SCREEN ─── */
    .complete-glow { background:radial-gradient(ellipse at center, rgba(110,170,140,.1) 0%, transparent 65%); padding:60px 20px; text-align:center; }

    /* ─── STEP BADGE ─── */
    .step-badge { display:inline-flex; align-items:center; gap:8px; background:var(--surface-2); padding:5px 13px; border-radius:20px; font-size:.75rem; font-weight:600; color:var(--sage); margin-bottom:20px; }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes breathe { 0%,100%{transform:scale(1);opacity:.75;} 50%{transform:scale(1.05);opacity:1;} }
    @keyframes shimmerLine { 0%{transform:translateX(-100%);} 100%{transform:translateX(400%); } }
    @keyframes pulse { 0%,100%{opacity:.6;} 50%{opacity:1;} }
    .fade-up { animation:fadeUp .45s ease-out both; }
    .breathe { animation:breathe 4s ease-in-out infinite; }
    .pulse-anim { animation:pulse 3s ease-in-out infinite; }

    /* ─── NUM DISPLAY ─── */
    .num-display { font-size:2rem; font-weight:800; color:var(--sage); min-width:40px; text-align:right; font-family:var(--font-body); transition: color .3s; }

    /* ─── UTIL ─── */
    .gap { margin-top:16px; }
    .gap-sm { margin-top:8px; }
    .gap-lg { margin-top:28px; }
    .text-center { text-align:center; }
    .flex { display:flex; }
    .between { justify-content:space-between; align-items:center; }
    .safe-b { padding-bottom:calc(env(safe-area-inset-bottom,0px) + 16px); }
    input[type="text"], textarea { font-size:16px; }

    /* ─── QUOTE BLOCK ─── */
    .quote-block {
      border-left:3px solid var(--gold);
      padding:12px 18px;
      margin:16px 0;
      background:var(--gold-dim);
      border-radius:0 10px 10px 0;
    }
    .quote-block p { font-family:var(--font-display); font-style:italic; font-size:1.1rem; color:var(--text); line-height:1.55; }
    .quote-block cite { font-size:.76rem; color:var(--gold); font-style:normal; margin-top:6px; display:block; font-family:var(--font-mono); letter-spacing:.06em; }

    /* ─── DATA ROW ─── */
    .data-row { display:flex; gap:8px; align-items:flex-start; margin-bottom:10px; }
    .data-dot { width:6px; height:6px; border-radius:50%; background:var(--sage); flex-shrink:0; margin-top:8px; }

    /* ─── PERSON CARD ─── */
    .person-card {
      display:flex; gap:16px; align-items:flex-start;
      padding:18px; border-radius:12px;
      background:var(--surface-2); border:1px solid var(--border);
      margin-bottom:12px;
    }
    .person-avatar {
      width:52px; height:52px; border-radius:50%;
      background:var(--surface-3); border:2px solid var(--border-active);
      display:flex; align-items:center; justify-content:center;
      font-size:1.5rem; flex-shrink:0;
    }
    .person-info { flex:1; }
    .person-name { font-weight:700; font-size:1rem; margin-bottom:2px; }
    .person-role { font-size:.78rem; color:var(--sage); font-family:var(--font-mono); letter-spacing:.06em; margin-bottom:6px; }
    .person-bio  { font-size:.87rem; color:var(--text-muted); line-height:1.55; }

    /* ─── MISSION BLOCK ─── */
    .mission-line {
      font-family:var(--font-display);
      font-size:clamp(1.3rem,4vw,1.8rem);
      font-weight:300;
      font-style:italic;
      line-height:1.4;
      color:var(--text);
    }

    /* ─── ARCHETYPE RESULT ─── */
    .archetype-badge {
      background: linear-gradient(135deg, var(--sage-dim), rgba(110,170,140,.05));
      border:1px solid var(--border-active);
      border-radius:14px;
      padding:20px;
      text-align:center;
    }
    .archetype-name {
      font-family:var(--font-display);
      font-size:1.6rem;
      font-weight:600;
      color:var(--sage-bright);
      margin:8px 0 4px;
    }

    /* ─── JOURNAL PROMPT ─── */
    .journal-prompt {
      border-radius:10px;
      padding:14px 16px;
      background:var(--surface-2);
      border:1px solid var(--border);
      margin-bottom:12px;
      transition: border-color .2s;
    }
    .journal-prompt:focus-within { border-color:var(--sage); }
    .journal-prompt-label {
      font-size:.75rem;
      font-weight:700;
      letter-spacing:.1em;
      text-transform:uppercase;
      color:var(--sage);
      margin-bottom:6px;
    }
    .journal-textarea {
      width:100%;
      background:transparent;
      border:none;
      outline:none;
      color:var(--text);
      font-size:15px;
      line-height:1.65;
      resize:none;
      min-height:80px;
      font-family:var(--font-body);
    }
    .journal-question {
      font-family:var(--font-display);
      font-style:italic;
      font-size:1.05rem;
      color:var(--text);
      margin-bottom:8px;
      line-height:1.4;
    }

    /* ─── BINNENLICHT CANVAS WRAPPER ─── */
    .binnenlicht-wrap {
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:24px 0 8px;
    }
    .binnenlicht-canvas {
      display:block;
    }

    /* ─── SPIEGEL SESSIE CARD ─── */
    .spiegel-card {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:16px;
      padding:32px 24px;
      min-height:260px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      text-align:center;

    }

      font-size:.85rem;
      color:var(--text-dim);
      font-family:var(--font-mono);
    }

    /* ─── PARADOX METER ─── */
    .pi-meter-wrap {
      border-radius:14px;
      overflow:hidden;
      background:var(--surface-2);
      border:1px solid var(--border);
      padding:20px;
      margin-bottom:14px;
    }
    .pi-bar-track {
      height:12px;
      background:rgba(255,255,255,.05);
      border-radius:6px;
      overflow:hidden;
      margin:10px 0 8px;
      position:relative;
    }
    .pi-bar-fill {
      height:100%;
      border-radius:6px;
      transition: width .6s ease, background .4s;
    }

    /* ─── MISSION HERO ─── */
    .mission-hero {
      background:radial-gradient(ellipse at 50% 30%, rgba(110,170,140,.12) 0%, transparent 65%);
      padding:60px 0 40px;
      text-align:center;
    }

    /* ─── LOGO MARK ─── */
    .logo-mark {
      display:inline-flex;
      align-items:center;
      gap:10px;
      margin-bottom:32px;
    }
    .logo-symbol {
      width:40px;
      height:40px;
      border-radius:50%;
      border:1.5px solid var(--sage);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.1rem;

    .logo-text {
      font-family:var(--font-mono);
      font-size:.72rem;
      letter-spacing:.2em;
      text-transform:uppercase;
      color:var(--sage);
    }

    /* ─── STAT ROW ─── */
    .stat-row {
      display:flex;
      gap:8px;
      margin-top:16px;
    }
    .stat-box {
      flex:1;
      background:var(--surface-2);
      border-radius:10px;
      border:1px solid var(--border);
      padding:12px;
      text-align:center;
    }
    .stat-num {
      font-family:var(--font-display);
      font-size:1.7rem;
      font-weight:600;
      color:var(--sage-bright);
      line-height:1;
      margin-bottom:4px;
    }
    .stat-label {
      font-size:.7rem;
      color:var(--text-dim);
      letter-spacing:.06em;
    }

    /* ─── INPUT ─── */
    .field-input {
      width:100%;
      padding:12px 14px;
      background:var(--surface-2);
      border:1px solid var(--border);
      border-radius:8px;
      color:var(--text);
      font-size:16px;
      outline:none;
      font-family:var(--font-body);
      transition:border-color .2s;
    }
    .field-input:focus { border-color:var(--sage); }

    @media (max-width:480px) {
      .pad { padding:28px 0 80px; }
      .card { padding:18px; }
    }

<div id="sanctuary-loader">
  <div class="sl-inner">
    <div class="sl-logo">
      <div class="sl-ring"></div>
      <span>✦</span>
    </div>
    <p class="sl-text">Digital Sanctuary wordt geladen…</p>

  </div>
</div>
<style>
  #sanctuary-loader {
    position: fixed; inset: 0;
    background: #0b0f14;
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
    transition: opacity .6s ease;
  }
  #sanctuary-loader.sl-fade { opacity: 0; pointer-events: none; }
  .sl-inner { text-align: center; }
  .sl-logo {
    position: relative; width: 64px; height: 64px;
    margin: 0 auto 20px;
    display: flex; align-items: center; justify-content: center;
  }
  .sl-logo span { font-size: 26px; color: #6eaa8c; position: relative; z-index: 1; }
  .sl-ring {
    position: absolute; inset: 0;
    border: 2px solid rgba(110,170,140,0.15);
    border-top-color: #6eaa8c;
    border-radius: 50%;
    animation: sl-spin 1.4s linear infinite;
  }
  .sl-ring::after {
    content: '';
    position: absolute; inset: 6px;
    border: 1px solid rgba(110,170,140,0.08);
    border-bottom-color: rgba(110,170,140,0.35);
    border-radius: 50%;
    animation: sl-spin 2s linear infinite reverse;
  }
  @keyframes sl-spin { to { transform: rotate(360deg); } }
  .sl-text {
    color: #e8e4df; font-size: .9rem; font-weight: 500;
    margin: 0 0 6px; font-family: system-ui, sans-serif;
  }

<script>
  /* Sanctuary Loader Controller — Vanilla JS (buiten React scope) */
  window.__sanctuaryReady = function() {
    var loader = document.getElementById('sanctuary-loader');
    if (!loader) return;
    loader.classList.add('sl-fade');
    setTimeout(function() {
      if (loader.parentNode) loader.parentNode.removeChild(loader);
    }, 650);
  };
  /* Harde fallback: verwijder loader na 10 seconden */
  setTimeout(function() {
    if (document.getElementById('sanctuary-loader')) {
      window.__sanctuaryReady();
    }
  }, 10000);
  /* Globale foutopvang — toont fout ipv leeg scherm */
  window.onerror = function(msg, src, line, col, err) {
    window.__sanctuaryReady();
    var root = document.getElementById('root');
    if (root && !root.innerHTML) {
      root.innerHTML = '<div style="color:#ef4444;padding:24px;font-family:monospace;font-size:.85rem;background:#0b0f14;min-height:100vh">'
        + '<p style="font-size:1.1rem;font-weight:700;margin-bottom:12px">⚠️ Startup fout</p>'
        + '<p style="color:#a5a09a;margin-bottom:8px">' + msg + '</p>'
        + '<p style="color:#5e5a56">Regel ' + line + ' · ' + (src||'').split('/').pop() + '</p>'
        + '<button onclick="location.reload()" style="margin-top:20px;padding:10px 20px;background:#6eaa8c;color:#04130b;border:none;border-radius:8px;font-weight:700;cursor:pointer">Opnieuw laden</button>'
        + '</div>';
    }
  };
</script>

        return { ok: false, status: r.status, ...d };
      }
      return { ok: true, ...d };
    } catch(e) {
      return { ok: false, error: e.message };

function calcArchetypeProfile(answers) {
  const map = { a:'sv', b:'oe', c:'tw', d:'to', e:'av' };
  const scores = { sv:0, oe:0, tw:0, to:0, av:0 };
  if (map[answers.motivation])     scores[map[answers.motivation]]     += 3;
  if (map[answers.changeReaction]) scores[map[answers.changeReaction]] += 2;
  if (map[answers.sustainFactor])  scores[map[answers.sustainFactor]]  += 2;
  if (answers.rhythm === 'B') scores.oe += 1;
  if (answers.rhythm === 'D') scores.av += 1;
  if (answers.rhythm === 'A') scores.tw += 0.5;
  if (answers.role === 'direct') scores.oe += 1;
  if (answers.role === 'management') scores.sv += 0.5;
  if (answers.teamSupport < 4) scores.av += 1;
  const dominant = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
  const labels = {
    sv:'Sceptische Veteraan', oe:'Overbelaste Empath',
    tw:'Transactionele Werker', to:'Tech-Opportunist', av:'Angstige Vermijder'
  };
  const desc = {
    sv:'Jij hebt alles al gezien. Je wacht op bewijs voor je investeert. Dat scepticisme beschermt je — maar zorgt ook dat signalen van overbelasting later komen.',
    oe:'Jij geeft vanuit verbinding. Je voelt de mensen om je heen sterk, soms te sterk. De kans dat jij doorgaat terwijl je tank leeg is, is groot.',
    tw:'Jij functioneert op duidelijkheid en structuur. Als de balans klopt, presteer je goed. Als hij verstoord raakt, loop je door op automatische piloot.',
    to:'Jij omarmt vernieuwing. Je vindt het interessant om dit te testen. Zorg dat dat enthousiasme niet maskeert wat er echt speelt.',
    av:'Jij vermijdt confrontatie, ook met jezelf. Je doet mee, maar de drempel om echt te laten zien hoe het gaat is hoog. Dit systeem werkt alleen als je eerlijk bent.'
  };
  const spiegelVragen = {
    sv: ['Wanneer heb jij voor het laatste iets voor jezelf gedaan — zonder dat het nuttig moest zijn?',
         'Wat is het verschil tussen doorgaan uit kracht en doorgaan uit gewoonte?',
         'Welk signaal van jouw lichaam negeer jij het vaakst?'],
    oe: ['Hoe lang is het geleden dat jij echt goed voor jezelf hebt gezorgd?',
         'Wie zorgt er voor jou, zoals jij voor anderen zorgt?',
         'Wat zou je zeggen als een cliënt jou vroeg: "Hoe gaat het écht met jou?"'],
    tw: ['Wat geeft jou op dit moment energie — en wat vreet het op?',
         'Is het systeem voor jou op dit moment in balans? Wat zou dat veranderen?',
         'Wat zou je morgen anders doen als je wist dat niemand het zou zien?'],
    to: ['Onder de nieuwsgierigheid — wat wil je écht begrijpen over jezelf?',
         'Wat probeert dit systeem je te vertellen dat je nog niet durft te horen?',
         'Wanneer was de laatste keer dat je echt stilstond?'],
    av: ['Wat houdt je tegen om écht eerlijk te zijn over hoe het gaat?',
         'Als je dit systeem volledig vertrouwde — wat zou je dan invullen?',
         'Welk gevoel wil je het liefst niet zien op je scherm?'],
  };
  return { scores, dominant, dominantLabel: labels[dominant], dominantDesc: desc[dominant], spiegelVragen: spiegelVragen[dominant] };
}

/* ═══════════════════════════════════════
   § BINNENLICHT CANVAS (optie C)
═══════════════════════════════════════ */
function buildHumanPath(ctx, cx, cy, sc, compress, lean) {
  compress = compress||0; lean = lean||0;
  const sy = 1 - compress*0.38;
  const dy = compress * sc * 1.0;
  const bx = cx + lean*sc*0.3, by = cy + dy;
  ctx.beginPath();
  ctx.arc(bx, by - 3.6*sc*sy, 0.7*sc, 0, Math.PI*2);
  ctx.moveTo(bx-0.18*sc, by-2.9*sc*sy);
  ctx.lineTo(bx-0.18*sc, by-2.5*sc*sy);
  ctx.lineTo(bx+0.18*sc, by-2.5*sc*sy);
  ctx.lineTo(bx+0.18*sc, by-2.9*sc*sy);
  ctx.closePath();
  ctx.moveTo(bx-0.65*sc, by-2.5*sc*sy);
  ctx.lineTo(bx-0.55*sc, by);
  ctx.lineTo(bx+0.55*sc, by);
  ctx.lineTo(bx+0.65*sc, by-2.5*sc*sy);
  ctx.closePath();
  ctx.moveTo(bx-0.65*sc, by-2.3*sc*sy);
  ctx.quadraticCurveTo(bx-1.3*sc, by-1.4*sc*sy, bx-1.1*sc+compress*0.6*sc, by+0.1*sc*sy+compress*0.3*sc);
  ctx.lineTo(bx-0.85*sc+compress*0.4*sc, by+0.1*sc*sy+compress*0.3*sc);
  ctx.quadraticCurveTo(bx-1.1*sc, by-1.4*sc*sy, bx-0.45*sc, by-2.1*sc*sy);
  ctx.closePath();
  ctx.moveTo(bx+0.65*sc, by-2.3*sc*sy);
  ctx.quadraticCurveTo(bx+1.3*sc, by-1.4*sc*sy, bx+1.1*sc-compress*0.6*sc, by+0.1*sc*sy+compress*0.3*sc);
  ctx.lineTo(bx+0.85*sc-compress*0.4*sc, by+0.1*sc*sy+compress*0.3*sc);
  ctx.quadraticCurveTo(bx+1.1*sc, by-1.4*sc*sy, bx+0.45*sc, by-2.1*sc*sy);
  ctx.closePath();
  ctx.moveTo(bx-0.5*sc, by); ctx.lineTo(bx-0.6*sc, by+1.6*sc*sy);
  ctx.lineTo(bx-0.95*sc, by+3.0*sc*sy); ctx.lineTo(bx-0.6*sc, by+3.0*sc*sy);
  ctx.lineTo(bx-0.3*sc, by+1.6*sc*sy); ctx.lineTo(bx-0.15*sc, by); ctx.closePath();
  ctx.moveTo(bx+0.5*sc, by); ctx.lineTo(bx+0.6*sc, by+1.6*sc*sy);
  ctx.lineTo(bx+0.95*sc, by+3.0*sc*sy); ctx.lineTo(bx+0.6*sc, by+3.0*sc*sy);
  ctx.lineTo(bx+0.3*sc, by+1.6*sc*sy); ctx.lineTo(bx+0.15*sc, by); ctx.closePath();
}

function BinnenlichtCanvas({ sOut, sInn, bildex, size = 220 }) {
  const canvasRef = useRef(null);
  const frameRef  = useRef(null);
  const tRef      = useRef(0);
  const propsRef  = useRef({ sOut, sInn, bildex });

  useEffect(() => { propsRef.current = { sOut, sInn, bildex }; }, [sOut, sInn, bildex]);

  useEffect(() => {
    const cv = canvasRef.current;
    if (!cv) return;

    const W = size, H = Math.round(size * 1.65);
    cv.width = W; cv.height = H;

    const draw = (t) => {
      const { sOut, sInn, bildex } = propsRef.current;
      const ctx = cv.getContext('2d');
      ctx.clearRect(0, 0, W, H);

      const v = calcPI(sOut, sInn, bildex);
      const z = piZone(v);
      const ZC = {
        flow:    { r:74,  g:170, b:104 },
        friction:{ r:232, g:165, b:84  },
        crash:   { r:196, g:96,  b:74  }
      }[z];
      const inN = sInn / 10, outN = sOut / 10, mN = bildex / 10;
      const pct = Math.min(v / 14, 1);

      const cx = W / 2, cy = H * 0.50, sc = size * 0.31;

      // Background glow
      const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, sc * 3);
      bgGrad.addColorStop(0, `rgba(${ZC.r},${ZC.g},${ZC.b},${0.04 + pct * 0.07})`);
      bgGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, W, H);

      // Base halo
      const haloGrad = ctx.createRadialGradient(cx, cy + sc * 2.5, 0, cx, cy + sc * 2.5, sc * 2 + mN * sc);
      haloGrad.addColorStop(0, `rgba(196,150,94,${mN * 0.18})`);
      haloGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = haloGrad; ctx.fillRect(0, 0, W, H);

      // Inner body glow
      const innerR = inN > 0.5 ? 74  : inN > 0.2 ? 232 : 196;
      const innerG = inN > 0.5 ? 170 : inN > 0.2 ? 165 : 96;
      const innerB = inN > 0.5 ? 104 : inN > 0.2 ? 84  : 74;

      ctx.save();
      buildHumanPath(ctx, cx, cy, sc, 0, 0);
      ctx.clip();

      ctx.fillStyle = 'rgba(8,6,14,0.92)';
      ctx.fillRect(0, 0, W, H);

      const pulse  = Math.sin(t * 0.04) * 0.08 + 0.92;
      const iGrad  = ctx.createRadialGradient(cx, cy - sc * 0.3, 0, cx, cy - sc * 0.3, sc * 2 * pulse);
      iGrad.addColorStop(0, `rgba(${innerR},${innerG},${innerB},${inN * 0.95})`);
      iGrad.addColorStop(0.45, `rgba(${innerR},${innerG},${innerB},${inN * 0.4})`);
      iGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = iGrad; ctx.fillRect(0, 0, W, H);

      const pulse2 = Math.sin(t * 0.025 + 1) * 0.06 + 0.94;
      const iGrad2 = ctx.createRadialGradient(cx, cy, 0, cx, cy, sc * 3 * pulse2);
      iGrad2.addColorStop(0, `rgba(${innerR},${innerG},${innerB},${inN * 0.28})`);
      iGrad2.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = iGrad2; ctx.fillRect(0, 0, W, H);
      ctx.restore();

      // Outer shell
      ctx.save();
      ctx.strokeStyle = `rgba(255,255,255,${0.1 + outN * 0.52})`;
      ctx.lineWidth = 2.2;
      ctx.lineJoin = 'round';
      buildHumanPath(ctx, cx, cy, sc, 0, 0);
      ctx.stroke();
      ctx.restore();

      if (outN > 0.3) {
        ctx.save();
        ctx.shadowBlur = 18 * outN;
        ctx.shadowColor = `rgba(255,255,240,${outN * 0.6})`;
        ctx.strokeStyle = `rgba(255,255,255,${outN * 0.22})`;
        ctx.lineWidth = 1;
        buildHumanPath(ctx, cx, cy, sc, 0, 0);
        ctx.stroke();
        ctx.restore();
      }

      // Paradox cracks
      const paradoxLevel = Math.max(0, outN - inN) * (1 - (10 - bildex) / 10 * 0.5);
      if (paradoxLevel > 0.25) {
        ctx.save();
        ctx.strokeStyle = `rgba(${ZC.r},${ZC.g},${ZC.b},${paradoxLevel * 0.85})`;
        ctx.lineWidth = 1;
        ctx.lineCap = 'round';
        const cracks = [
          [cx - sc * 0.6, cy - sc * 2.2, -7, -14, 4, -20],
          [cx + sc * 0.55, cy - sc * 1.8, 9, -11, 13, -5],
          [cx, cy - sc * 0.5, -4, 11, 7, 17],
        ];
        cracks.forEach(([x0,y0,dx1,dy1,dx2,dy2]) => {
          if (paradoxLevel > 0.3) {
            ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x0+dx1,y0+dy1); ctx.lineTo(x0+dx2,y0+dy2); ctx.stroke();
          }
        });
        ctx.restore();
      }

      // Zone dot
      ctx.beginPath();
      ctx.arc(cx, cy + sc * 3.6, Math.max(8, size * 0.048), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${ZC.r},${ZC.g},${ZC.b},0.9)`;
      ctx.fill();
    };

    const loop = (timestamp) => {
      tRef.current = timestamp;
      draw(timestamp * 0.04);
      frameRef.current = requestAnimationFrame(loop);
    };
    frameRef.current = requestAnimationFrame(loop);
    return () => { if (frameRef.current) cancelAnimationFrame(frameRef.current); };
  }, [size]);

  return (
    <canvas
      ref={canvasRef}
      className="binnenlicht-canvas"
      style={{ width: size, height: Math.round(size * 1.65) }}
    />
  );
}

/* ═══════════════════════════════════════════════════════════════
   📈  PI TREND CHART (SVG)
═══════════════════════════════════════════════════════════════ */
function PITrendChart({entries}){
  const W=400,H=160,PL=32,PR=16,PT=16,PB=28;
  const cw=W-PL-PR,ch=H-PT-PB;
  if(entries.length<2)return(
    <div className="chart-wrap" style={{textAlign:'center',padding:'32px 16px'}}>
      <p style={{color:'var(--t2)',fontSize:'.85rem'}}>Minimaal 2 metingen nodig voor trendgrafiek</p>
    </div>
  );
  const maxPts=20;
  const pts=entries.slice(-maxPts);
  const xStep=cw/(pts.length-1);
  const yScale=v=>(1-(v/10))*ch;
  // Zone band backgrounds — PI scale 0-10
  // CRASH PI>4: top 60% of chart (y from 0 to 0.6*ch)
  // FRICTIE PI 2-4: middle 20%
  // FLOW PI<2: bottom 20%
  const crashH=ch*0.6, fricH=ch*0.2, flowH=ch*0.2;
  const coords=pts.map((e,i)=>({x:PL+i*xStep,y:PT+yScale(e.pi),pi:e.pi,date:e.date,zone:piZone(e.pi)}));
  const path=coords.reduce((acc,c,i)=>{
    if(i===0)return `M${c.x},${c.y}`;
    const prev=coords[i-1];
    const cpx=(prev.x+c.x)/2;
    return acc+` C${cpx},${prev.y} ${cpx},${c.y} ${c.x},${c.y}`;
  },'');
  // Fill path — closes to bottom
  const fillPath=`${path} L${coords[coords.length-1].x},${PT+ch} L${coords[0].x},${PT+ch} Z`;
  const today=coords[coords.length-1];
  const todayColor=today.zone==='crash'?'#ef4444':today.zone==='friction'?'#eab308':'#22c55e';
  const gradId=`chartGrad_${Math.floor(Date.now()/10000)}`;
  return(
    <div className="chart-wrap">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <p className="lbl">PI Trend</p>
        <div style={{display:'flex',gap:10,fontSize:'.72rem'}}>
          {[['FLOW','var(--koraal-green)'],['FRICTIE','var(--koraal-amber)'],['CRASH','var(--sr17-critical)']].map(([l,c])=>(
            <span key={l} style={{color:c,fontWeight:700}}><span style={{display:'inline-block',width:8,height:8,borderRadius:2,background:c,marginRight:4,verticalAlign:'middle'}}></span>{l}</span>
          ))}
        </div>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto',display:'block'}}>
        <defs>
          <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={todayColor} stopOpacity=".22"/>
            <stop offset="100%" stopColor={todayColor} stopOpacity="0"/>
          </linearGradient>
        </defs>
        {/* Zone backgrounds */}
        <rect x={PL} y={PT} width={cw} height={crashH} fill="rgba(239,68,68,.07)" rx="3"/>
        <rect x={PL} y={PT+crashH} width={cw} height={fricH} fill="rgba(234,179,8,.06)"/>
        <rect x={PL} y={PT+crashH+fricH} width={cw} height={flowH} fill="rgba(34,197,94,.05)"/>
        <text x={PL+4} y={PT+11} fill="#ef444455" fontSize="7.5" fontWeight="700" fontFamily="Syne,sans-serif">CRASH</text>
        <text x={PL+4} y={PT+crashH+fricH-4} fill="#22c55e55" fontSize="7.5" fontWeight="700" fontFamily="Syne,sans-serif">FLOW</text>
        {/* Grid */}
        {[0,2,4,6,8,10].map(v=>{
          const y=PT+yScale(v);
          return(<g key={v}><line x1={PL} y1={y} x2={PL+cw} y2={y} stroke="rgba(255,255,255,.04)" strokeDasharray="3,3"/><text x={PL-4} y={y+3} fill="var(--text-dim)" fontSize="7" textAnchor="end" fontFamily="Syne,sans-serif">{v}</text></g>);
        })}
        {/* Fill gradient under line */}
        <path d={fillPath} fill={`url(#${gradId})`}/>
        {/* Trend line */}
        <path d={path} fill="none" stroke={todayColor} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" opacity=".75"/>
        {/* Data points */}
        {coords.map((c,i)=>{
          const col=c.zone==='crash'?'#ef4444':c.zone==='friction'?'#eab308':'#22c55e';
          const isLast=i===coords.length-1;
          return(<g key={i}>
            {isLast&&<><circle cx={c.x} cy={c.y} r="14" fill={col} opacity=".12"/><circle cx={c.x} cy={c.y} r="8" fill={col} opacity=".2"/></>}
            <circle cx={c.x} cy={c.y} r={isLast?5:3.5} fill={col} stroke="var(--void)" strokeWidth="1.5"/>
          </g>);
        })}
        {/* Today label */}
        {today&&<>
          <text x={today.x} y={H-3} fill="var(--text-dim)" fontSize="7" textAnchor="middle">vandaag</text>
          <text x={today.x} y={today.y-12} fill={todayColor} fontSize="10" fontWeight="800" textAnchor="middle" fontFamily="Syne,sans-serif">{today.pi}</text>
        </>}
        {coords.filter((_,i)=>i===0).map((c,i)=>(
          <text key={i} x={c.x} y={H-3} fill="var(--text-dim)" fontSize="6" textAnchor="middle">{new Date(c.date).toLocaleDateString('nl-NL',{day:'numeric',month:'numeric'})}</text>
        ))}
      </svg>
    </div>
  );
}
// Deze functie 'voedt' de trend-data aan de Spiegelsessie AI
const prepareMirrorContext = (entries) => {
  const trend = entries.map(e => ({ date: e.date, score: e.pi, zone: piZone(e.pi) }));
  const lowestFlow = Math.min(...entries.map(e => e.pi));
  const highestCrash = Math.max(...entries.map(e => e.pi));
  
  return {
    trendSummary: trend,
    delta: highestCrash - lowestFlow,
    focusPoint: highestCrash > 4 ? "Herstel na Crash-momenten" : "Optimalisatie van Flow"
  };
};

    systeemContext: 'Domein: Zelf & Persoonlijke Groei. Focus op identiteit buiten de professionele rol. Verken wie de persoon is als de zorgprofessional-laag er af is: dromen, grenzen, behoeften, eigenheid. Koppel aan PI: een lage S-IN kan ook betekenen dat er weinig ruimte is voor de eigen persoon. Vraag door op wat de persoon vandaag heeft gehad voor zichzelf — hoe klein ook. Warm, nieuwsgierig, niet-sturend.'
  }
];

function SpiegelSessie({user,todayEntry,entries,onClose,internetToestemming,onFetchWebContent,webContent,webContentLoading}){
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const [pushedContent,setPushedContent]=useState(null);
  const [contentItem,setContentItem]=useState(null);
  const [sessionStarted,setSessionStarted]=useState(false);
  const [gekozenSpiegel,setGekozenSpiegel]=useState(null);
  const [toonIntro,setToonIntro]=useState(false);
  const [msgCount,setMsgCount]=useState(0);
  const [crisisNiveau,setCrisisNiveau]=useState(null); // null | 'amber' | 'rood'
  const [toonWelkom, setToonWelkom] = useState(() => !ls.get(`spiegel-welkom-gezien-${user.id}`));
  const bodyRef=useRef(null);
  const inputRef=useRef(null);
  const pi=todayEntry?todayEntry.pi:null;
  const zone=pi!==null?piZoneV2(pi):null;
  const hasCrisis=zone==='crash'||zone==='critical';

  // ── Bereken huidige fase op basis van aantal user-berichten ──
  const huidige_fase = SESSIE_FASES.find(f =>
    msgCount >= f.bereik[0] && msgCount <= f.bereik[1]
  ) || SESSIE_FASES[3];

  useEffect(()=>{if(bodyRef.current)bodyRef.current.scrollTop=bodyRef.current.scrollHeight;},[messages,loading]);

const kiesSpiegel = (spiegel) => {
    setGekozenSpiegel(spiegel);
    setToonIntro(true);
  };

const startSession = async (spiegel) => {
    setGekozenSpiegel(spiegel);
    setSessionStarted(true);
    setLoading(true);

    const trendData = prepareMirrorContext(entries);
    let dynamicContext = pi === null
        ? 'De deelnemer heeft nog geen PI-meting gedaan vandaag.'
        : `Deelnemer is in de ${zone.toUpperCase()} zone (PI ${pi}).`;
    if (trendData) {
        dynamicContext += ` Trend-analyse: delta ${trendData.delta.toFixed(1)}, focuspunt: ${trendData.focusPoint}.`;
    }

    const profile = ls.get(`koraal-profile-${user.id}`);
    const sysPrompt = buildSpiegelPrompt(pi, zone, todayEntry?.sOut, todayEntry?.sIn, todayEntry?.bildex, entries, profile, spiegel.domein, spiegel.systeemContext, spiegel.startvraag, SESSIE_FASES[0]);

    try {
      const d = await callAnthropic({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 320,
        system: sysPrompt,
        messages: [{ role: 'user', content: `[SESSIE START — domein: ${spiegel.domein}] ${dynamicContext} Stel de startvraag nu direct.` }]
      });
      if (!d.ok) {
        const msg = d?.message || d?.error || `Fout ${d?.status || ''}`;
        setMessages([{ role: 'sys', text: `⚠ ${msg}` }]);
      } else if (d.content && d.content[0]) {
        processAIResponse(d.content[0].text);
      } else if (d.error) {
        setMessages([{ role: 'sys', text: `Sanctuary Error: ${d.error.message}` }]);
      }
    } catch (e) {
      console.error('✦ SR-17 Connection Failed:', e);
      setMessages([{ role: 'sys', text: `Verbindingsfout: ${e.message}` }]);
    }
    setLoading(false);
    if(internetToestemming) onFetchWebContent && onFetchWebContent(spiegel);
  };

  const processAIResponse = (txt) => {
    const lines = txt.trim().split('\n');
    const lastLine = lines[lines.length - 1].trim();
    let pushId = null;
    let cleanTxt = txt;

    if (lastLine.startsWith('PUSH:')) {
      pushId = lastLine.replace('PUSH:', '').trim();
      cleanTxt = lines.slice(0, -1).join('\n').trim();
    }

    setMessages(prev => [...prev, { role: 'ai', text: cleanTxt }]);

    if (pushId && !pushedContent) {
      const item = CONTENT_LIBRARY.find(c => c.id === pushId);
      if (item) {
        setPushedContent(pushId);
        setTimeout(() => setMessages(prev => [...prev, { role: 'push', item }]), 600);
      }
    }

    if (hasCrisis && msgCount >= 2) {
      setTimeout(() => setMessages(prev => [...prev, { role: 'sys', text: 'HR Koraal: 088 – 015 02 00. Nood: 112.' }]), 800);
    }
  };
  const sendMessage=async()=>{
    if(!input.trim()||loading||crisisNiveau==='rood')return;
    const userMsg=input.trim();

    // ── Noodprotocol v1.2 ──
    const niveau = detecteerCrisisNiveau(userMsg);
    if (niveau === 'rood') {
      setInput('');
      setMessages(prev=>[...prev,{role:'usr',text:userMsg},{role:'crisis',text:RED_RESPONSE,niveau:'rood'}]);
      setCrisisNiveau('rood');
      return;
    }
    if (niveau === 'amber' && crisisNiveau !== 'amber') {
      setCrisisNiveau('amber');
      setInput('');
      setMessages(prev=>[...prev,{role:'usr',text:userMsg},{role:'crisis',text:AMBER_RESPONSE,niveau:'amber'}]);
      return;
    }

    setInput('');
    setMessages(prev=>[...prev,{role:'usr',text:userMsg}]);
    const newCount = msgCount + 1;
    setMsgCount(newCount);
    setLoading(true);
    const currentFase = SESSIE_FASES.find(f => newCount >= f.bereik[0] && newCount <= f.bereik[1]) || SESSIE_FASES[3];
    const profile = ls.get(`koraal-profile-${user.id}`);
    const sysPrompt=buildSpiegelPrompt(pi,zone,todayEntry?.sOut,todayEntry?.sIn,todayEntry?.bildex,entries,profile,gekozenSpiegel?.domein,gekozenSpiegel?.systeemContext,gekozenSpiegel?.startvraag,currentFase);
    const history=[...messages.filter(m=>m.role==='ai'||m.role==='usr').map(m=>({role:m.role==='ai'?'assistant':'user',content:m.text})),{role:'user',content:userMsg}];
    try{
      const d=await callAnthropic({model:'claude-haiku-4-5-20251001',max_tokens:300,system:sysPrompt,messages:history});
      if(!d.ok){
        const msg=d?.message||d?.error||`Fout ${d?.status||''}`;
        setMessages(prev=>[...prev,{role:'sys',text:`⚠ ${msg}`}]);
      } else if(d.content&&d.content[0]) {
        processAIResponse(d.content[0].text);
      } else {
        setMessages(prev=>[...prev,{role:'sys',text:'Geen antwoord ontvangen — probeer opnieuw.'}]);
      }
    }catch(e){setMessages(prev=>[...prev,{role:'sys',text:`⚠ Verbindingsfout: ${e.message||'onbekend'}.`}]);}
    setLoading(false);
    inputRef.current?.focus();
  };
  return(
    <div className="spiegel-overlay">
      {/* Ambient domein achtergrond */}
      <div className="spiegel-ambient" style={{
        background: gekozenSpiegel
          ? `radial-gradient(ellipse at 80% 20%, ${gekozenSpiegel.kleur}12 0%, transparent 60%), radial-gradient(ellipse at 20% 80%, ${gekozenSpiegel.kleur}07 0%, transparent 50%)`
          : 'none'
      }}/>

      {/* Header */}
      <div className="spiegel-hdr">
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {gekozenSpiegel && (
            <div style={{width:32,height:32,borderRadius:8,background:`${gekozenSpiegel.kleur}20`,border:`1px solid ${gekozenSpiegel.kleur}40`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1rem'}}>
              {gekozenSpiegel.icon}
            </div>
          )}
          <div>
            <p style={{fontSize:'.68rem',fontWeight:800,letterSpacing:'.08em',textTransform:'uppercase',color:gekozenSpiegel?gekozenSpiegel.kleur:'var(--sage)'}}>
              {gekozenSpiegel ? gekozenSpiegel.domein : 'SpiegelSessie™'}
            </p>
            {pi!==null&&(
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontWeight:700,fontSize:'.82rem'}} className={piClass(pi)}>PI {pi}</span>
                <span className={`zb ${zbClass(pi)}`} style={{padding:'1px 7px',fontSize:'.68rem'}}>{piLabel(pi)}</span>
              </div>
            )}
          </div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {toonIntro&&!sessionStarted&&(
            <button onClick={()=>{setToonIntro(false);setGekozenSpiegel(null);}}
              style={{background:'none',border:'1px solid rgba(255,255,255,.1)',color:'rgba(232,228,224,.6)',fontSize:'.75rem',borderRadius:8,padding:'5px 12px',cursor:'pointer'}}>
              ← Terug
            </button>
          )}
          {sessionStarted&&(
            <button onClick={()=>{setSessionStarted(false);setToonIntro(false);setGekozenSpiegel(null);setMessages([]);setMsgCount(0);setCrisisNiveau(null);}}
              style={{background:'none',border:'1px solid rgba(255,255,255,.1)',color:'rgba(232,228,224,.6)',fontSize:'.75rem',borderRadius:8,padding:'5px 12px',cursor:'pointer'}}>
              ← Andere spiegel
            </button>
          )}
          <button onClick={onClose}
            style={{background:'none',border:'none',color:'rgba(232,228,224,.5)',fontSize:'1.5rem',cursor:'pointer',lineHeight:1,padding:'4px'}}>
            ×
          </button>
        </div>
      </div>

      {/* Content detail modal */}
      {contentItem&&<ContentModal item={contentItem} onClose={()=>setContentItem(null)}/>}

      {/* ── Fase voortgangsbalk — alleen zichtbaar als sessie gestart is ── */}
      {sessionStarted && (
        <div>
          <div className="fase-bar">
            {SESSIE_FASES.map((f,i) => {
              const faseIdx = SESSIE_FASES.findIndex(x => x.id === huidige_fase.id);
              const isDone = i < faseIdx;
              const isActive = f.id === huidige_fase.id;
              return (
                <div key={f.id} className={`fase-seg${isActive?' actief':''}`}
                  style={{
                    background: isActive ? f.kleur : isDone ? f.kleur+'60' : 'rgba(255,255,255,.07)',
                    borderRight: i < SESSIE_FASES.length-1 ? '1px solid rgba(0,0,0,.3)' : 'none'
                  }}
                />
              );
            })}
          </div>
          <div className="fase-labels">
            {SESSIE_FASES.map(f => {
              const isActive = f.id === huidige_fase.id;
              const faseIdx = SESSIE_FASES.findIndex(x => x.id === huidige_fase.id);
              const thisFaseIdx = SESSIE_FASES.findIndex(x => x.id === f.id);
              const isDone = thisFaseIdx < faseIdx;
              return (
                <div key={f.id} className={`fase-lbl${isActive?' actief':''}`}
                  style={{color: isActive ? f.kleur : isDone ? f.kleur : 'var(--t2)'}}>
                  <span className="fase-dot" style={{opacity: isActive?1:isDone?.5:.2}}/>
                  {f.label}
                </div>
              );
            })}
          </div>
          {/* Fase beschrijving — subtiele één-regel context */}
          {huidige_fase && (
            <div style={{
              padding:'4px 20px 8px',
              fontSize:'.7rem',
              color: huidige_fase.kleur,
              opacity:.8,
              letterSpacing:'.03em',
              borderBottom:'1px solid rgba(255,255,255,.04)',
              position:'relative',zIndex:2
            }}>
              {huidige_fase.icon} {huidige_fase.beschrijving}
            </div>
          )}
        </div>
      )}
      <div className="spiegel-body" ref={bodyRef}>
        {toonWelkom?(
          <div style={{padding:'8px 4px 32px'}}>
            {/* Hero */}
            <div style={{textAlign:'center',padding:'28px 0 20px'}}>
              <span style={{fontSize:'3rem',display:'block',marginBottom:12}}>🪞</span>
              <h2 style={{fontWeight:800,fontSize:'1.3rem',marginBottom:8,letterSpacing:'-.01em'}}>Welkom bij de SpiegelSessie™</h2>
              <p style={{color:'var(--t2)',fontSize:'.88rem',lineHeight:1.75,maxWidth:310,margin:'0 auto'}}>
                Een plek om even stil te staan bij jezelf — zonder oordeel, zonder agenda. Alleen jij en een vraag die de moeite waard is.
              </p>
            </div>

            {/* Wat is het */}
            <div style={{background:'var(--s2)',border:'1px solid var(--b0)',borderRadius:14,padding:'18px 20px',marginBottom:12}}>
              <p style={{fontWeight:700,fontSize:'.85rem',color:'var(--koraal-green)',marginBottom:10,letterSpacing:'.04em',textTransform:'uppercase'}}>Wat is de SpiegelSessie?</p>
              <p style={{fontSize:'.88rem',color:'var(--t1)',lineHeight:1.75,marginBottom:10}}>
                De SpiegelSessie is een AI-gesprek dat je weerspiegelt — niet stuurt. De AI stelt vragen, kaatst terug wat jij inbrengt, en trekt geen conclusies.
              </p>
              <p style={{fontSize:'.88rem',color:'var(--t1)',lineHeight:1.75}}>
                Dat is bewust. <strong style={{color:'var(--t0)'}}>Jij observeert. Jij interpreteert. Jij beslist.</strong> De AI is het gereedschap, niet de expert over jouw leven.
              </p>
            </div>

            {/* Hoe gebruik je het dagelijks */}
            <div style={{background:'var(--s2)',border:'1px solid var(--b0)',borderRadius:14,padding:'18px 20px',marginBottom:12}}>
              <p style={{fontWeight:700,fontSize:'.85rem',color:'var(--koraal-green)',marginBottom:12,letterSpacing:'.04em',textTransform:'uppercase'}}>Hoe werkt het in de praktijk?</p>
              {[
                ['📊','Na je dagmeting','Je hebt net je PI ingevuld. De SpiegelSessie pikt dat op — en biedt je een plek om te voelen wat de score zegt.'],
                ['🪞','Kies een spiegel','Je kiest de startvraag die het meest resoneert met hoe je je nú voelt. Niet wat je zou moeten voelen.'],
                ['💬','Kort gesprek — 5 tot 10 minuten','Geen grote analyse. Één draad volgen. Eén vraag die iets losmaakt. Dat is genoeg.'],
                ['🌱','Consistent, niet perfect','De waarde zit niet in één gesprek — maar in het patroon dat ontstaat als je het vaker doet.']
              ].map(([icon,titel,tekst])=>(
                <div key={titel} style={{display:'flex',gap:12,marginBottom:14,alignItems:'flex-start'}}>
                  <span style={{fontSize:'1.2rem',flexShrink:0,marginTop:1}}>{icon}</span>
                  <div>
                    <p style={{fontWeight:700,fontSize:'.84rem',color:'var(--t0)',marginBottom:3}}>{titel}</p>
                    <p style={{fontSize:'.83rem',color:'var(--t2)',lineHeight:1.65}}>{tekst}</p>
                  </div>
                </div>
              ))}
            </div>

            {/* Dit is een begin */}
            <div style={{background:'linear-gradient(135deg, #1a2a1e 0%, #111827 100%)',border:'1.5px solid var(--koraal-green)',borderRadius:14,padding:'20px 20px',marginBottom:20}}>
              <p style={{fontWeight:700,fontSize:'.85rem',color:'var(--koraal-green)',marginBottom:10,letterSpacing:'.04em',textTransform:'uppercase'}}>Dit is een begin — geen eindproduct</p>
              <p style={{fontSize:'.88rem',color:'var(--t1)',lineHeight:1.8,marginBottom:12}}>
                Wat je nu ziet is versie één. De echte waarde van de SpiegelSessie bouwen we <strong style={{color:'var(--t0)'}}>samen met jou</strong> — op basis van wat je ervaart, wat je mist, en wat je raakt.
              </p>
              <p style={{fontSize:'.88rem',color:'var(--t1)',lineHeight:1.8,marginBottom:12}}>
                Na de pilot vragen we wat gewerkt heeft. Jouw feedback bepaalt direct wat er in de volgende versie zit. Niet als gebruiker — maar als medeontwerper.
              </p>
              <p style={{fontSize:'.85rem',color:'var(--koraal-green)',fontStyle:'italic',lineHeight:1.7}}>
                "Wij bouwen dit niet vóór jullie. Wij bouwen het mét jullie."
              </p>
            </div>

            {/* CTA */}
            <button
              onClick={()=>{ ls.set(`spiegel-welkom-gezien-${user.id}`, true); setToonWelkom(false); }}
              className="btn bp"
              style={{width:'100%',padding:'14px',fontSize:'1rem',fontWeight:700,borderRadius:12}}
            >
              🪞 Ik ga aan de slag
            </button>
            <p className="dim" style={{fontSize:'.72rem',textAlign:'center',marginTop:10}}>Geen opslag van gesprekstekst · Crisiscontact: HR 088 – 015 02 00</p>
          </div>
        ):toonIntro&&gekozenSpiegel&&!sessionStarted?(
          /* ── Introscherm per gekozen spiegel ── */
          <div style={{padding:'8px 4px 32px'}}>
            {/* Domein hero */}
            <div style={{textAlign:'center',padding:'24px 0 20px'}}>
              <div style={{width:64,height:64,borderRadius:'50%',background:`${gekozenSpiegel.kleur}20`,border:`2px solid ${gekozenSpiegel.kleur}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.8rem',margin:'0 auto 14px'}}>
                {gekozenSpiegel.icon}
              </div>
              <p style={{fontSize:'.72rem',fontWeight:800,letterSpacing:'.1em',textTransform:'uppercase',color:gekozenSpiegel.kleur,marginBottom:6}}>{gekozenSpiegel.domein}</p>
              <h2 style={{fontWeight:800,fontSize:'1.15rem',marginBottom:6}}>{gekozenSpiegel.tagline}</h2>
              {pi!==null&&(
                <div style={{display:'inline-flex',alignItems:'center',gap:8,background:'var(--s2)',border:'1px solid var(--b0)',borderRadius:20,padding:'5px 14px',marginTop:4}}>
                  <span style={{fontSize:'.75rem',color:'var(--t2)'}}>Jouw PI vandaag:</span>
                  <span style={{fontWeight:800,fontSize:'.9rem'}} className={piClass(pi)}>{pi}</span>
                  <span className={`zb ${zbClass(pi)}`} style={{fontSize:'.7rem',padding:'2px 8px'}}>{piLabel(pi)}</span>
                </div>
              )}
            </div>

            {/* Kern van dit domein */}
            <div style={{background:'var(--s2)',border:`1px solid ${gekozenSpiegel.kleur}30`,borderRadius:14,padding:'18px 20px',marginBottom:12}}>
              <p style={{fontWeight:700,fontSize:'.8rem',color:gekozenSpiegel.kleur,marginBottom:10,letterSpacing:'.05em',textTransform:'uppercase'}}>Waar gaat deze spiegel over?</p>
              <p style={{fontSize:'.88rem',color:'var(--t1)',lineHeight:1.8}}>{gekozenSpiegel.intro.kern}</p>
            </div>

            {/* PI koppeling */}
            <div style={{background:'var(--s2)',border:'1px solid var(--b0)',borderRadius:14,padding:'18px 20px',marginBottom:12}}>
              <p style={{fontWeight:700,fontSize:'.8rem',color:'var(--koraal-green)',marginBottom:10,letterSpacing:'.05em',textTransform:'uppercase'}}>Verbinding met jouw PI-meting</p>
              <p style={{fontSize:'.88rem',color:'var(--t1)',lineHeight:1.8}}>{gekozenSpiegel.intro.piKoppeling}</p>
            </div>

            {/* Structuur */}
            <div style={{background:'var(--s2)',border:'1px solid var(--b0)',borderRadius:14,padding:'18px 20px',marginBottom:12}}>
              <p style={{fontWeight:700,fontSize:'.8rem',color:'var(--koraal-green)',marginBottom:12,letterSpacing:'.05em',textTransform:'uppercase'}}>Hoe verloopt de sessie?</p>
              {gekozenSpiegel.intro.structuur.map((s,i)=>(
                <div key={i} style={{display:'flex',gap:10,marginBottom:10,alignItems:'flex-start'}}>
                  <span style={{width:20,height:20,borderRadius:'50%',background:`${gekozenSpiegel.kleur}25`,color:gekozenSpiegel.kleur,fontSize:'.7rem',fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}>{i+1}</span>
                  <p style={{fontSize:'.84rem',color:'var(--t2)',lineHeight:1.65,margin:0}}>{s}</p>
                </div>
              ))}
            </div>

            {/* Uitdaging */}
            <div style={{background:`linear-gradient(135deg,${gekozenSpiegel.kleur}12 0%,#111827 100%)`,border:`1.5px solid ${gekozenSpiegel.kleur}40`,borderRadius:14,padding:'18px 20px',marginBottom:20}}>
              <p style={{fontWeight:700,fontSize:'.8rem',color:gekozenSpiegel.kleur,marginBottom:8,letterSpacing:'.05em',textTransform:'uppercase'}}>Waarom deze spiegel je uitdaagt</p>
              <p style={{fontSize:'.88rem',color:'var(--t1)',lineHeight:1.8,fontStyle:'italic'}}>{gekozenSpiegel.intro.uitdaging}</p>
            </div>

            {/* Startvraag preview */}
            <div style={{background:'var(--s2)',border:'1px solid var(--b0)',borderRadius:14,padding:'16px 20px',marginBottom:20}}>
              <p style={{fontSize:'.72rem',fontWeight:700,color:'var(--t2)',marginBottom:8,letterSpacing:'.06em',textTransform:'uppercase'}}>Jouw startvraag</p>
              <p style={{fontSize:'.95rem',color:'var(--t0)',lineHeight:1.7,fontStyle:'italic'}}>"{gekozenSpiegel.startvraag}"</p>
            </div>

            <button
              onClick={()=>startSession(gekozenSpiegel)}
              className="btn bp"
              style={{width:'100%',padding:'14px',fontSize:'1rem',fontWeight:700,borderRadius:12,background:gekozenSpiegel.kleur,color:'#04130b'}}
            >
              {gekozenSpiegel.icon} Start de SpiegelSessie
            </button>
            <p className="dim" style={{fontSize:'.72rem',textAlign:'center',marginTop:10}}>Geen opslag van gesprekstekst · Crisiscontact: HR 088 – 015 02 00</p>
          </div>
        ):!sessionStarted?(
          /* ── Spiegelkeuze: 5 levensdomeinen ── */
          <div style={{padding:'8px 4px 24px'}}>
            <div style={{textAlign:'center',marginBottom:24}}>
              <span style={{fontSize:'2.4rem'}} className="br">🪞</span>
              <h2 style={{fontWeight:700,marginTop:8,marginBottom:6}}>Kies jouw spiegel</h2>
              <p className="mut" style={{fontSize:'.88rem',maxWidth:320,margin:'0 auto',lineHeight:1.7}}>
                Vijf levensdomeinen — elk met een startvraag die jouw PI-meting verbindt met wat er vandaag speelt. Kies wat het meest resoneert.
              </p>
              {pi!==null&&(
                <div style={{display:'inline-flex',alignItems:'center',gap:8,background:'var(--s2)',border:'1px solid var(--b0)',borderRadius:20,padding:'5px 14px',marginTop:12}}>
                  <span style={{fontSize:'.75rem',color:'var(--t2)'}}>PI vandaag:</span>
                  <span style={{fontWeight:800,fontSize:'.9rem'}} className={piClass(pi)}>{pi}</span>
                  <span className={`zb ${zbClass(pi)}`} style={{fontSize:'.7rem',padding:'2px 8px'}}>{piLabel(pi)}</span>
                </div>
              )}
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {SPIEGELS.map((s,i)=>(
                <button key={s.id} onClick={()=>kiesSpiegel(s)}
                  className="domein-card"
                  style={{animationDelay:`${i*0.06}s`,animation:'fadeSlideUp .4s ease both'}}
                >
                  <div className="domein-icon-wrap"
                    style={{background:`${s.kleur}18`,border:`1.5px solid ${s.kleur}45`}}>
                    {s.icon}

function SigCanvas({onSave}){
  const cr=useRef(null),wr=useRef(null);
  const [drawing,setDrawing]=useState(false);
  const [empty,setEmpty]=useState(true);
  useEffect(()=>{
    const fit=()=>{
      if(!cr.current||!wr.current)return;
      const c=cr.current,saved=empty?null:c.toDataURL();
      c.width=wr.current.offsetWidth;c.height=150;
      if(saved){const img=new Image();img.onload=()=>c.getContext('2d').drawImage(img,0,0,c.width,150);img.src=saved;}
    };
    fit();window.addEventListener('resize',fit);return()=>window.removeEventListener('resize',fit);
  },[empty]);
  const coords=e=>{const c=cr.current,r=c.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height,cx=e.clientX||e.touches?.[0]?.clientX||0,cy=e.clientY||e.touches?.[0]?.clientY||0;return{x:(cx-r.left)*sx,y:(cy-r.top)*sy}};
  const start=e=>{e.preventDefault();const ctx=cr.current.getContext('2d'),{x,y}=coords(e);ctx.beginPath();ctx.moveTo(x,y);setDrawing(true);setEmpty(false)};
  const move=e=>{if(!drawing)return;e.preventDefault();const ctx=cr.current.getContext('2d'),{x,y}=coords(e);ctx.lineTo(x,y);ctx.strokeStyle='#7A9F85';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke()};
  const stop=e=>{if(e)e.preventDefault();setDrawing(false);if(cr.current&&onSave)onSave(cr.current.toDataURL())};
  const clear=()=>{const c=cr.current;c.getContext('2d').clearRect(0,0,c.width,c.height);setEmpty(true);if(onSave)onSave(null)};
  return(<div><div ref={wr}><canvas ref={cr} className="sig" onMouseDown={start} onMouseMove={move} onMouseUp={stop} onMouseLeave={stop} onTouchStart={start} onTouchMove={move} onTouchEnd={stop}/></div>{!empty&&<button onClick={clear} className="btn bs bsm" style={{marginTop:8}}>↺ Wissen</button>}</div>);
}

function PIMeter({onSave,onClose,isCalib}){

  // ── Ochtend-terugblik: controleer of gisterenavond een S-MARGE voorspelling is opgeslagen ──
  const gisterMarge = ls.get('pi-gister-smarge-voorspeld');
  const gisterDatum = ls.get('pi-gister-smarge-datum');
  const isOchtend   = new Date().getHours() < 12;
  const heeftTerugblik = !isCalib && isOchtend && gisterMarge !== null && gisterDatum &&
    (new Date().toDateString() !== new Date(gisterDatum).toDateString());

  const [screen,setScreen]=useState(()=>{
    if(heeftTerugblik) return 'ochtend-slaap';
    // §5.3.2 — herstel tussenscherm-state bij terugkeer
    if(ls.get('pi-interscreen-passed')&&ls.get('pi-draft-sOut')!==null){
      const ts=ls.get('pi-draft-timestamp')||0;
      if(Date.now()-ts<1800000) return 'sin';
    }
    return 'sout';
  });

  // Terugblik state
  const [slaapUur,   setSlaapUur]   = useState(7);
  const [slaapKwal,  setSlaapKwal]  = useState(null); // 'onrustig'|'redelijk'|'goed'|'diep'
  const [wakkerVoel, setWakkerVoel] = useState(null); // 'uitgeput'|'moe'|'redelijk'|'fris'
  const [drainGister,setDrainGister]= useState(null); // 'nee'|'klein'|'ja'|'volledig'

  const [sOut,setSOut]=useState(()=>ls.get('pi-draft-sOut')||5);
  const [sIn,setSIn]=useState(50);
  const [sMarge,setSMarge]=useState(5);
  const [druk,setDruk]=useState(null);
  const [note,setNote]=useState('');
  const [touchedOut,setTouchedOut]=useState(false);
  const [touchedIn,setTouchedIn]=useState(false);
  const [touchedRes,setTouchedRes]=useState(false);
  const [pauseOpacity,setPauseOpacity]=useState(0);
  const [showCrisisAlert,setShowCrisisAlert]=useState(false);

  // §5.3.1 — Draft-state persistentie: sla S-OUT op bij elke slider-beweging
  useEffect(()=>{
    if(touchedOut){
      ls.set('pi-draft-sOut',sOut);
      ls.set('pi-draft-timestamp',Date.now());
    }
  },[sOut,touchedOut]);

  // §5.3.2 — markeer tussenscherm als gepasseerd
  useEffect(()=>{
    if(screen==='sin') ls.set('pi-interscreen-passed',true);
    if(screen==='sout') ls.set('pi-interscreen-passed',false);
  },[screen]);

  // Opruimen draft na opslaan
  const clearDraft=()=>{
    ls.set('pi-draft-sOut',null);
    ls.set('pi-draft-timestamp',null);
    ls.set('pi-interscreen-passed',false);
  };

  // Pauze scherm timer
  useEffect(()=>{
    if(screen!=='pause')return;
    const t1=setTimeout(()=>setPauseOpacity(1),100);
    const t2=setTimeout(()=>setPauseOpacity(0),2200);
    const t3=setTimeout(()=>setScreen('sin'),2900);
    return()=>{clearTimeout(t1);clearTimeout(t2);clearTimeout(t3);};
  },[screen]);

  const battColor=sIn>=80?'var(--green)':sIn>=60?'var(--sage)':sIn>=40?'var(--amber)':sIn>=20?'var(--gold)':'var(--red)';
  const battLabel=sIn>=80?'Maximale energie over':sIn>=60?'Redelijk':sIn>=40?'Vermoeid':sIn>=20?'Leeg':'Uitgeput';
  const margeColor=sMarge>=7?'var(--green)':sMarge>=4?'var(--amber)':'var(--red)';

  // §2.2 — V2.0 inversielogica
  const {pi, gap, margePenalty, sIn10}=calcPIv2(sOut,sIn,sMarge);

        delta: sMarge - gisterMarge

                  <div style={{display:'flex',alignItems:'baseline',gap:6}}>
                    <span style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:'2rem',color:zoneColor}}>{pi}</span>
                    <span style={{fontSize:'.72rem',color:zoneColor,fontWeight:700,textTransform:'uppercase'}}>{zone}</span>
                  </div>
                </div>
                <div style={{display:'flex',gap:6}}>
                  {[
                    {l:'S·OUT',v:`${sOut}/10`,c:'var(--sage)'},
                    {l:'S·IN',v:`${sIn}%`,c:battColor},
                    {l:'S·MARGE',v:`${sMarge}/10`,c:margeColor},
                    {l:'Druk',v:druk.charAt(0).toUpperCase()+druk.slice(1),c:druk==='weinig'?'var(--green)':druk==='normaal'?'var(--amber)':'var(--red)'},
                  ].map((item,i)=>(
                    <div key={i} style={{flex:1,padding:'9px 6px',borderRadius:8,background:'var(--s3)',textAlign:'center'}}>
                      <div style={{fontFamily:'Syne,sans-serif',fontSize:'.6rem',color:'var(--t2)',letterSpacing:'.08em',marginBottom:5}}>{item.l}</div>
                      <div style={{fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:'.88rem',color:item.c}}>{item.v}</div>
                    </div>
                  ))}
                </div>
                <div style={{marginTop:10,padding:'8px 12px',borderRadius:8,background:`${zoneColor}11`,border:`1px solid ${zoneColor}33`}}>
                  <p style={{fontSize:'.78rem',color:zoneColor,lineHeight:1.5}}>
                    <strong>Gap {gap}</strong> × marge-penalty <strong>{margePenalty}×</strong> = PI {pi}
                    {sMarge<=3&&<span style={{color:'var(--red)',marginLeft:6}}>⚠ Lage reserve verhoogt risico exponentieel</span>}
                  </p>
                </div>
              </div>
            )}
            <div style={{marginBottom:16}}>
              <p className="lbl" style={{marginBottom:6}}>Optionele notitie</p>
              <input type="text" value={note} onChange={e=>setNote(e.target.value)} placeholder="Één zin over vandaag..." style={{width:'100%',padding:'10px 12px',background:'var(--s2)',border:'1px solid var(--b0)',borderRadius:8,color:'var(--t0)',fontSize:16}}/>
            </div>
            <button className="btn bp" disabled={!touchedRes||!druk} onClick={doSave}>Meting opslaan ✓</button>
          </div>
        )}

      </div>
    </div>
    </>
  );
}

  const pilotDay3=new Date('2026-03-12');

  const sessies=[
    {
      id:'onboarding',
      icon:'🌱',
      label:'Na onboarding',

        'Wat trof je het meest in de uitleg over de Paradox Index?',

    {
      id:'dag3',
      icon:'📊',
      label:'Dag 3 pilot (12 mrt)',
      unlocked:now>=pilotDay3,
      vragen:[
        'Hoe voelt het meten tot nu toe? Makkelijk, lastig, of ergens tussenin?',
        'Is er een moment geweest dat de score niet klopte met hoe je je voelde? Wat was er dan aan de hand?',
        'Wat zie je al in de eerste drie metingen — ook al is het patroon nog klein?',
      ],
      color:'var(--koraal-amber)',
    },
    {
      id:'weekna',
      icon:'🏁',
      label:'Week na afloop (24 mrt)',
      unlocked:now>=weekNa,
      vragen:[
        'Wat heeft de pilot je gebracht — concreet, ook als het klein is?',
        'Was er een moment waarop het systeem iets liet zien dat je zelf nog niet had gezien?',
        'Zou je het willen blijven gebruiken? Zo ja — wat zou er dan anders of beter moeten zijn?',
        'Wat wil je meegeven aan Tom en Ralph voor de doorontwikkeling?',
      ],
      color:'var(--sage2)',
    },
  ];

  const handleSave=(id)=>{
    const updated={...saved,[id]:answers[id]||{}};
    setSaved(updated);
    ls.set(`reflectie-${user.id}`,updated);
    setOpen(null);
  };

  const activeSessies=sessies.filter(s=>s.unlocked);
  if(activeSessies.length===0)return null;

  return(
    <div style={{marginBottom:14}}>

        const isDone=!!(saved[s.id]&&Object.keys(saved[s.id]).length>0);
        return(
          <div key={s.id} style={{marginBottom:8,opacity:s.unlocked?1:.45}}>
            <div

              style={{display:'flex',alignItems:'center',gap:12,padding:'14px 16px',background:'var(--s2)',borderRadius:12,cursor:s.unlocked?'pointer':'default',border:`1px solid ${open===s.id?s.color:'transparent'}`,transition:'all .2s'}}
            >
              <span style={{fontSize:'1.3rem'}}>{s.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:'.88rem'}}>{s.label}</div>
                <div style={{fontSize:'.75rem',color:'var(--t2)',marginTop:2}}>
                  {!s.unlocked?'Nog niet beschikbaar':isDone?'✓ Ingevuld':s.unlocked?'Beschikbaar — tik om te openen':''}
                </div>
              </div>
              {isDone&&<span style={{color:s.color,fontSize:'.75rem',fontWeight:700}}>✓</span>}
              {s.unlocked&&!isDone&&<span style={{color:'var(--t2)',fontSize:'.8rem'}}>→</span>}
            </div>
            {open===s.id&&(
              <div style={{background:'var(--s1)',border:`1px solid ${s.color}33`,borderRadius:'0 0 12px 12px',padding:'18px 16px'}}>
                {s.vragen.map((v,idx)=>(
                  <div key={idx} style={{marginBottom:16}}>
                    <p style={{fontWeight:600,fontSize:'.88rem',marginBottom:6,lineHeight:1.5}}>{v}</p>
                    <textarea
                      value={(answers[s.id]||{})[idx]||''}
                      onChange={e=>{
                        const prev=answers[s.id]||{};
                        setAnswers({...answers,[s.id]:{...prev,[idx]:e.target.value}});
                      }}
                      placeholder="Schrijf hier je antwoord..."
                      style={{width:'100%',minHeight:72,padding:'10px 12px',background:'var(--s2)',border:'1px solid var(--b0)',borderRadius:8,color:'var(--t0)',fontSize:15,lineHeight:1.6,resize:'none',outline:'none',boxSizing:'border-box'}}
                    />
                  </div>
                ))}
                <div style={{display:'flex',gap:8}}>
                  <button onClick={()=>handleSave(s.id)} className="btn bp" style={{flex:1}}>Opslaan ✓</button>
                  <button onClick={()=>setOpen(null)} className="btn bs" style={{flex:1}}>Sluiten</button>
                </div>
                <p className="dim" style={{fontSize:'.72rem',marginTop:10,textAlign:'center'}}>Antwoorden worden alleen lokaal opgeslagen — niet gedeeld met management</p>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

  const [webContentLoading,setWebContentLoading]=useState(false);

  useEffect(()=>ls.set(`pi-${user.id}`,entries),[entries]);
  useEffect(()=>ls.set(`jnl-${user.id}`,journal),[journal]);
  useEffect(()=>{
    const on=()=>setIsOnline(true);const off=()=>setIsOnline(false);
    window.addEventListener('online',on);window.addEventListener('offline',off);
    return()=>{window.removeEventListener('online',on);window.removeEventListener('offline',off)};
  },[]);

  const fetchSpiegelWebContent = async (spiegel) => {
    if(!internetToestemming || !spiegel) return;
    setWebContentLoading(true);
    setSpiegelWebContent(null);
    try {
      const d = await callAnthropic({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 800,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
          system: 'Je bent een inhoudscurator voor zorgprofessionals. Zoek naar 3 relevante, toegankelijke bronnen op internet (Nederlandstalig bij voorkeur, anders Engels). Geef alleen JSON terug, geen uitleg. Formaat: [{"titel":"...","url":"...","bron":"...","samenvatting":"...","leestijd":"..."}]',
          messages: [{ role: 'user', content: `Zoek 3 waardevolle online artikelen, podcasts of tools die aansluiten bij dit thema voor zorgprofessionals: "${spiegel.domein} — ${spiegel.startvraag}". Focus: ${spiegel.systeemContext}. Geef alleen de JSON array terug.` }]
        });
      const txt = (d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
      const clean = txt.replace(/```json|```/g,'').trim();
      const start = clean.indexOf('['); const end = clean.lastIndexOf(']');
      if(start>=0 && end>start) {
        const items = JSON.parse(clean.slice(start, end+1));
